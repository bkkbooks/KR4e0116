body:
  text: 謙齊文録别集類五明提要臣等謹案謙齊文録四卷明徐溥撰溥字時用宜興人景泰甲戌進士官至華蓋殿大學士諡文靖事迹具明史本傳溥於孝宗時在內閣十二年與劉健謝遷等協心輔治不立異同然於事有不可者侃侃力爭多所匡正如諫止李華復官執奏不撰三清樂章因視朝漸晏上疏抗論並著讜直之節孝宗時朝廷清暇海內小康論者謂溥等襄贊之力為多今集中奏議尚在其指事陳言委曲懇至具見老成憂國之忱與隆萬以後訐激取名囂爭立黨者詞氣逈殊蓋有明盛時士大夫風氣如是也至其他作則頗多應俗之文結體亦嫌平衍蓋當時臺閣一派皆以舂容和雅相髙流波漸染有莫知其然而然者王鏊震澤紀聞曰徐溥在翰林不以文學名及在內閣承劉吉恣威福報私怨之後一以安靜調和中外海內寧平行政不必出於己惟其是用人不必出於己惟其賢時稱休休有大臣之度云云是文章不如器量當時已有公評然有德之言終與塗飾字句者異是又不能不以其器量重其文章矣乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:4456a2149df13a3e85f3f59c6dea7b999dfbb78e484ab78013271614998d1f87
