body:
  text: 謙齊文録卷三明徐溥撰引送吳甥吉士南歸詩引吳甥儼今嵗領鄉薦而來得與天下士角藝於春闈再捷及廷試又在髙等尋被㫖選入翰林為庶吉士方益攻文字以圖他日報稱俄而疾作思歸乃具陳請遂獲俞音豫雖欲留之亦不可得也其行有日士大夫有惜其去者多贈之詩顧余可無一言乃亦賦四韻仍僭書數語於前儼為吾女弟之子少已失恃賴祖母鞠育而承其父訓誨以至成立今而歸也兼遂省親之願可為樂矣樂則其疾脫然以去去則速來以副朝廷儲養之意以為科第登庸之光則豫亦有光也都亭折柳詩引都亭者何都城之外有亭焉以為置郵之地也折柳者何贈别之舉也古詩所謂反手折楊柳者是也别必於都亭者何車馬之所集道路之所由分也别必有詩者何發乎情形乎言言焉而成聲者也詩必以折柳名者何擬古而作也詩何為而作送蔣恱仲學南歸也恱曷為而歸以國學生待次未及而學於家也曷為送之恱從豫授經者也從豫送之者誰鄉黨之士仕于朝及凡所與識者也識其人知其所存樂與之處而不忍别焉此情之所不能已也不能已者此詩之所由作也豫曷為無詩方有公務弗暇也曷為引之亦有不能已者存乎其情也豫情曷存乎恱之所知也恱之所知雖假豫言而亦有不待豫言者也跋跋蘇東坡手書後吾鄉山水佳勝昔蘇文忠公愛而居之故其名益著公之居此其事特見於文集與郡志中至訪其手迹僅有所題斬蛟橋八字而已若此種橘一帖乃長洲李應禎携以示豫者竊喜此為陽羡故事也遂用模刻于石臨視惟謹不敢失真既又得公乞居常州奏狀乃豫家藏舊一小簡言買田事者復次第刻之而周益公謝采伯跋語各附其後蓋其考據嵗月皆精當可覽若元人一二題詠亦不忍棄焉刻完歸置洑溪書堂所以起鄉人子弟景仰先賢之意豈徒玩其筆畫之妙而已哉說巽夫字說粵惟萬氏為古者芮伯萬之裔漢雲臺二十八將有萬修封槐里侯其家世之逺可徴豫同里萬姓者僅一二要之為喬木大族獨非槐里相傳繩繩不絶者歟曰盛者聰頴特達充邑庠弟子員明經飭行出人一頭地乃今應詔貢于春官進試于內廷中式得入太學未幾循例依親南還以豫有同門之好告於豫曰盛於加冠時賓師以巽夫字之辱諸君子以字呼於盛也於兹有年矣顧未有為字說者以繹其義以俾盛知所從事而自朂焉缺贊商少保先生像贊缺安素軒難客有難於安素子曰天之生人萬億其類或賤而貧或富而貴或堅而久或柔而脆或揚揚而升或默默而退誰云彼蒼而獨無私同人異與云胡不疑故富貴或可以智取名譽若可以力私終南捷徑何必往來乎義路詭遇獲禽何必範我而馳驅富貴名利自我取之乞墦搖尾孰得而知而子安履其素若顛若癡惟已所行不隨乎時惟子之守不能韋脂惟道之謀不能變移雖古道之所尚實今人之所嗤子盍不變子之故從今之所宜歟安素子聞之愀然不樂曰是何言之謬耶惟履之初素履行願中庸亦云素位不願惟分之安固執不變豈同小夫物理交戰彼雖文繡非我所羡彼雖膏粱非我所勸徼幸而富貴孰云其為德安分而貧賤孰云其不善樂夫子之固窮羞子路之愠見故食取充饑藜藿不羡乎膏粱衣取蔽寒緼袍不耻乎衮裳居取避雨茅屋不慕乎華堂無外之求惟德之將言既歌衛風雄雉之詩而和之曰不忮不求何用不臧吾安吾分終身之臧夷齊首陽千古之臧富貴驕人何足以臧歌竟髙卧不顧客不敢難含愧而去行狀先妣何夫人行狀先母何氏諱妙賢世為宜興人父逵輕財好義鄉稱長者母夏氏有賢行卒時先母才九嵗哀慟如成人後事繼母能順適其意繼母待非其道未嘗以告諸父由是大為父母所愛相攸以歸先君為冢婦年十七矣是時祖母吳夫人猶在見先母年幼而動循禮度喜謂親戚曰吾家得孝婦門户之興可知矣先祖瓊州府君以事詔繫獄先君北上祖母止之曰爾婦將娩身姑緩之先母曰父母有難而顧妻子耶先君即日就道既而留京邸三年仰事俯育之用一萃於先母先母奉養極其勞瘁見祖母時或興念流涕不食百方解慰之時時弄兒女以娛目前暮則率諸婦左右或咨禀家事或緝治女紅夜分俟祖母熟睡然後退蓋先祖仕宦兩京逾二十年先母奉養其姑于鄉率如此而於其被難時尤窮窮如也宣德間嵗饑一夕盜至先母聞撞門聲急亟扶祖母避竹園中俄而失祖母復奔至中堂覔得之仍扶以出賊既去諸婦謂吾母曰何膽大如此脫遇賊何以自處婆婆年老人無傷也母曰正姑年老恐驚悸成疾耳我死何足惜後祖母久病在床晝夜不離側湯藥非親嘗不以進及卒哀毁踰禮是時先祖歿久矣二庶祖母年固少先母一以姑禮事之撫庶叔五人服食必先己子教𨗳漸成相先君為之婚娶故諸叔愛吾母亦如其母焉先君性嚴毅吾母事之無違禮相守五十餘年而相敬如一日嵗時祭享膳羞酒漿極其豐潔客至亦躬自治具以佐先君之歡至老猶親主中饋不以委諸婦也先君教子弟甚篤供具賓師之禮先母唯恐不至每先君程其課業輒從旁奬諭之見業有端緒者喜形眉睫否則不樂也溥初應鄉試謂曰兒今行矣我有一事不樂溥跪請其故母曰南京繁華之地兒年少未娶恐為所誘不能自持則致辱身虧行矣溥曰兒誠不肖唯恐不能取科第為父母榮此非所患也溥亦不敢一涉非禮以遺親憂及忝官于朝二十餘年再得告歸省所以教戒溥者尤切平生色仁而氣和接內外屬人謙謙自將至與共衣食則嘗取其薄者居室無嫉妬之行每勸先君納婢妾而先君自不從性勤儉於華麗之飾無所好暇則治麻枲絲繭如小家婦女然財帛當用者雖費不吝祖母之姊之女蚤孤携歸撫育之及長當嫁時祖父之祿入有限也吾母則輟奩具資遺之舅氏兄弟姨妹孤貧者周恤之始終無厭於他親戚鄰里亦然家所畜奴僕頗衆一撫之以恩嘗曰此皆離父母而來事我者奈何不加恤哉或有過必為之隱諱惟恐家君知之有善輒稱道之加賞勞焉有被斥逐去之幾十年猶感念主母而欲歸者吾母之善行類多可書此特述一二焉初溥之免先君喪當還朝不能遽舍以去先母諄諄然語之曰吾家世受國恩吾兒當思報效可也我有爾諸弟在爾無以我為憂溥涕泣受教迄今自抱終天之恨痛哉先母生洪武三十五年五月丁亥卒成化十三年五月己丑享年七十有六子男四人長即溥次濟次瀹次澍女三人嫁同邑吳吉蔣蘭吳經孫男十四人孫女六人曽孫女一人先母初封孺人再封宜人溥始聞訃將歸吏部以聞蒙恩賜祭命有司營葬且給溥驛舟以行是則朝廷之恩固大矣非賴吾父母教育之力豈有今日溥哀痛悲號有死無隕今卜以卒之年葬于瑞雲山先考庶子府君之墓謹具先母世出行事卒葬之槩請文於執事以昭不朽伏惟哀憐而寵畀之不勝大幸墓志銘中憲大夫鴻臚寺卿齊公夫婦墓志銘公諱政字以德姓齊氏世家雲中少即穎異入郡庠為弟子員學業迥出儕輩永樂丁酉試於鄉中式明年㑹試辭乙榜卒業太學宣德丙午吏部從太學諸生選鴻臚寺序班公在選中或謂公且登科甲公曰此古九賔之職也懼不能稱耳卒就職己酉改鳴贊正統丙辰九載考最擢本寺主簿仍專鳴贊事已而連遭父母喪服闋復任已已擢寺丞景泰壬申再擢右少卿天順丁丑英宗睿皇帝光復寶位知公練達特擢本寺卿居四年以衰老乞致仕上優詔留之又四年再以為請詔特令歸展墓今上嗣位之初公年已七十有七請休致不已始賜俞允既歸二年為成化丁亥十二月十二日以疾終于正寢訃聞上遣官諭祭以明年某月某日葬于大同縣長安村之先塋公為人體質魁梧音吐洪亮日侍廷陛而禮制習熟動無所失及年既邁恭謹愈甚故纍朝特寵眷之遂以諸生至九卿可謂嘉遇也已公之先皆不仕父贈奉直大夫鴻臚寺右少卿妣楊氏贈宜人公原配陳氏封宜人先公卒繼配何氏光祿寺署正瑛之女有賢德為婦為母皆有可稱以子佑貴封太恭人卒於成化乙巳十一月三十日享年七十有五以明年某月某日合葬公墓子男三人長曰偉錦衣衛鎮撫陳宜人出次曰佐臨淮縣主簿次曰佑鴻臚寺左少卿皆太恭人出女五人長適廣平衛知事許瓊次適太學生田疇次適張子增次適錦衣衛指揮僉事朱顯次適四川總兵傅泰孫男六人曰仲章曰士竒義官曰士恩郡庠生曰仕美曰仕祿曰仲輝女四人長適王宣餘在室曽孫男二人女六人他日佑請於豫曰惟先君之葬于兹二十年矣未嘗有銘今不幸遭吾母之喪將歸治葬願得一言刻石入墓中以逭不孝之罪豫久識公且重公能舉其職而公之子復能世其家乃按通政司知事黃榮祖狀序而銘之銘曰於赫皇明大禮斯備朝覲燕饗屹乎廷陛有美齊公袍帶偉如周旋俯仰容聲舒徐歷事纍朝惟帝眷顧連疏乞身迫此衰暮其歸既遂其逝何長有子克家公尤不亡何以致之曰有賢助家有所託子有所怙棄養相從于彼九原尚千百載子孫具蕃通議大夫南京刑部右侍郎金公墓志銘南京刑部右侍郎金公既卒之三月其子麒壽走闕下言先臣歷事三十年官至三品今不幸沒矣兾得恤典以賁諸幽朝廷念之為遣官諭祭仍命有司治葬皆如制至是復以葬宜得銘奉尹吏部正言之狀泣請于豫公豫之同年友也又嘗以庶吉士同在翰林斯文之好已久所以稱述其平生以慰乎存歿者固不得而辭也公諱紳字縉卿其先錢塘人元有諱仲實者隱居養志子銘國初以閭右遷實南京始占籍上元縣銘生元亮再世不仕元亮生潤以兵部司務出知南安府致仕進階中議大夫贊治尹生公公幼有竒質南安公教之甚篤學業益進景泰癸酉中應天府鄉試明年登進士第由庶吉士授刑科給事中踰年英宗皇帝復位鋭意求治公適掌科數召對所以寵待者至上嘗誚一二大臣晡時趣具彈文公援筆而就詞甚切當上覽而恱之方有意留用㑹晏駕弗果甲申今上嗣位進都給事中首率同列論都指揮門達竊弄威柄罪繼㑹議廷中言都御史王竑剛毅直諒可任大事宜亟召用一時達被逺謫而竑起為兵部尚書與有力焉公於是益以言責自盡嘗陳時政八事一持恆久以守新政二勤接見以論治道三納忠言以致躬行四求賢才以備任使五擇重臣以備邊患六明黜陟以警在位七設武學以育將才八用武勇以除冦盜疏入悉見采納成化乙酉遣祀徐王滁陽王還時兩京浙江河南水旱相仍漕舟不通患不可虞公言事宜數條用之未幾京師米價竟減而緣河盜皆散去朝廷知公才果可用遂擢南京大理寺左少卿南京為公鄉里公先謝絶私謁而訊鞫明敏獄囚多所平反凡十年譽望益盛乃有右侍郎之命公持法益謹每戒其屬曰民易犯法於無可矜疑者尤宜盡心且數躬視囚獄以故囚少瘐死者戊戌江西大旱詔公往視至則先奏停力役徴收等事仍禁郡縣雖小費不得擾民俄而新昌萬載鄱陽諸縣盜發公督捕有方竟獲其首誅之因舉救荒之政始通鹽商增糶價漸而粟至及勸富民補官并折收船課皆以便宜行之已而食足全活者不可勝計歷二年還任公既久勞於外得疾即不起時成化壬寅六月甲寅也年僅四十九以卒之明年缺月缺日葬某鄉之原公之祖若父纍贈至同公官祖妣姚氏亦贈淑人配徐氏兵部尚書晞之孫封淑人子男三曰麒壽貢士麒永國子生麒寧女五人長適貢士范昌齡二適卞璽三適任守正餘幼孫男二人士賢士良公性至孝南安公致仕二十餘年左右侍養不違其志與其兄綬夫友愛尤篤自入官以簡約持已而待其屬必厚平生好賢不倦在江西時嘗行縣過廬山視白鹿書院傾圯特修葺之且為正先賢祠祀至於學問之勤不以政冗而廢惜其年止於是而不得究其志也所著有心雪稿青鎖獻納稿江西巡視稿若干卷藏于家銘曰維金之先自杭而遷世晦不仕發於南安南安出守綽有政惠延及於公益昌而熾少登科甲給事禁中謇諤之詞見於疏封既受上知遂分留務維兹祥刑不忝所付時有定國世無寃民司冦之亞名位益振西行救荒萬口待食爰推其仁以濟吾術公則已矣其惠猶存食此厚報尚俾後人後人纍纍繼登仕籍有如弗信視此銘石泰安州判官崔君墓志銘駙馬都尉崔君元既葬厥祖泰安君奉太常少卿王君佐狀請豫銘墓不得辭按狀君諱震時起其字世居東勝州元季兵亂徙鴈門遂居代州祖諱普明考諱璟君生而魁碩有度少補州庠遭父母喪久困場屋天順甲申以例輸邊實為國子生成化甲辰試吏部授泰安州判官州有泰山祠四方捐金帛供香火者嵗每不資奸盜百出君禁奸核實綽有能聲𢎞治戊申輸宣府芻粟有羡銀七百餘兩㑹齊河諸縣有逋數因貸之償民布政使戴君珙用禮幣勞君以旌其能獨石地逺粟貴民困輸納君奏乞太倉粟給之己酉督兊軍儲于臨清有羡米三千餘斛銀五百餘兩乃白部使者以修安山水次倉七十餘間州有預備倉每不守守者輒被罰君贖罪人以市地闢衢巷搆屋宇招民復業者居之盜不得肆庚戌督官銀給遼東戍兵修廟學及祭器視昔猶加己亥修德藩一郡王府及周孔顔孟諸廟及濟南城隍祠役重費廣計日而集巡撫都御史吳君節委攝肥城縣事賞罰明信兵民欣服纍值嵗歉多所賑貸山谷間有巨盜數十民病防守君悉力追捕皆就擒滅壬子巡撫都御史錢君鉞及巡按官皆薦君為大縣不果癸丑以老病致仕歸其鄉時君意有不能平頗欲自直㑹孫元被選尚永康長公主君曰吾復何求遂絶口不道前事於是放遊齊魯吳越間周覽形勝惟意所適徜徉將歸乙卯七月二十三日以疾卒於蘇之旅次距其生宣德乙卯四月二十六日壽六十有一配某氏子男儒國子生實生都尉以恩授東城兵馬指揮女一適國子生劉益之孫四都尉其長次曽次周次愚孫女二長適鄉貢士謝國韶次未䀻是嵗十一月十三日葬於崔村之原豫每見都尉恂恂猶書生心愛重之知源𣲖有自也比又聞其曽祖某素好義嘗梁滹沱以利病涉所積甚厚及泰安君位不稱德東城君鬱不得施乃於其曽孫見之是固然哉為之銘曰國有貴族出於儒門肇之者誰君德是敦其德維何曰有遺愛民情匪私輿論攸在善而不福豈理之常於君徴之若貸而償簪纓蕤蕤耀彼門閥刻銘著聲公死不沒承事郎周惟詹墓志銘吾郡之江隂稱大家必曰顧氏周氏周世有令德至孟敬甫益以樂善敦義著聲于時景泰間不幸為訐者所訟而其子拱謫戍雲中即惟詹也惟詹生富家年少未更事遭罹家難孑孑趨邊陲執戍役而雲又苦寒地其官長念其家素務善厚撫之前御史吳蓁亦戍雲中惟詹奉贄幣師事之往來咨問日漸月積學益進而智益明遂執筆從事大將軍幕下大將軍加禮焉如是者蓋六七年始蒙恩宥南歸歸則父兄已沒獨其母蔣孺人在堂無恙惟詹念先業之至於斯也痛自刻厲措置規畫窮日夜廢者興墜者舉不數年田廬産業悉復于舊先是其母以孟敬甫下世惟詹又在逺方未還悲泣無寧日及承朝廷抆拭之恩骨肉來歸家跌復振感激之餘繼之以泣嵗時子婦上壽亦頗為之盡歡母患痿痺久在床蓐惟詹左右扶持侍藥食不去側獨以父不逮養飲恨終身成化某年東南饑有納粟授官之令惟詹曰此吾志也敢不率承輸粟若干石于官得承事郎階七品惟詹自幼服習家教讀書不煩程督其師崑山張節之甚愛之及壯涉歷既深孝友恭儉卒亢其宗雖其先澤未泯要亦惟詹能自樹立不誣也其軀幹偉碩得脾濕之證以服母喪過哀病二載竟卒實成化十四年四月甲子春秋四十有九以十五年十一月甲子葬于某山之陽新塋曽祖伯源祖宗苑及孟敬甫俱以輸粟旌門有孝義之褒娶趙氏子二祥熊祥驥女一許聘夏元正初葉侍郎與中自宣府還朝嘗為豫言惟詹處憂患能恭謹敕厲其志欲蓋前人之愆可知矣又見所作聽雪軒記愛助之意惓惓焉豫因喜惟詹受知前輩將來顯達不但已也豈意不得其壽而遂卒悲夫其子來乞葬銘乃考知州徐士亨狀序而銘之銘曰繄顧山西曰周氏肇啓厥宗宋學諭華聲茂實代有繼播越弗寧值元季有來自蘇際隆治務農敦善家日大窮周匱恤昭惠施烏頭綽楔旌孝義煌煌璽書天日麗樹之風聲無逺邇何物無良思懻忮將泰之極否斯至辟彼阽危器安置湛恩汪濊匪幸致積善有報宜不匱嗟承事君得憑藉既蹶復起天所賜胡壽弗延奄長逝新墳峩峩終古閟我銘刻諸詔來世湖廣按察司僉事張公墓志銘張為吾宜興名家其先有諱槃者仕宋至金紫光祿大夫因稱所居之地金紫墟公其十一世孫也曽祖伯英祖永父元愷俱不仕元愷娶儲氏以宣德丁未七月十五日生公諱述古字信之别號巽齊幼有妙質而器識更逺其父于諸子中為可教也遣從故進士姑蘇奚昌受易日夜誦習精勤不倦竟以景泰辛酉中應天府鄉試明年試禮部再中遂擢進士第時父母且老因乞歸得侍養于家左右承顔能順適其意暇則與邑中士友講學一時蒙指授出而取科第者若故吏部郎中邵暉輩數人家居六年而父沒喪禮克盡人以為孝服除尤不忍離其母或勸之盍受職以被恩典為親榮始上吏部除行人三年考最蒙賜敕命進階吏部察知公賢薦為御史公辭之秩滿升南京吏部員外郎又三年擢湖廣僉事成化戊戌致仕而歸矣公居官廉謹為行人數使於外若河南山東川廣諸藩所至未嘗一受餽遺及使陜西掌行襄陵王府祭事尤為王所禮遇在刑部時詳明公恕不妄决一囚有古人求生道之意至僉臬司事能辨疑獄人不稱寃而華容沅江等縣數被冦盜為築城柵以保障之民始得安居焉然公素剛直少容自度與世多忤慨然乞歸曰吾平生所恨者不得推恩榮吾親耳既歸足跡不至州縣日與諸故友昆弟放情山水田園間為詩酒之樂凡八年以乙巳五月二十二日卒享年五十九公娶陸氏有賢行先公卒生男二太學生邦祥邑學生邦瑞側室徐氏生男邦民王氏生男邦榖邦祿女二適王巽任徴孫男二女四於是邦祥等卜地於騏驥村之陽以丙午某月某日葬公託進士芮君為狀使人走京師請銘于墓豫與公自少居同鄉及壯為同年相知之深非一日矣且邦祥又為豫之子壻有姻連之好於公之葬也雖不忍銘然義不可無銘也銘曰仕不謂遲止於臬司身不謂衰中嵗而歸惟其所持不詭不隨世與我違如矩合規莫究其施斂而不為事親不虧事君不欺如此男兒為世之竒天命於斯更復奚疑騏驥之隆瘞此銘詞昭勇將軍署都指揮僉事寧夏左參將劉公墓志銘公姓劉氏諱紀字憲明大名清豐人曽祖大老贈寧晉伯祖諱寬考諱海俱贈昭勇將軍署都指揮僉事御馬監太監諱永誠則公叔祖也劉氏以太監公顯驟以戎功封伯爵族極盛大公生其間負才器識道理為佳子弟厥父昭勇公擢錦衣衛正千户以沒時公甫十齡母亦喪太夫人教遊武學比冠而廕天順丁丑太監公叙公父沙洲之功朝廷乃進公指揮僉事成化庚寅公從寧晉公討賊延綏卒遇賊身冒矢石脫圍山谷間得擒斬功凱旋進指揮同知署指揮使名始著論者謂其可任將領今太師保國朱公俾掌十二營號令明敏集事尋用太師英國張公薦得總一營訓練有法𢎞治戊申用兵部薦擢署都指揮僉事仍食祿錦衣充寧夏中路參將公自念世受國恩獲預兵政誓竭志力以效勤一方至則撫士卒詰奸宄綜畫指授皆有條緒未幾徴還京師居數年以疾卒于正寢是為己卯三月一日距其生正統甲子五月二十三日年五十有二娶楊氏錦衣指揮僉事觀之女弟繼娶吳氏管氏女一楊出適都督神英子用亦早卒公無子嘗求從兄故錦衣指揮同知綱第三子璉為後許焉㑹有寧夏之行後指揮君卒故未果公之卒合族以璉告于柩前主其喪成公志也璉卜以五月某日葬公于某鄉之原奉狀乞豫銘墓公又有從弟福嗣寧晉伯鎮薊州祥禎皆鎮撫從子璟為指揮同知並籍錦衣公雖乏嗣其族之顯蓋未艾云銘曰國有貴族時有俊才公也秀出亦何雄哉少廕父官壯居將幕分鎮西陲一方是託虎視羣寇氣先萬夫中厄於途弗究厥圖人必久用其才乃售孰遄之歸又奪其壽輀車國門送者如雲後百千年參戎之墳英國太夫人吳氏墓志銘太師兼太子太師英國張公懋之母太夫人吳氏太原陽曲人諱珍之女也公之考太師定興忠烈王封國于英已娶李氏封夫人蚤多疾無以屬內政一子忠為勳衛生亦不慧乃禮於吳而太夫人歸焉忠烈之考河間忠武王肇樹勳業為巨家太夫人弗逮事其舅事其姑河間王夫人王氏躬執烹飪備極奉養嵗時有事于家廟必䖍以相祀忠烈出奉朝謁議軍國弗復內顧凡壼以內出納賞罰之政太夫人理之咸中節度忠烈稱之曰能忠烈之弟忠僖侯輗為文安伯裕國勇襄公軏為太平侯一門三爵家益盛大而昆弟雍睦太夫人處姊姒間亦怡然無間言李夫人有女子三其仲事仁廟為敬妃孟適黔國公沐斌季適清平伯吳英並為夫人太夫人尤善處接或時以善言相勸𨗳故外內族黨皆稱之賢正統已已忠烈扈從北狩不得歸今公懋甫九嵗朝廷念死事功特命嗣爵太夫人擇傅以教間舉先世忠貞諭之故公材器克就歷事英皇憲廟以及今上纍荷知遇承倚任掌中軍都督府總五軍營兵監修國史知經筵事以敦謹著勳卓然為世臣之首而太夫人實饗其成天順癸未賜誥封英國太夫人其詞有曰淑善之積益隆壽祉觀者榮之𢎞治乙卯五月四日太夫人以壽終距其生永樂甲午九月十日春秋八十有二上命禮部諭祭工部治葬事皆如制别賜寶鏹以貫計者二萬齊糧以石計麻布以匹計者各五十尋復加祭以壇計者五皆異數云太夫人慈厚謙約念勳衛忠無嗣以庶長孫為之後施及諸族恩及羣下皆貴富家所罕見者可謂賢矣癸丑九月太夫人初度縉紳往賀有鶴盤空而下躍入席前馴不復去既屬纊之明日悲鳴而斃噫是亦可謂異矣太夫人惟懋一子女一適太師兼太子太師保國公朱永孫七曰欽勳衛曰鎡曰銘錦衣衛百户曰鋭曰鋼曰鎮曰鉉女孫三長適永順侯薛勳次適安昌伯錢承宗次早世曽孫五曰嶽曰嵩曰端曰崇曰巖曽孫女一初公葬忠烈衣冠于盧溝橋西連三岡之原卜是年八月十日以太夫人祔奉程學士克勤所著狀請豫銘監修時豫實以總裁國史事又同朝久故為叙其事行而系以銘銘曰盧矢彤弓世受國封惟夫之忠有相之功桓圭繡裳載躋廟堂惟子之良有教之方曷其饗之鍾粟鼎肉曷其飾之冠翟佩玉康寧富貴餘八十年人得其偏母得其全訃聞在朝有祭有賻賻侈其物祭加其數生既極榮沒亦孔輝匪惟今兹在古亦稀堂封是祔忠烈之墓勒銘奠幽永保無斁陸太宜人李氏墓志銘常州吾鄉郡也數十年來取科第登仕宦其尤盛者皆曰陸氏因其父兄之教使然亦惟助於內者有其人焉若太宜人李氏非所謂助於內者乎李為武進名族世積善不仕至處士某娶某氏生男女若干人太宜人最長生而端重嚴整動作有常於凡紡績之事經手精絶諸女婦皆莫能及而尤務勤儉不以所能自矜是以父母愛之既筓歸於陸為故南樂縣儒學教諭贈南京户部郎中諱某之配初為婦即以孝謹稱户部公遊邑庠例貢于京而顧其母張孺人有戀戀意太宜人趣之曰姑老矣宜速行為祿養計公感其言上道初得奉化縣訓𨗳乃奉其母赴任太宜人養之安焉及公升邵武教諭適閩海盜起則請留侍於家養之益謹或見其姑有歎息聲輒踧踖不安曰豈我為婦有未至而思其子耶必致其悅乃已姑沒殯斂俱厚公歸盡哀而無悔曰使我在側弗是過也公既起復改南樂南樂之俗婦女惟播種樵汲是務諸生之母之妻嵗時瞻拜見太夫人精於女事轉相慕習及他日扶公喪歸攀號遮送者載道觀者驚歎既二十年書帛之奉不絶而奉化邵武兩邑之士道經常州必登堂跪拜對之感泣真若有母氏之愛者可謂難得也已其教諸子嚴甚自外傅歸夜則課之每從齊外聆有書聲即止否則於其晨省必拒使弗前凡賔友過從聞講說經史輒具酒食延欵或博奕嬉戲必使人對客提其具碎之家人以為辱客太甚則曰吾知教子耳不知彼博徒之為客也蓋其教於內者如此逮年漸髙有子四人歷見其三登進士第皆列官于朝諸孫復進士及第居近侍東宫講學其一家可為貴顯矣方益自貶損食不必重衣不必新日無過分以為子孫之福晚尤康健聰明能歷歷記往事族人子弟平居進見必委曲指陳前代敦朴之俗因人懲勸之或非其人則絶不與言故人嚴憚之莫敢犯者初以長子貴恩封太安人後加今封成化十九年壽登八十有六以正月十八日無疾而卒子男四人愷南京户部郎中悌不仕怡南京工部主事愈刑部主事女二人適唐鑑孫立孫男七人簡右春坊右諭德節筌俱郡庠生箎範籌女三人曽孫男三人長含章次巽章女四人以卒之明年缺月缺日祔葬于邑劉莊之原諭德君奉李駕部應禎之狀泣而請銘豫與太夫人諸子若孫交久矣不辭而銘之曰職有必舉事有當為凡人皆然匪求人知况乎女婦內行自持及其純備人卒知之維太宜人懿德令儀尚論其槩曰孝與慈天與遐壽以報其施子孫振振貴顯于時何以致此內有家規劉莊之原祔藏于斯恩封再加壤樹增輝其尚有待驗此銘詩程襄毅公林夫人墓志銘𢎞治八年乙卯七月十日程襄毅公夫人林氏卒于京師官舍其子敏政解官扶喪歸襄毅卒時先朝已贈太子少保賜葬于休寧南山之原今夫人卒賜祭命工部啓壙而窆仍給驛歸其喪蓋特恩云喪且行敏政乃躬述事狀請豫銘墓按狀夫人姓林氏諱淑清為閩人唐九牧之後也泒分環珠里號環珠林氏髙祖謙翁元授進義副尉曽祖起宗贑州録事司判官祖子隆國朝洪武初坐纍謫陜之綏德再徙河間遂為河間人考頎妣李氏子女各一璵為淮之安東簿女即夫人夫人生有慧質孝謹純至凡女工必精習讀列女傳女戒諸書輒領其要父喪時尚未筓哀毁如禮安東治家嚴重念夫人之賢必有以稱其選者久而弗得程氏之先自新安來徙河間而襄毅在小學安東訪之為儕輩所服後入儒學其家以姻請安東乃白於母曰程某逺大器必為女弟擇配無踰此矣既歸襄毅之祖若考贈尚書公皆在堂母張氏有四女一子未畢婚嫁尤務經理委夫人獨奉兩世舅姑至躬操井臼治酒漿脯膾不憚勤勩寒暖饑飽起居之節必得其宜數年襄毅舉進士授官夫人幸有祿食而儉素如故及嫁四姑娶一姒皆手分俸金甚者撤奩具為助前後四經舅姑之喪無違禮襄毅歷給事中少卿都御史以至侍郎尚書督邊儲治兵旅領巡撫之寄出入中外者四十年懋著勳績而夫人獨任內政奉家祀施子教待新安河間諸伯叔子必周必至擇安東諸子可教者俾就外傅其一方為河南長社巡檢其一英為山東青州府訓𨗳皆底于成夫人馭臧獲有恩待親黨故舊有禮見鄰婦里媪之貧者或解衣衣之雖數不厭其賢如此夫人凡三荷封命景泰初以襄毅給事中貴敕封孺人天順中以都御史貴詔封淑人成化中以兵部尚書貴進封夫人後其子貴雖纍封而夫人秩號已極不復加錫惟享有祿養後襄毅之卒十有六年壽七十八臨終為敏政曰勉報上恩以光祖宗我年已老得從爾父地下於願足矣言訖即逝子三長敏政進士及第纍官太常卿兼翰林侍講學士以文學顯于時敏德詹事府主簿改靳州判官卒敏行儒學生女一適忠義前衛指揮同知凌雲漢封淑人孫男四長塤廕授錦衣衛百户次圻蚤世次塏次堂孫女四長適邑人臨塘范翔次適婺源大坂汪𤣥錫三適新安衛指揮子朱儀四適新安衛千户子于恩銘曰曷徴能婦夫為名臣曷徴能母子為聞人霞帔翟冠夫封之貴堂居鼎食子養之遂康寧壽祉有錫自天人得其一母備之全視履考祥於理則有勒銘于幽以示永久平江伯夫人沐氏墓志銘夫人姓沐氏太保兼太子太傅平江伯陳公志堅之配也其先鳳陽定縣人也曽祖諱英從髙皇帝起義兵建大功爵至西平侯追封黔寧王諡昭靖祖諱昂為左都督追封定邊伯諡武襄考諱僖襲雲南左衛指揮同知後以子璘貴贈右都督夫人蚤失怙恃鞠于庶母孟氏性敏慧不凡而容止詳慎不茍言笑女紅外無所嗜恱間涉書史通女戒大義恆歎曰吾獨不得事吾親目有所觸輒涕泣不食兄璘嘗攝雲南軍務事謂人曰吾有女弟如此不可不擇所宜歸聞平江公賢而多才遂納聘焉比入門逮事其舅某國莊敏公暨其姑談太夫人孝謹備至相平江公祗敬未嘗少忤賔客之饋躬自治具內處娣姒和不失色下及臧獲御之有恩旁至姻黨禮意兼厚無不稱者及居喪治葬一皆勸公行朱子家禮尤嚴祀饗至親滌俎簋久而不倦公有二幼弟鐸鎡撫待甚篤與之合姻二妹之嫁亦盛奩具以遣衆皆感其義終身以母事焉公既嗣伯爵夫人獲膺封誥每嵗節入賀太皇太后皇太后及中宫輒被寵賜而謙慎益加公嘗佩征蠻將軍印總鎮兩廣督理漕運入掌督府握京營兵出治河決攄誠效力無私顧之憂者以夫人在也公壯尚未有子夫人寬以逮下忽夢二獸交走于堂一老嫗曰此熊羆也寤以語公公曰此男子之祥也翌日側室袁氏果生一男因名之曰熊夫人育之不異已出稍長延師教以經書今為錦衣勳衛為擇良娶朱氏太師保國公追封宣平武毅王之女得孫男女各一誕孫之彌月燕飲甫畢夫人倐得痰疾熊焚香籲天剖股肉和羮以進聞者曰觀子孝則知母之慈矣夫人卒于𢎞治丙辰十二月十三日距其生正統戊午七月初二日享年五十九事聞上遣官諭祭有司治葬如制後特賜楮鏹萬貫及棺槨一具米布各若干公請于朝給驛遣熊扶柩而南卜用丁巳某月某日窆于江寧大山之原從先墓也說者謂夫人生距家歸顯族安處優裕未嘗知世間疾苦而能勤儉自將相厥夫子保有爵祿方隆而未艾可不謂之賢耶公慟夫人甚思所以慰其神于地下奉狀來請豫銘弗獲辭而為之曰猗嗟夫人勳舊之裔歸于侯門允作嘉儷事上撫下家人是宜賢名式彰豈曰無儀鸞封煌煌有燁其服入朝三宫出表羣族貴鮮不驕富孰非侈夫人持之勤儉終始匪獨婦德母教亦敦廕澤之餘有子有孫胡享之隆而世弗久曰祭曰賻世亦希有皇循舊度命藏故丘伐石勒銘恩昭九幽紀母張宜人墓志銘紀母張宜人今户部雲南司員外郎溫之母也張世居綏德業隂陽家之術某南京欽天監靈臺郎生子文哲本州隂陽學典術娶某氏生宜人聰慧端正為父母鍾愛之筓而歸紀紀之先為蒙城人後徙綏德以醫鳴家為故承事郎諱瓛之配瓛字玉章號淡菴少孤事其叔父母盡禮宜人能承順其意如子婦然至於奉賔祭待親戚事無大小必得其道人以賢婦稱之他日淡菴羣從求異産力不能止遂出居於外惟取先世所遺醫書數冊及器之敝者數事而已宜人怡然未嘗有愠色淡菴醫日精逺方抱病求治者日衆至則隨手取應而退亦不責報久則所積亦厚不喜自奉凡有義舉傾而與之宜人亦未嘗有吝容其賢有如此𢎞治己丑九月初六日躋壽八秩其子溫仕于朝得士大夫詩篇甚富寓歸為慶賔客滿門諸子婦率孫曽以次捧觴進拜里巷驚異莫不嘖嘖稱歎未幾以溫之貴將受誥有宜人之封甲寅正月八日俄以微疾卒溫歸來泣告曰不肖賴慈訓以有今日所恨者雖恩典之頒而不能光榮生前矣九月十有七日葬于榆林城南三坌河之陽合承事先君兆幸畀一言以慰之豫居京師且久知溫為郎官有美才昔嘗感其孝為文以表其先君墓乃復按刑部侍郎張君尚絅之狀書而授之宜人有男子四長泉次即溫又曰濚曰濂泉濚俱以輸粟授官濂鄉貢進士女一適冠帶總旗楊政孫男八人世相世良俱太學生世椿世科世楹世祿世標世楫女九人長適榆林衛千户李鳳次適王勳適朱鸞餘尚幼銘曰順以為德嚴以為教既宜其家亦事其報報以厚養復躋髙年天恩且下曷不少延子孫如林盛而未艾立石墓門其尚有待安昌伯夫人張氏墓志銘夫人姓張氏諱萬玉其先汴人世以武顯為河間忠武王之曽孫定興忠烈王之孫今太師兼太子太師英國公之女母曰王夫人而夫人則劉氏出也歸於錢氏為都督同知追封安昌伯之婦安昌伯承宗之妻也初承宗母夫人孫氏故懷寧侯女盛年寡居治家有法撫育承宗以長嘗與其兄今懷寧侯泰擇婚聞英國與王夫人善教而女且賢以為無能踰之者而公之母太夫人吳氏亦曰是女宜其為吾家婦蓋公之先既以元勳貴顯且連二世為太宗仁宗妃而錢亦英宗后族也兩家門户相當婚事既成繼而孫夫人病期一見其婦及入門而卒故夫人以不得事姑為恨而事其夫生母曽氏盡孝相夫治家甚有條理至待親戚以禮御卑下以恩稱其賢者無間言俄而病更醫弗治年止十八其生成化丙申五月二日其卒𢎞治癸丑四月二十九日以卒之年八月初十日葬于都城西香山先塋之次夫人初未授封其夫哀其早世具疏言于朝天子從之封安昌伯夫人先葬來乞銘於豫而英公且為懇請曰吾女年尚少何敢勞執事然不得一言無以塞吾悲也遂諾而銘之曰其幼也以慧其長也尤德其歸也甚宜其逝也何亟榮善夫人墓志銘夫人姓項氏世為順天之宛平人生而聰慧婉淑克精女紅宣德癸丑選入宫侍賢妃甚愛之天順間憲宗在東宫英廟為簡老成謹厚有年德者擁護左右衆咸曰莫如夫人宜及皇貴妃於安喜宫逮今上嗣位夫人年既髙時被恩禮亦稍獲優逸而夙夜弗懈凡在禁掖前後六十餘年白首寅畏莫有見其過言失度𢎞治丁巳三月二十四日以壽終上念其舊勞特贈其號曰榮善夫人命太監李興及右少監傅忠左監丞袁鋭董喪事賜之祭者三賜賻銀帛諸物各若干命所司治墳於宛平香山之原蓋異數也夫人生宣德丙午之八月葬以卒之年五月某日春秋七十有二銘曰天門九闕嚴法宫兮白首服勞勤厥躬兮香山之原敕所封兮三后在天尚克奉兮亡妻李淑人墓志銘豫少忝科第入翰林繼而為卿亞以預政事夙夜在公不暇顧其私然而閫以內事亦治而不紊者以有吾妻李淑人在也而今則已矣吾能免乎內顧之憂耶且吾善孰與相過孰與針事有不樂者又孰與勸而釋耶此豫不能不悲恨者淑人諱德貞其先為金壇人伯祖順當國初以武功積官至指揮同知其從子克裕娶胡氏生淑人筓年歸豫初豫喪元配杜氏擇繼室不可得或言李氏雖武辨而有家法且其女甚賢乃禮聘之既入門克修婦道若素習然每念去舅姑逺不得朝夕侍奉每晨興輒焚香望拜敬祝其壽而得一美味必封寄之以為常及豫得告歸省始挈之至家凡所以事舅姑者必躬為之或請代其勞則曰吾方得侍奉何以代為其孝如此遺二子尚幼鞠育教訓與己子等既長雖鄰嫗不知其為非淑人出也其一女將嫁資裝既備復盡脫簪珥與之曰此女少失母當加厚其慈又如此蓋自其少時性行異於人居父母旁日事女紅不妄言笑嵗時親戚婦女過其家者見其容飾之盛輒為之羞赧俯首不視當吾歸省時先君禮部公嘗輟飲器數十事畀吾還京以為待賓之用淑人曰君歸無以奉親而反受此不可且客居器用惟磁漆足矣豫深然之卒不敢受先君聞之甚加稱歎其儉約又如此歸吾數年未嘗越中門以行一日兒有墜樓者聞之驚悸乃出以抱持之而僕隸輩始識其面其靜又如此平居處娣姒以和待親戚以禮御童僕以恩與豫處幾三十年而相敬如一日諸子或有差失慮豫之怒必和解之退而必自責讓不少恕其亦可謂賢矣女事之暇尤喜讀書孝經論語并古詩文多能背誦至於臨模字帖亦有可觀蓋其餘事也豫自春坊庶子擢少詹事兼翰林侍講學士淑人尋亦得今封凡宫闈有慶纍入內朝賀其顯榮亦至矣今上念舊學之臣嘗以吾兒元概侍居京師特授官秩以示恩寵未幾又特俾乘傳還家畢姻事淑人乃率之行事未及成不幸以一疾而卒其卒以成化二十一年六月十三日年甫四十三將以又明年十二月葬于邑南陽山之原朝廷又敕禮部遣官治墳墓且命常州守臣諭祭恩禮稠疊愧無以為報也葬既有日乃述其梗槩刻石納壙中以泄悲恨之情若其淑德懿行親旅皆能道之其多不能盡書也子男四曰元楷指揮僉事曰元栻邑庠生蚤卒曰元相承事郎曰元概中書舍人女一曰元秀適太學生張祥孫男三曰文煥曰文燦曰文熺女一曰文柔系之以銘曰嗟淑人兮何去而不歸一室寥寥兮惟所遺衣吾尚可以自存兮諸子倀倀然其何依胡豐其行兮嗇其壽吾不可詰兮復何咎丘墳既築兮天寵則厚同穴而居兮尚百嵗後仲弟時望承事郎墓志銘𢎞治五年十月二十三日吾仲弟時望卒遺言於其子元橘曰吾生有汝伯為之兄以庇我今雖死可無憾矣然知吾平生者亦無踰於汝伯吾死其乞文志墓庶吾目始瞑也於是元橘以書來告豫聞之痛哭嗚呼吾忍銘吾弟乎顧其言如此則又不忍不銘也惟先公户部府君生吾兄弟四人吾為長次為吾弟吾弟自幼明敏讀書善記且善屬對先公甚愛之稍長即解事每見先公治家勤勞輒請代先公曰汝年幼正當與汝兄讀書進學以取功名家事非汝所宜問也則對曰進取功名乃長兄代理家事兒之責也先公初未之許一日偶試以某事即能中規畫先公驚喜由是凡營居室治陂塘及耕桑之類悉委之皆如意後先公漸老家事一不問得與詩朋酒友徜徉於山水間者以有吾弟任其勞也吾弟性更孝先公嘗染疾甚危醫莫能治吾弟甚憂一夕夢神以醫書指示謂汝父第服此藥既覺檢書果得之依方服之即瘥人以為孝誠所感天順己卯豫喪先妻杜夫人於京師冒暑來省因載其嫂之喪并擕二姪以歸道中感熱毒疽發于背幾死無悔言成化癸卯三弟得心疾疾作輒怒目叫呼家人皆不敢近獨吾弟日夜在側百方治療然後愈明年四弟卒為之擇地以葬教育諸孤以俟成立及豫繼室李夫人季子元概相繼卒吾弟以豫獨處京師又冒暑來省其篤於友愛蓋如此平生於子史百家多所涉獵尤精於數學晚好讀醫書蓄善藥病者多所全活至鄉黨以貧乏來告者悉周之無吝近省豫道遇廣西某進士之喪輒助白金數拾兩竟不問其為誰也吾少讀唐書張公藝傳吾弟適見之遽請曰古今人宜無甚相逺公藝九世同居吾兄弟豈不能保一世乎遂出誓言期不為妻子所感厥後有求分異者力不能止每以為恨故省豫時歷舉先公遺命贊豫置義田以贍宗族且力任其事以往士大夫嘉其志咸作詩贈之惜乎志未就而卒嗚呼可哀也已吾弟名濟字時望號復齊生宣德庚戌十二月五日距卒之嵗得壽六十有三素有治才而不求仕嘗以入粟助有司賑饑補承事郎徐氏世居宜興曽祖諱福贈户部郎中祖諱鑑瓊州知府考諱琳不仕三世俱贈光祿大夫柱國户部尚書兼武英殿大學士妣皆夫人吾弟初娶繼娶皆蔣氏又吳氏子男五人曰元橘曰元杏曰元檳曰元枤曰元楨元楨蚤卒女一人適同邑范倫以卒之又明年某月某日葬于拜亭山之原為之銘曰有事服勞昔見其人溪山在望其人何存田廬秩秩子孫振振百世之下尚視兹墳亡兒中書舍人元概墓志銘𢎞治元年四月二十四日吾兒元概以疾卒於乎吾兒何遽至於是耶吾兒少重遲不好游戲家人以不慧目之常一日舍舟登岸誤為木罌所跋墜諸水時岸髙數文湍流甚急忽浮水面不溺若有神扶而起者已而羣兒訊之曰汝將墜何不持罌口曰持則罌覆吾身尚復起耶及稍長出就外傅口授書數百言轉能誦暇則默聽諸生所誦能舉其詞無遺先禮部府君見而竒之每出句以試能應聲而對往往有出人意表者由是鍾愛尤篤天性孝友豫每公退必拱俟于門雖風雨不少替有不樂則繞膝而娛必致樂乃已與兄弟處雖一殽核必待悉至然後敢食以是兄弟怡怡人不知其為異母出也每受教於兄栻後栻亡哭之必慟諸親長止之乃曰天不獨亡吾兄又奪吾師也奚為不慟性復仁厚幼時為僕抱而仆于地豫怒而杖其僕後雖仆不言或問之則曰言則彼又受杖矣蓋從豫居京師者二十餘年豫初以禮部侍郎考滿恩例許遣一子入太學以吾兒常習舉業欲俾就之則以生後讓其兄元楷元楷亦不願先帝録溥侍從微勞特授中書舍人未幾南歸畢姻遭母喪哀毁踰禮疾乃作豫聞而憂之然天意遽至於此以貽豫無涯之戚乎吾年未下壽而吾髮已種種三嵗間既喪吾妻又失吾兒胡不相豫之甚乎吾兒名元概字𢎞量姓徐氏常之宜興人曽祖鑑瓊州府知府祖琳並贈禮部左侍郎兼翰林院學士母淑人李氏以天順癸未十二月十三日生年二十六於是其兄元楷元相以卒之年十二月二十五日葬于縣南張和山之原先期以書來告因述此俾刻石納諸壙中吾兒娶今南京吏部尚書晉陵王公之女無子以元相之子文熺為後是為志墓表徐知州墓表成化十五年荆門州父老詣闕奏前知州徐泰憂制且終願畀復本州以終惠斯民者詔下吏部從其請君既之任治事未幾疾作以其年十月二十四日卒享年五十一既返柩於鄉將以又明年十二月二十一日葬于無錫界馬鎮村福昌里之原其兄中書舍人惟正以書來曰頥失吾弟不幸甚矣惟吾弟有二子元榖元菽皆幼未領人事凡經紀喪事非吾誰為之治兹既略備矣惟墓上之石當得文詞以垂示後人非執事又誰宜為之敢以卞户部華伯之狀來請豫與君交三十年知契最深非特以鄉里之故而已於誼實宜書乃不復辭君諱泰初字士亨後更大同而白生其别號也幼而穎異既長入縣黌從經師習尚書益好學不以家用饒而喪志嘗舉于鄉不利以貢入太學得與天下之士游而謙厚若無能者大司成甚優禮之當景泰丙子嵗順天府行鄉舉而吉水劉文介公主試得君文竒之擢第一時有忿子之不預者言于朝謂所司去取士失當且謂君出富室殆有私也宜復試大臣持正者以為不可特試五經魁於內閣君文詞義燦然無忝為解言者始慙而名益彰於時矣後試春官在中列比剝卷主司見君姓名以嫌竟不取久之歷正臺憲例選通法律者授御史君在優等復以謙退授黃之羅田令六年政績大著遂擢知荆門州在羅田時為政專察民隱不拘拘簿書之末教民務農凡無牛種者官給與之值嵗大祲悉發義倉積粟以賑饑民有尫羸不能行者則隨所居作饘粥食之鄰邑來乞食者亦不拒一時賴以活者甚多更招徠逋逃復業者則蠲其役仍給官田使耕而食其入公暇數出存問疾苦隱然有古循吏風邑人嫁娶論財故多不以時始下令禁之有户將絶而出繼他户者官為出錢贖還其家富民買田多隱稅廉其弊發之貧者始免催徴之纍黃屬邑凡七民相率走藩臬請得君守郡疏上未報適荆門守闕遂補之荆門之政大率如羅田其俗則頗難治君禁令嚴明民不敢犯㑹夷陵有疑獄巡撫大臣檄君往讞疑遂釋人尤稱之前後兩任數興廢舉墜而學校之士多所造就所得公錢悉市粟以儲義倉其廉名又人所難及者是以去任民爭挽留之既沒尤思慕之不忘君為人孝友居父母喪能哀治葬必厚兄有疾輒宿禱于神以祈祐終夕不成寐弟坤幼延嚴師誨于孰冀必成立家雖饒裕見族有服用侈靡者必深戒之而人以患難貧窶告則惻然周給不以財力計也君常之江隂人曽祖均平有隱德祖本中國初以人材徴卒而旌其墓曰義民父景南義聲尤著以出粟賑饑受官蓋徐氏之積德非一世矣至是乃得君兄弟然君官至下大夫君之壽甫入中嵗報施之道茫然莫考也夫禾之有穜種之先而獲之緩獲之緩而收必多世德之家蓋亦類此然則徐氏後人其復有興者乎因録其事行之槩表于墓以俟永寧州吏目贈行人正楊君夫婦墓表成化辛丑新都楊春登進士第既而念其母老歸養於家居數年其母益康健促使入朝乃授行人司正初考最以例贈其父如其官母封太孺人踰年太孺人卒春將歸葬詣豫泣且告曰先君平生官不稱德而卒葬久矣今吾母復不幸而春繫官于兹不得躬治斂具心竊痛恨惟墓之文乞憐而畀之敢以所為狀上豫與春有斯文之雅且感其言不能拒也按狀楊之先本楚人在元嘗為武官後避亂於蜀因為新都人有諱賢者贅於李遂冒其姓賢生壽山娶某氏生君諱文字美玉少溫恭謹飭舉業之暇尤喜攻書由鄉校貢入太學以家貧乞仕逺方得永寧州吏目永寧在貴州蠻夷中君安之不以為事日治公事有不便民者輒私告其長吏除之後夷民知其出於君也皆感恱或來稱謝君辭避不敢當推之長吏吏復賢之久而土官浸知其才凡旁郡事有不治者屬之君輒治嘗督工役築磨泥普施二城費省而堅完至今人稱之州有弃地數百里與水西夷田相接其酋以官無圖籍私致白金千兩欲得其地君適攝州事拒不納曰吾官雖卑然亦守土之臣也地為王土可以私與人耶他日長吏竟利其金與之君每以為恨景泰癸酉九月八日以疾卒于官享年六十三葬本邑某山之原君初娶郭氏繼某氏再繼熊氏則春之母也方君游太學時熊氏家居熊自為衣食計而節縮日用以資給其夫逮從居永寧奉養既豐亦不肯妄費一錢後其夫與郭氏二子相繼卒負遺骸歸葬備歷艱苦所過地必號呼亡者告之從行男女數輩雖旅次倉卒皆有區别既歸顧家尤貧遣春就學脫簪珥以助其費以其夫遺命令復姓楊氏初目眊已數年及見春授官與其孫延和再登進士第目豁然復明年八十二以𢎞治壬子二月二十一日卒祔葬墓右子男五人其二曰逺曰政郭出俱先卒其三曰春曰惠曰哲熊出女二人亦郭出長適翟贊次適鄉進士單麟孫男十人曰廷和翰林院侍讀廷豫廷平廷萃廷像廷闕女十三曽孫男五人曰慎曰惇曰愷曰闕豫嘗讀歐陽文忠公瀧岡阡表載其父崇公存心之仁及其母夫人誨言之善竊歎公之所以顯於世者維其文章德業見重於時亦其先德深厚有以致之所謂其來有自者也今觀楊府君與熊孺人之事其殆類此故其子若孫列官于朝漸至通顯亦足以驗其先德也豫以是表之桂陽同知前中書舍人楊君墓表楊世出漢太尉震唐季徙家閩之浦城又徙建安入國朝自故少師贈特進光祿大夫左柱國太師文敏公以髙文絶識弼亮四朝功施社稷勒於鼎彞號稱名臣垂休襲祉奕世有人而楊氏遂為仕族之冠君諱仕警字敬甫贈少師工部尚書兼謹身殿大學士諱伯成之曽孫文敏公之孫貞靜先生諱錫之子也少習家學以詩經中天順己卯福建鄉試禮部弗第卒業太學聞見滋廣聲名籍甚六館諸生咸推讓之再試不中乃以䕃授中書舍人三年坐從子曅纍謫廣東衛經歷六載考最竟歸卧于家闢一室左右圖史寢處其中日翻閲不厭暇則課子孫讀書種桑棗藝蔬果於世途聲利漠如也𢎞治改元詔起沉滯吏部知君謫非其罪特以桂陽州同知奏起之檄至君歎曰吾老矣憊矣安能復與時輩追逐耶竟不起𢎞治九年六月十有九日以疾卒年六十缺娶江氏某參政之女子二易鄉貢進士暹治舉子業孫男二女一卒之明年三月二十日葬邑之登仙里劉墩之原君偉貌疏髯氣岸軒揭平居恂恂簡重而臨事能卓然樹立其在衛幕秩雖卑能搜剔奸蠧有怙勢者必以法裁之吏士竦服生長綺紈不為奢靡華麗之飾聞人有異書則購之不惜重價所録自唐宋以及國朝諸子百家凡數千卷皆手自校讐近世稱藏書之富者殆莫加焉且長於鑒賞法書名畫一見即能定真贋或有書淫畫癖之誚君笑曰視寶異物者何如哉尤尚行義赴人之急如不及其在京師士大夫之賢而貧者每取給焉弟仕儀蚤天有遺腹子且撫且誨愛如己出今考工員外郎旦也成化間君數過豫閒論古今事亹亹不竭豫心獨偉之謂如君者非獨為閩産之傑也於乎以文敏之勳蓋所謂猶將十世宥者而君一從吏議擯外十餘年其從弟仕偉才譽相上下亦坐是纍謫以死是孰為之耶世嘗謂天之於才必愛惜而培植之其果乎如此耶豫與君善者喜其好古篤學重其行義惜其不遇於時而懼其遂泯沒於後也故為表於墓以告後之人尚勿毁哉封山西道監察御史何公墓表都察院右副都御史何君鑑嘗知吾宜興豫重其為人因聞其家世之舊庭訓之善得厥考朴菴公之賢公既卒鑑奉工部左侍郎徐公貫所為狀請豫文表於墓道之石乃托而書之何之先本青州人五代時有曰茂者仕吳越為節度使卒於紹興之新昌子孫因家焉代有仕者祖諱友諒國朝為訓𨗳祖諱遵道考諱彥廣皆隱於鄉公孝友信義出於天性甫弱冠即代理家政力田供養奉時祀館賔客婚嫁弟妹皆不以煩其父後當分異父念其勞欲多與之公獨取瘠田敝屋悉以器物讓諸弟母愛少女既嫁公猶析産與之父母疾公不去左右至籲天請代居喪毁瘠葬祭皆如禮尤重意氣間遊京師里人有以白金數十兩託公有所營置道為賊所劫公為貸金終其事而還過杭得遺金一囊於道俟其人而還之嵗饑里人乏食捐粟濟之有借公馬者斃而償以價公慰遣之而不責旅次寧海開户而卧有虎當門耽視久之搖尾而去園有瓜二實一蒂人稱瑞兆以為隂德所致公教子有法鑑舉進士知宜興時遣使迎養公以親在不果行常書清慎勤三語為戒鑑為御史復勉以許身報國後被封為文林郎山西道監察御史知河南府時公已終制乃就養無何直大饑人相食乃歸命鑑悉心賑救以全民命及鑑為都御史巡撫南畿又戒之加說詳焉故鑑所至有聲績在兩畿尤卓卓可稱者皆公教也然則公之賢使身得一職任一事以自用於世其禆補豈小哉公以齒德當為鄉飲賔辭不赴沒而葬於鄉則為之刻石著德以示後之子弟禮亦宜之非徒為孝子之私而已公生于永樂己亥六月初九日卒於𢎞治乙卯正月初二日壽七十七以丙辰年某月某日葬于某山之原配吕氏賢而克相封孺人子二長即鑑次銶女一適劉演林勿齊先生墓表先生姓林氏諱智字若濬别號勿齊系出唐邵州刺史藴之後世居閩之莆田曽祖崇寶父德如皆隱居不仕先生生二年母陳氏沒又五年德如翁亦沒賴繼母鄭氏撫而鞠之稍長出從里儒授尚書習舉子業尋補縣學生正統甲子中福建鄉試戊辰㑹試中乙榜授宜興縣訓𨗳至則嚴立教條示諸生以讀書作文之法俾各有所依循晨必衣冠張燭坐堂上朗誦經書已而取古法書臨摹至數百字手倦則復誦讀以倡諸生日以為常雖祈寒盛暑不懈諸生亦各勉修士習為之一變大有補於學校秩滿升銅梁教諭未幾丁母憂服竣復除宜興舊德先生之教者踊躍趨迎及士宦子弟悅從者數十輩大肆講學文教聿興提學御史陳選舉先生自代吏部雖不能用謁選之日遂升縣令先生謂人曰當道宜用人所長某將老矣安能舍詩書而事簿書哉博一教官終身足矣崑山葉文莊公時為吏部侍郎知之擢蘇州府教授先生至蘇學其教法無異宜興時諸生始若不能堪久之服其化益親愛之致有身為顯官而追念不舍者先生前後為校官幾三十年皆在江南而四方縉紳多聞之故每當大比之年藩省爭先禮聘為主司考浙江者一江西者再凡所取多知名士稱為有識鑒云先生性至孝常痛父母早世每春秋時節祭祀嗚咽流涕者竟日祖祠舊卑隘撤而新之增祀田若干畝婦翁趙立沒而無嗣為之經紀其喪得免暴露甥陳元幼孤擕之官教育之與諸子等既長復為之娶婦乃遣之歸其他周貧睦族重信義事多類此生宣德丁酉六月十日以𢎞治甲寅正月五日卒享年七十有八以某年某月某日葬某山之原娶趙氏子男八人曰巒嶽密岊嶅仚岫昆巒早卒孫男女二十七人曽孫四人嗚呼先生之德之學莆人知之蘇人知之豫宜興之人知之豈待表而後見然天下不可以莆與蘇與宜興槩也而能盡知乎况數世之下又有可恃者乎是固門下士所宜憫而憂之者某於門下受教為最先故特為之表而不讓焉贈懷逺將軍錦衣衛指揮同知寧公配陳氏墓表正統己巳廣西弗靖今贈懷逺將軍錦衣衛指揮同知寧公卒于寇難其配陳氏與其次子瓌皆相失莫知存亡獨其長子瑾無恙事平瑾遂選入內庭年始十一既長資性明敏益見向用積官至御馬監大監後三十年為成化庚子瓌獲生還至京師大監公見之甚歡又六年成化乙巳陳氏亦還大監公遣人迎至京母子相見如故時憲宗皇帝在位今上在春宫聞其事為歎異暨太皇太后太皇后皆有賞賚既而瓌從征大同纍功升錦衣衛世襲指揮同知因得賜誥贈其父如其官而其母封太淑人居數年太淑人思歸故土瓌具疏乞恩特蒙改廣東右衛以便侍養太淑人之歸也三宫賞賚之厚復如前日人皆榮之既抵家數月俄以疾卒大監公聞訃哀痛上賻祭加厚并命有司造墳安葬太皇太后皇太后暨諸王亦皆有賻大監公乃擇明年某月具其父衣冠合太淑人葬于邑白雲山之陽來乞文於墓上而騰驤指揮劉澄為之狀惟寧氏世居南海東充都大良堡人後割其地增置順德縣故今為順德人先世嘗有顯者譜亡不可考入國朝有諱日華者生武安安生公其諱真字克誠為人淳朴不好華靡居常茹素以殺牲為戒處鄉里尤善扶持患難周濟貧乏人素賢之其生永樂己丑沒于正統己巳得年四十太淑人性勤儉善理家人所以賢之者如此其生永樂辛酉沒于𢎞治癸丑七月九日也子男二長即大監公少侍英宗皇帝于乾清宫今掌清寧宫事兼提督五軍營凡朝廷有大昏禮并四夷宴享多委之次即瓌孫男一尚幼夫人有善行雖不幸遭變故亦未有不獲報身後者如公之死其不幸可謂極矣乃生大監公以忠勤事上稱賢近侍克致恩典與其配雖存亡不同而同享其盛則一而已要非偶然者至若大監公身雖在內而夢寐不忘其親其誠孝所感卒獲與其母若弟相見又豈偶然哉是宜書之揭于其墓以示其後之人云曹府君徐孺人墓表嘉興有名族曰曹氏曹氏有賢配曰徐孺人諱秀澄同郡嘉善儒家女也父曰文玉母曰陸氏以永樂甲申四月四日生孺人既笄歸于曹為以東府君之配孺人自幼端重寡言笑在父母旁循禮度而孝敬不倦及為婦事以東能執婦道性尤勤儉恆率諸婢晝夜紡績不以為勞家人化之諸刺繡纎巧之作皆愧縮不敢出視生子瓊教之甚嚴瓊奉母教若鄉慎行務農生殖稱克家子其後産業日盛食指日繁孺人卒不習侈靡事及以東沒寡居五十年布素終身未嘗更一新衣其勤儉自若也有孫曰山早失母孺人憐其幼躬自鞠育雖甚愛之然教之益嚴俟其既長俾學于家孰日必考其課業或書不成誦則聲色俱厲不少為容貸平生不喜尼媪有登門者輒麾之去曰無壞我門法其正如此孺人好施不吝凡鄉里之貧無食死無葬者必命其子周恤之嵗饑視人親疏悉以次賑給之食其惠者甚衆及其子沒至山益好施與士大夫交游益廣而曹氏之名籍籍起浙西謂其世範固逺蓋亦有孺人之教焉孺人既老山奉養備至年九十三而卒實𢎞治乙卯九月九日也子一人即瓊承事郎娶陸氏孫一即山以中書舍人娶錢氏四川按察使博之女曽孫男六人嵩邑庠生崟岑岩崙巃卜以丁巳十月二十四日葬邑之柳溪合夫兆也山持狀赴京師詣豫泣拜曰山非祖母鞠育無以至今日所以不逺數千里躬造門下以請者唯欲得一言表于墓上以彰吾祖母平日恭孝慈節之美則泉下永有光矣豫感而言曰昔人有言婦者家之所由盛衰也故中饋之吉著於家人厲階之害見於大雅其事不誣往往可驗則曹氏之盛孰謂其無然哉宜刻之以慰山之志以示諸來裔虎賁左衛經歷張府君墓表府君既沒之十六年其子欽虎賁左衛經歷三載考最蒙恩贈府君如其官階徴仕郎母馬氏為孺人於是欽泣而念曰朝廷不遺下臣施及恩典吾父母不幸皆不及見痛恨何可言吾將致其事歸守先墓謹録敕詞燎之以告于地下顧惟墓上之石尚無文以刻又何以發濳德昭慈訓而見寵光之來之有自耶乃奉山東參政張克謙之狀晉謁再拜而請豫與張少相知而經歷君又邑人也不能辭取其狀視之語皆不誣按狀府君諱亨字嘉㑹世家宜興為宋參知政事磻之後自曽大父國用而上居邑之橋亭里人稱橋亭張氏國用仕元為鷹坊提領生廣德州學正茂卿茂卿以族大遷今所居曰張渚是生師賢師賢生愈髙愈髙生致逺致逺生三子伯曰本彞季曰伯常其仲為府君府君生而純雅稍長從仲父致和學致和嘗為信豐令剛毅方正教導有法臨諸子甚嚴獨愛府君由其孝友明順不煩束約也正統間大臣有奉敕循行江南主斷繫豪民一時健訟者蜂起或訟其考翁事連信豐並被將逮至京師府君於時極力營救往返道路數冒艱厄不自恤也其事卒白人皆稱為能子其平居父母之側溫然無違禮母周氏沒事繼母黃氏孝養不替兄弟相處怡怡如也雖衣服飲食無弗共者及推以待諸從昆弟子姓以及姻戚朋友皆為篤於恩義雖僮僕無不善遇之以至人有急難周之不吝其事不能枚述嘗客金陵同舍人遺金數斤獲之弗啓竟迹其人還之其人出半以謝拒之毫釐不受又嘗獲監引於道坐候其人少頃有泣者至則一富商奴所遺即與之奴謝曰非公吾必死主人之手感拜而去鄉有窶人缺食而貿其屋既給之粟而使復居之如故曰俟嵗稔償我未晚吾不忍汝飽而無居也鄉舊産茶四方來鬻者必實其直奴輩有不豫者曰若欺心而增减之吾豈可為哉因之以戒諸子姪凡息錢租粟之入宜寬貸而勿斂怨如此庶家門可保而久也有司屢役掌鄉稅不事掊剋嵗饑更出粟數百斛以助賑濟郡縣欲例授章服則辭曰吾安于韋布久矣敢冒圖榮顯耶邑大夫嵗舉鄉飲禮請為賔至再即辭謝不出教子居京秩雖不獲生受封命然人間之福安享已備可謂無憾于世者矣府君晚號真率翁壽八十有四以成化七年某月某日終於正寢後某月某日其配馬孺人亦卒壽八十二孺人出同里士族少有淑行及歸於張婦道母儀皆有可稱以卒之某年某月某日合葬于南華山之原子男四人曰原曰思皆克家曰欽即經歷君曰銓女二人長女適義官吳佐次適士人蔣昕孫男八人女四人曽孫男五人夫德之優者不近名以為髙足以轉移乎風俗産之厚者能散財而益富足以庇覆乎鄉閭觀於府君可以槩見為張氏後人者尚嗣其仁於百世之下使君子之澤無有窮也噫此固府君之意也傳南京工部尚書劉公傳公諱宣字紹和一字應召號靜齊姓劉氏其先南康人也在南唐有諱適者仕至工部尚書生君造以吉州推官留家安福谷木坑故今為安福人君造生璞南唐進士至宋三世補太學上舍時人因稱三舍劉氏公生七嵗而孤遭家多故能自力於學不隨同輩嬉戲從故禮部侍郎李公克述習春秋精勤不懈父戍盧龍而沒躬往代之雖處行伍中不廢讀書其志必欲以科第自顯時麻城鄒公來學以都御史巡撫其地閲其業大驚待以殊禮景泰庚午應試京闈鄒公送之郭外舉酒祝曰汝此行必取解首否則無相見也衆竊笑之是嵗故少詹事劉文恭公主試得公文卷竒之置第一如鄒公言明年㑹試禮部髙等遂登進士第授翰林庶吉士壬申授編修丙子修一統志成升修撰天順甲申憲宗嗣位充經筵講官成化丁亥九載秩滿升右春坊右諭德修英宗實録成再升右庶子庚寅擢南京太常寺少卿寺事多廢公建言十三事皆見采納丙申丁內艱壬寅改除進本寺卿掌國子祭酒事公為師待諸生甚厚而差遣必公考校必明無不恱服者琉球國遣子弟就學公舉舊制令所司給其日用之費他日其子弟奉白金一斤為束修公力卻之已而復以其半為奉事聞于朝及得㫖乃受丙午召為吏部右侍郎丁未夏旱奉命祀北嶽地鎮𢎞治戊申今上嗣位再進左侍郎公以漸衰求閒始拜南京工部尚書知公者乃惜其去公欣然以行至則㑹計出納革絶侵漁未幾財用頓積而推舉屬官以激勸其下人人皆為率職蓋嵗餘以病不起辛亥七月十日也享年六十有七公少罹貧苦在盧龍時游學京師每徒步往返為寒暑所中輒疾死道上逾時始蘇嘗建言禦邉四事其後有己巳之變果如所料及寇薄京城從禆將守備天津多所補益軍中有誘歸及欲妻以女者皆不從其窮時已不茍如此惟耿介疾惡是是非非不狥于人尤好面折人過晚乃務為優容善論事引援證據聽者忘倦多知國朝典故每事能悉舉無遺故尚書姚公為吏部時以慶成宴坐位未定詢及公為言舊制至今以為式至功臣世系述其源委歷歷如指掌若山川險易雖逺在數千里外皆能指畫不差人服其該博平居事母至孝迎養於京每旦趨朝必先問安遇一美味必手自奉進兄沒撫其孤女嫁之如己出事再從寡嫂及遇族人皆有恩意族有爭訟者開𨗳以理使各釋然以去諸子教之甚嚴與其配王淑人必揖而後食居家自奉至薄食不重味一衣至四十年蓋其儉素又如此讀書務求精熟為文章必以理勝不喜作新竒語有冲淡集藏于家祖諱某父諱某並贈南京太常寺卿妣並贈淑人三子長秉常國子生秉善邑庠生秉監女四人論曰公卿起諸生一旦富貴遂忘其故而為驕侈之習者比比如劉公祿位已崇所持猶寒士雖古人何以加之且士非困窮不能自立所謂貧賤憂戚庸玉汝於成也公之志甚大力甚堅惜未得專乎其位而盡展之故其事業之所立者止此然其名則豈有久而不傳者哉豫與公有斯文契因書此以貽其子俾藏之為家傳云祭文祭湖廣僉事張公湖廣按察司僉事張公惟公少時負俗之纍奮發于心黽勉于事績學精專莫之或先鄉榜甲科遂爾連連列職中朝官階斯轉繼躋外臺仕路益顯雖則顯矣如忤物何奉身而退其樂則多公身雖屈公名則完公志不遂公心則安母氏髙年幸供子職孝養期終疾疹俄亟嗟我與公豈直同年既忝鄉閭復結姻㜕聞公之喪哀痛倍百繫官于朝欲往弗克聊馳一觴惟寫我心魂如有知為我來歆尚饗祭某淑人母子文祭某淑人母子之靈曰言言髙堂有此女師靜專其德慎淑其儀身安享乎晚福子顯庸乎明時謂非修內行而獲隂報豈榮壽若是乎兼之緬懷昨嵗登堂獻巵指瑶池以為酒倣南山而賦詩恍壽顔之在目曽陳迹之遽違夫何倚伏之不常哀樂之難期望婺星而光滅悵萱草之色蔞惟苫塊之哀重致傷生之可悲視疇昔而不若撫二柩以纍纍設茵鼎而孰奉置槃珥其何施念子道莫大乎送死顧家禍何緣而重罹曰惟不死惟孝與慈帝有諭祭之文史有表阡之詞棘心寒泉可慰在兹嗚呼尚饗荷誥封三代祭祖文某荷誥封三代祭祖某仰承先訓屢荷聖恩載錫贈典始以七品贈父封母既遷五品恩隨以加後官侍郎繼職宗伯重蒙恩加及二代兹者宫保秩滿又得推恩伏蒙制下褒及三代贈曾祖考光祿大夫柱國太子太保禮部尚書文淵閣大學士曾祖妣為一品夫人而祖考妣考妣及先妻之贈典亦如之給誥之詔方頒而加秩之命遽下今升某為少保兼太子太保户部尚書武英殿大學士一月之內兼此二榮是皆祖宗餘慶所及謹附祝文用伸昭告以亡室贈一品夫人某氏祔食尚饗祭長姊孺人文祭長姊孺人之靈曰與某同母實惟六人惟姊居長性行尤淳爰自笄年歸于故族婦道克持孝敬殊篤良人游學內助日劬忽焉中道賫志寡居僕耕于田婢織于室衣食能謀家業無失况初失子幾絶其宗終焉嗣續置妾之功撫育其孤庶見成立白首髙堂傷感抱疾自與别違嵗時屢歷繫官縻祿懷思戚戚忽聞訃來哀痛切激骨肉存亡永永嘆息煮粥無能揮涕沾臆敬遣兒輩奠以酒食尊靈猶存洋洋來格尚饗謙齊文録卷三
