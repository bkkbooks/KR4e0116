飛聽殘瑶瑟金尊滿讀罷黄庭寳篆微髙卧不知天地老此心應與世相違松軒為任廷芝題幽人結屋青山下種得長松三百餘啟蟄蒼龍上霄漢引雛白鶴到階除四簷雲氣長垂幕一榻秋聲可讀書我亦平生羨𢎞景買山何日與同居耕樂識破人間蕉鹿夢歸来田舎學為農也知郊外好牧犢未必山中無卧龍土鼓邠風歌調古瓦㿽社日酒香濃青山白水年年在牧竪樵童處處逢藥圃餘香誰開藥圃青山下元是神醫此托棲赤茯斸来如斗大紫芝種得與雲齊晴窓細檢桐君譜夜月閑分木客題賸有餘香遺後嗣握蘭長日侍金閨東臯草堂為王景昇題三槐世澤深如海今見東臯有草堂舒嘯可追陶靖節風流還憶賀知章桃花春水畫船小秫稻秋風白酒香我欲脫冠尋舊約故園山色對蒼蒼賀王廷貴先生陞侍講幾年侍從依青𤨏華秩于今喜載遷科目也知惟我後文名誰復在君先花甎步濕春階雨芸閣吟殘午篆煙台鼎勲階應次第晉陵槐澤正緜緜題呉尚書忠烈巻翼翼穹祠枕碧山萬株喬木䕶禪關若教功在伊周下贏得名留宇宙間生氣百年渾不死髙風千古信難攀天憐忠烈多孫子賸有遺芬在世寰石磵書屋書屋亭亭石磵隂紅塵不到晝沉沉細看邵子圏中理漫拂師襄膝上琴纔向靜中探月窟却從復後見天心殘書幾巻遺諸子絶勝滿籝都是金内閣二瓷缸乃憲廟所賜種蓮者三年不開已今年盛開因賦二首紀事誰道盆池有許寛荷花着雨溢清寒風前兩兩如相語水面亭亭自可觀大世幾同黄閣賞化工寧費絳綃攅煩襟五月何由滌香露淋漓瀉玉盤太液池頭一種分香風乍起隔簾聞清留葉上團團露紅動波間冉冉雲道眼濂溪曽入詠仙姿姑射易成醺年来定有如船藕莫問當時太乙君次同寅劉少師韻二首為愛西湖近太清玉池汲水浸瓊英為衣未解靈均意觀物元知邵子情開占朱明天與艶種當紫禁地増榮自從春去花應少留與羣芳作主盟日照漣漪徹底清髙荷初着兩三英翻翻似欲撩人語脉脉誰能解物情勝事儘教留左掖芳根贏得託南榮何時遂我歸田願曲沼芳塘叙舊盟疊芍藥韻詠荷蕋愛新陽葉愛隂碧池過雨水深深已從紅蕾知鮮艶未擘青房識苦心嵗事栽培應有待物生開謝每相尋看花悟得無言處漫向風前作短吟凌波仙子月中歸水面盈盈見步稀似伴紫薇同我往肯隨芳草傍人菲並依玉砌如相語斜逗朱闌不受圍開後東風渠不怨置身元在掖垣扉詔許歸省曉承恩詔許南旋暫輟清班下講筵新賜宮袍纔五品重来鄉國已三年園中斸筍晨供膳湖上看山夜放船記取玉堂相送意春風嗚佩早朝天虎丘寺閶闔門西第一峯白雲踏破幾重重聽經石在猶疑虎鑄劍池空亦有龍古木撑空知歲久落花繡地覺春濃老僧留我盤桓處隱隱東樓起暮鍾留别虎丘簡上人逺公一别廿年餘今據猊床喜自如香動墨花時寫偈影翻貝葉晝看書人間行跡如蓬轉物外禪心若鏡虚飛起竹邊雙白鶴談𤣥未已煑茶初内閣芍藥二首呈李先生禁城遲日曉隂隂紅藥翻階紫閣深香雨乍沾殊有態綵雲長䕶豈無心玉堂封植人何在金鼎調和事可尋幸遇清時多暇日退朝嘗得對花吟名花獨自殿春歸一種人間得見稀不逐人情誇富貴故知天意與芳菲仙姿合種瑶臺側盛事曽徵寳帶圍把酒看花成舊識年年相伴住黄扉壽鄉親蔣竹隱三徑徜徉一老仙耆英㑹裏最髙年翠雲凉露分詩榻白藕香風薦酒船舉世但知金璧貴幾人能見子孫賢懸弧此日逢初度為賦南山介壽篇壽胡方伯甲子初踰十五年幔亭髙㑹擬彭籛自憐洛社今多侶不信蓬壺别有天𤣥鶴一聲聞緑野綵衣五色繞春筵詩篇好配甘棠頌并與東風奏管絃壽陸主事母八十阿母髙年白髮新北堂懸帨此生辰榮封錦敕渾忘貴儉服荆釵不為貧海上蟠桃紅沁露堂前靈草翠含春賢郎望望孤雲切遥奉霞觴祝頌頻壽錢學士外舅莊公八十孤星光燭戴溪前野老今當八十年曽向清時膺寵命却来平地作神仙綵衣舞處人如玉綺席開時酒似泉珎重南飛歌一曲玉堂學士意懸懸壽溧陽楊竹泉逍遙何異地行仙甲子今逢八十年席上金杯浮㶑灔階前綵服舞蹁躚恩波正洽重熈日壽域方躋不老天雲漢仙郎今顯秩南山遥祝短長篇送九江郡判鄭廷韶雲暖天衢雨浥塵清風雙斾逺行人舊從桂籍知名久今向楓宸拜命新天入九江連郡治星羅萬室擁編民廬山五老多形勝公暇何妨覽眺頻煙霄鸞鵠正紛紛尊酒憐君是逸羣望入九江春欲盡恩沾雙闕曉初分郡中善政期㕘佐紙上陳言事見聞却喜盛年才力健好攄忠悃樹芳勲送李學士南歸次韻采采黄花帶露餐出塵風韻似君難文章蚤入韓公室詩律先登杜老壇三舘並遊誰少壯百年相見幾悲懽馬蹄明日燕南路草軟沙平雪半乾書生不慕五侯餐處世何憂跋涉難舊學自應歸鳯掖故交誰肯負雞壇雲萍未合長懸夢尊酒相逢且盡懽愛殺蟠胸千萬巻挑燈時見壁魚乾史局編摩每共餐六年相聚别何難萍蓬宦迹原無海金石交論故有壇話屢摘書評往事醉猶撫掌罄餘懽相留莫訝過深夜漏滴銅龍正未乾送平陽章自鑒授福寧司訓其父舊為吾邑司訓荆溪黌舎相過日三十年来一夢如久抱青氊存舊物忽看烏㡌荷新除路通故里歸應便座列諸生樂有餘想到閩州依海上茘枝榕葉暗齋廬送呉甥儼養病南歸甲科名譽藹鄉閭正是詞林績學初仕路衰年方賴汝客窓多病却思予暫歸得侍髙堂膳重到還看秘閣書聖代養材期大用無忘感激在閒居送仲弟時望歸率兒軰為義田之舉扁舟憶昨上神京知爾非徒利與名先志未忘年尚少義田應買議初成族同公藝雖無及制倣希文定可行莫惜殷勤為久計緘書早報慰深情送沈時暘之任三年宦邸最相親惜此分㩦乃暮春扳贈可能將白璧笑談聊爾破清塵東城雙斾花香滿南渡孤舟山色新便道還家良足羨持觴稱慶樂天真送尹正言父還太和清朝有子侍彤闈禄養如君古亦稀仙液浮香供夜宴宮羅剪翠作春衣謾論人世如浮梗還憶家山好采薇萬事不干真吏隱野鷗從此共忘機送齊經歴還嘉禾東南大郡重專城賛畫從来屬老成品藻無私書上最及瓜有待促嚴程黄梅雨濕雙旌重紫楝風吹五兩輕蓮幕可容虚席久兒童竹馬出郊迎送牟都憲改福建僉事繡衣玉節下征軺東望甌閩萬里遙攬轡羨君能奉使鳴珂慙我舊同朝聲馳八郡秋霜肅氣壓三山瘴霧消當宁憂民心正切呻吟指日變歌謡送莊進士養病歸金陵買得西風白下船秋来乞假許南旋曲江韋肈登科日西蜀相如抱病年行李蕭蕭唯藥裹宦情落落付詩篇黄門烏府專相待早約鳴珂到日邊送毛璿省兄南還為念難兄寓帝京逺来應叙友于情謝家夜雨池塘夢歐子秋風驛路程江岸黄花迎客笑海天紅樹照帆明到家賸有枌榆樂飽聽嘉平社鼓聲送徐士亨歸江隂征軺早發都門道强欲留君計不成五夜芙蓉城裏夢一杯楊柳渡頭情他年儗踏金鼇背此日先聽彩鳯聲遙想解元坊下路里人無數挿花迎送夏都運之揚州千載才名擅祝鳩官遷三品沐恩優還鄉正好懐題柱煑海功成不借籌東魯雪餘寒色重南淮春近曙光浮繁禧觀裏遙相憶折得瓊花寄我不送丁廵檢赴任順昌晉陵才子三公後一命還沾雨露深此日風光辭北闕平生聲價重南金故園春滿桃花塢官道雲連茘子林清世不勞神射力公餘柱笏足髙吟送年兄髙茂卿侍御督戎政西川看花曽共曲江遊憲府才華羨獨優久肅霜威峩豸角新承天語下螭頭香分殘菊都門酒影動征帆潞水舟兵政有成来獻績經綸事業屬嘉謀送崔元吉昨承簡命下鑾坡握手其如惜别何宦况在君誇特達年光於我感蹉跎邯山過雨羅青嶂洛水無風漫碧波好寄音書慰相憶郡中星使每經過送鄒廷佩知髙安雄才雅望拜郎官自信清時際㑹難曉日鳴珂辭北闕秋風驅騎入髙安政聲喜共絃歌作惠澤能令士庶懽千里筠陽重回首一緘顒望托飛翰送李至德侍御南臺驄馬赴神京黄閣難兄慰别情聳壑蒼松堅晩節連城白璧擅時名盍簪旅邸啼鶯好分袂郵亭過雨清此去相期勲業重他年曵履侍承明送孔宗魯還鄧才華落落共稱賢闕里衣冠奕世傳明日馳心千里外何時聚首五雲邊停鞭謾酌青尊酒看劍重歌白雪篇相府平安遙致問秋風旅鴈正翩翩送同年趙廷縉昔年鄉榜喜聨名佐郡功髙沐寵榮奕葉詩書承世澤清風琴鶴振家聲西川倚棹吟邊景南陌看花别後情他日春風有歸鴈肯修尺素寄神京送錫山邵二尹還任清時曽應賢良舉藉藉鄉邦令譽馳白晝哦松知散逸紅亭折柳惜分㩦新秋驛路蛩吟早斜日江汀鴈落遲要秉清勤慰民望遷書指日下彤墀送張中翰使朝鮮騑騑四牡都門外一望東隅路不遙聖澤汪洋被清海使星燦爛麗丹霄岸晴楊柳如雲染山晩桃花帶雨飄王事有成先入奏承恩御席聽簫韶送劉君傳扶兄櫬南還南風自滴薔薇露試向離筵一賦詩望斷蘼蕪天際色折殘楊柳道旁枝半年共訝言旋早千里休教問訊遲獨有西堂春草夢鶺鴒飛處不勝悲送周廷瑜兩旬聚首長安館席暖驚聞話别何白雪有歌殊慷慨青雲得路莫蹉跎雨餘槐市炎光凈秋入蘭陵爽氣多最喜嚴慈尤矍鑠白頭林下沐恩波送王民望擢河南少㕘早年青𤨏擅才名薇省㕘知政不輕長劍倚天酬壯志踈鐘落月動離情夷門山色吟邊見洛社秋光馬首迎應與三槐緜世澤聨班鵷鷺位三卿送重慶聶震指揮英武堂堂正妙齡笑分銅虎出神京旌旂影動巴江道笳鼔聲喧蜀將城樓櫓春晴花氣重儲胥夜靜月華明方今選將湏才傑好展胸中百萬兵送陳永明歸宜興浩蕩風光二月中可堪歸思更匆匆不辭古道折楊柳應念小山團桂叢司馬壯遊千里别元龍豪氣幾人同故園親舊如相問老我黄扉兩鬂蓬送濮用明教諭炎風吹木急如號把酒送君心更勞客路定從今日逺詩壇不比舊時髙月明古戍聞孤角水淺長河積萬篙明入講堂垂化雨杏花春色映宮袍送周堯佐赴南京連日南風吹火雲郵亭對酒惜分羣十年玉署膺天寵兩地青藜照夜分鷺渚平蕪煙冉冉龍潭流水晩沄沄知君著述多髙興不比中郎但鬻文送王維臣歸省少年科第玉堂仙特許歸寧寵渥偏名譽儘誇同白璧文章爭羨似青錢鳯從上國啣丹詔人在西湖候畫船壽酒一尊稱慶處三槐堂上日如年送江東之歸省秋日都門楊柳稀離杯纔罷儼驂騑太沖作賦三都重司馬題橋萬里歸下峽濤聲隨處有連雲樹色望中微玉堂金馬論思地早約揮毫向𤨏闈送彭彦實兄還安成冠盖如雲把别觴都城東畔送元方征鴻嚦嚦聞青海禁漏遲遲想玉堂列嶂絶憐秋似画好詩應費錦為囊鄉園故舊歡相賀棠棣聨芳化日長送危教諭之桐鄉寒氊元不較勲階吾道東南育俊才晏嵗關河勞跋涉春風桃李費栽培五經洞徹文光夐萬騎縱横筆陣開最是諸生承教益短亭衰柳惜餘杯送張員外父南還萬事休論塞上翁南還髙興逐飛鴻凌雲貞柏千秋雪委地飛花一夕風行色不嫌歸路逺詩壇應許故人同天曹禄養恩無極五色封章出禁中送王民望使占城爐煙裊裊蓬莱殿天漢澄澄博士槎玉節倚雲承使命金函絢日出皇家成周禮樂儀文備異域山川景物賖從此恩光垂草木早歸輦轂候宣麻送李少卿還南京列爵容臺擅老成紫芝眉宇玉壺清熟司三禮追先哲細講羣書啟後生鳴佩朝天書上最揚旌出郭戒歸程金陵山水春如錦多少衣冠一笑迎送尹先之還寧波春来半月尚微寒話别匆匆不盡歡舞劍君能歌激烈緘書我欲問平安渡江白鳥舟邊見出郭青山馬上看莫道幕中無一事匡時好竭寸心丹驄馬行春為尹仁侍御題隂霾歛盡天宇清當春處處聞流鶯烏臺小隊出郊野宛轉驄馬花間行道上行人行且止還避當年桓御史都城九陌凈塵埃上苑千門滿桃李豸冠象簡生光輝繡衣鐵面霜亂飛觀風問俗徧廵歴日暮攬轡依然歸歸来衮職將何補入侍仙班屹如堵為采歌謠草諫書鞠躬盡瘁獻明主豺狼屏跡狡兎藏奸邪膽落民物康坐令四海日熈皥東風擊壤歌虞唐題雲山圗山窿窿兮雲溶溶人家向西水流東門前喬木晝啼鳥江上大魚春化龍主人閉門展書讀不知雨漬階苔緑興来欲覔子猷船訪戴山隂剡溪曲大塘漁樂為韓司訓大父題水雲之鄉逺城郭遨遊長是漁家樂天青月白一境平大塘那有風波惡世間大釣本不釣直鈎引得旁人笑由来在樂不在魚粒餌六鼇豈同調菰米垂雲秋釀熟醉来幾度西岩宿客星共解照桐江兩足何曽加帝腹雲鶴軒為韓司訓先翁題雲兮不作太山雨鶴兮不乘衛懿軒山間林下自蕭散幽人為侶居田園薄暮雲栖屋頭樹鶴立空庭不飛去雲兮鶴兮兩相忘習靜何曽離隱處一朝跨鶴凌白雲軒居閒靜聲無聞仰瞻霄漢望不及令人惆悵對夕曛題秋塘野鶩圗晉人愛書學野鶩庾家諸郎真不俗迢迢青晝圗畫開此鳥依然在人目良工手握五色毫寫出江南秋一幅羽毛絢日殊分明蜀錦新裁仍細簇荷花似避顔色鮮揺落紅衣動盈掬將身不入樊籠中長年占斷澄江曲雖然水面只卑飛逺志冲霄比鴻鵠弋人慎勿張虞機任渠自下清波浴題過廷章聽秋巻過君兩上黄金臺車輪馬足奔如雷亦有笙歌沸日夜笑語各出爭喧豗胡為作此聽秋軸上有蕭蕭萬竿竹化機不露斧鑿痕虚籟半雜鈞天曲過君聽此不聽彼城市山林信斯語靈臺湛湛涵清秋直與此君作賔主乃知心靜聽亦靜羣物紛紛由我定人間無處無秋聲我亦從之靜中聽瓊林醉歸圗為李大濟題杏花紅映宮壺酒藍袍盡是同年友不辭一醉向東風感荷恩榮世稀有歸路煙塵飛夕陽湏㬰海月生明光馬上倩扶玉山倒此身遭遇當虞唐君今作宰聲藉藉展取新圗尋舊跡為憶聨鑣紫陌春笑把霜毫揮醉墨江湖取友為顧景德題平生雅愛江湖遊金蘭之契皆同流道逢傾盖即如故詩歌伐木堪相求江波濯纓清可掬湖上乘舟頻往復何年許我社中来處處鷗盟慰幽獨滄洲圗為王慥郡守題人謂滄洲不可即我尋滄洲来咫尺黄堂太守住滄洲指示丹青得真跡持將半幅入京師一片寒雲墮瑶席春風吹花花欲然夜雨漲溪溪更碧扣船渡口問漁郎沽酒山中醉木客萬巻書藏鄴侯家一區地儗楊子宅紫芝赤箭滿地生甘泉香霧和雲滴沙隄日暮踏殘紅石室月明坐虚白回觀宦海何渺漫每念蒼生思捄䘏陸渾迢逓輞川荒眷此滄洲竟成癖題畫贈崔元吉何侯丘壑填胸臆醉来潑盡金壺汁江南一片好風光逺淡近濃天只尺木蘭舟小煖浪輕草亭春盡啼流鶯人生行樂漫何事明日落花風雨聲老懐儘有傷春意載酒登臨忘歸去對畫題詩正送君都城聚首知何嵗忠節為王信都督題聖王宵旰理天下首以忠節敦風化九重有詔錫褒嘉便覺家聲美無價憶昔王侯决戰時氣劘賊壘懸孤危英雄一踣天所惜草頭寃血青離離二九孀居婦年少貞松勁柏同一操保孤全節老閨門茹蘖吞氷秉純孝孤成樹立效竒勛手持哀疏干天閽㑹看恩波活朽骨大書金字旌髙門多少偷生背恩義此日過之應顙泚惟有綱常萬古名世上繁華暫時事紅梅花梅花本白今乃紅造化變幻何其工為嫌鉛粉妬清絶臙脂抺額肌骨融東風樹頭春拍拍别是江南一標格冶容未必茍隨時自有心膓同鐵石我家住近西子湖舊與此君相友于漁村煙月僧堂雪至今詩句懐林逋别来廿載金臺下往往人家見圗畫遮莫相逢面發頳愧我素衣今已化此日南宮靜不諠髙情脉脉兩無言玉壺新賜金莖露醉愛一庭春色繁縠沼承祥為方伯題十畝方塘甲第前廬江贑水遥相連乾坤佳氣孕靈秀散作五彩涵清漣紋成綺縠光如潑氣奪虹霓碧天濶豈無老蚌吐明珠還有神蛟起流沫迢迢銀漢有通津雲舒霞歛玻璃新天然至乃孰雕飾俯首試問馮夷神神云此瑞世無匹三百年来凡兩出衣冠疇昔在宣和先後青雲總超軼只今蘭玉盛昆孫朱輪皂盖盈髙門柏臺况有埋輪客分符大藩䝉殊恩文明有象信非偶地靈人傑誇江右從兹閥閱倍光華奕世書香傳不朽題桃花斑猫二首碧桃花下春風暖緑草鋪茵芳徑軟烏員引兒羣狎遊深院無人恣消遣蹲窺仰瞰或俯臨縱横上下相追尋曉日床頭殊可愛溪魚豈惜囊中金此種從来豈易得彪炳文章絢竒色銜蟬搏䑕何足論遺類應知自殊域畫工手妙不可當模逼造化真行藏披圗展玩漫題品滿庭生意呈休祥東風暖入藏春塢狸奴引羣三復五花容旖旎披氄毛草木蒙茸襯香土熒熒眼光一線微緑樹隂中日亭午徜徉仰俯真自適曵尾摩鬚或交股腥膻誰問食無魚捕逐寧知田有䑕朋儕親狎少忤觸子母追隨爭哺乳生生物性皆天然甄陶喜見陽和普五老圗羣黎欣欣生喜色四野于今開壽域老人並立望天門白首一生䝉帝德試問老人年幾何今見文孫至太和凌雲昨過蓬莱頂仙酒頻斟俱酩酊歸来金母復相邀熟徧蟠桃只俄頃天書共領到人間鶴馭初臨萬嵗顔嵩呼敬祝聖人壽壽比天地髙難攀我聞人云漢四皓又聞人云唐九老較之商山差若多視彼香山却為少按圗不必論異同圗中見面如相逢廬山西東白雲裏一笑分明五老峯含清樓并序吾性好樓居常欲搆一樓以便登眺未暇也𢎞治丙辰吾子元相聞予歸興已切將求解任乃能先意成志預於後院擇隙地一區建樓五楹前為重門以避俗後為方池以種蓮規制宏逺可愛越三年吾年已七十上章求退上不許又明年目疾偶作而吾不能出連上三章懇切求退上乃許之恩禮優厚何能報稱於萬一也及抵家樓已成矣暇日試登覽之乃見四面山水環繞意思豁然吾目不覺為之開朗因取謝靈運山水含清輝之句題其扁曰含清是誠一勝概也爰賦長句以識其事云陽山何逶迤銅山何巉巖洑溪隨山知幾灣我樓正在溪山間樓上四面皆青山溪流抱樓隱若環當時山水皆舊識久戀君恩歸未得山風溪月夢悠悠十載相望勞我憶一朝許歸䝉詔㫖未見溪山已先喜朅来樓上何所為仰觀山俯觀水水决决以向我山靡靡以相迎我一見之眼為明松巖竹徑互窈窕鶴洲鳬渚重迴縈朝披雲霧自拄笏夜弄星河時濯纓黄扉紫閣縱然貴故園山水能無情吾聞李白賦天姥又聞朱子誇武夷南中山水如此稀嗟我欲往力不隨何如此山此水含清輝樓中伴我娯我日暮長忘歸壽親堂為莫宗範題靈椿八千長不老東風萱草花開早熒熒南極夜流輝自喜雙親俱壽考春雲裁就五色衣時時戯舞供甘肥願將長繩繫白日笑看滄海紅塵飛送李應禎下第南歸得慎字赤驥昻昻凌八駿彩鳯翩翩下千仭日華五色炫文塲銳氣三軍臨筆陣且逐行歌杜少陵寧辭伴食盧懐慎明年三月桃花紅繞殿春雷一聲震送和二尹還任宜興吾邦少尹真瓌竒連艘千里来京師浃旬了却公家事南薫五兩催行期一杯餞别長安道吏民懸望歸来早哦松正爾及清秋觸處炎歊凈如掃送徐上舎南歸緑槐官道蟬聲咽故人相逢又相别橋門風雨未經旬便道歸裝向明發舊書可讀劍可看五色雲錦胸中蟠人生際㑹良有在㑹排閶闔呈琅玕送楊司諫之南京同雲漫澷未成雪故人握手都門别馬蹄蹴裂沙河氷鴈聲呌落淮隂月關西自古清白聲甲科早掇超羣英手持風裁下南國諫草日日来承明送蔣日章考最入廣信吾鄉作郡如君少别駕三年馳譽早却来報政上銓曹善最端能出塵表平生道同心亦同近年京國長相逢匆匆行李又言别一曲驪駒意萬重更道從容經故里七月天風凉似水雙旌遥指玉山髙民吏懸懸應久矣輓劉文羽醫官夙承三世業醫國更醫人一匕曽投我千金未報君凄凉蒿里夕零落杏林春旅櫬南歸日長揮淚若沄輓李翰林文章惟典雅行軰總相推聖主虚心日詞臣際㑹時詩中麟趾見池上鳯毛遺大器方垂用良材竟不支縉紳爭惋惜閭巷亦傷悲淵大才非短商哀理固宜靈車遵故道塋樹長新枝不盡臨風意含悲賦些詞輓同年方進士秋闈飛步冠羣英擢秀南宮羨老成貫月乗槎經蜀道看花連轡向都城泥金欲報先成訃薤露重歌最慘情難弟啣哀扶旅櫬西風白鴈送丹旌輓同年趙克周乃祖丰度翛然作隱淪玉峯南畔樂天真吟詩厭見催租吏賣藥頻逢種杏人天下鶴書丹闕曉人間蝶夢漆園春諸孫今已登華要忍見當年手澤新輓竹深章處士一夕悲風動㑹稽蘭亭遺跡轉凄迷定從天上騎黄鶴浪說人間夢白雞棋局無聲脩竹塢屐痕有印落花泥當時積德知多少月旦何慙重品題輓萬尚書祺風露蕭蕭易水旁官居行部忽云亡夢魂長繞黄金闕歸興空懐緑野堂八座功名雲路逈兩朝恩眷海波長歸来伉儷應同穴雙璧泉臺耿夜光時長孫煥從其父来省予愛其資美而恐怠於學也因其還賦此訓之愛爾年方少為人好向前長教從質朴慎勿效輕儇待賈開書匵勤耕守硯田早將科第繼吾老已華顛謙齋文録巻一
