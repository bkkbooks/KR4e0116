body:
  text: 謙齋文録巻一明徐溥撰䇿廷試䇿一道臣對臣聞聖人之治本於道聖人之道本於心盖心者萬化之原萬事之本也堯舜以是心而帝天下三王以是心而王天下惟其道本於心故聖人之道備惟其治本於道故聖人之治隆故凡欲求聖人之治者不可不求其道欲求聖人之道者不可不求其心董仲舒所謂正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方即此意也欽惟皇帝陛下聰明睿智足以有臨聖神文武自强不息紹祖德而誕膺天命應人心而中興邦家勤勵以親萬幾惇慎以𢎞萬化純孝之德播聞於宇宙之間仁厚之澤漸被於覆幬之下然猶慮負荷之艱而欲究弛張之善乃進臣等於廷降賜清問臣有以知陛下是心即堯舜稽于衆好察邇言之心湯文用人惟已望道未見之盛心也其復隆古之至治而開萬世之太平端在於此顧臣愚昧何足以奉大對然敢不精白一心以對揚陛下之明命乎請因聖問所及而條陳之竊以家者一國之所視效國者天下之所取法而兵民又所以衛民生而固邦本者也陛下於齊家治國之道練兵安民之方皆已行之有其效矣兹猶欲聞至計何先切望何最臣願陛下正心以為家國兵民之本而祖述於唐虞三代之迹正倫理篤恩義如堯之親睦九族道以德齊以禮如堯之平章百姓則九族既睦百姓昭明而家可齊國可治矣修車馬備器械而時其簡教如成周之治兵大閱有定制制田里薄賦歛以給其衣食如成周之分田制賦有常法則兵農相資守養相益而用可利生可厚矣若夫安上治民莫善於禮移風易俗莫善於樂而教化又所以復民性而正民德者也陛下於制禮作樂之方敷教𢎞化之道皆已行之有其驗矣兹猶欲聞損益所宜隆替所係臣願陛下正心以為禮樂教化之原而憲章於唐虞三代之制典禮者如伯夷之夙夜惟寅直哉惟清典樂者如后夔之八音克諧無相奪倫則損益適中而禮備樂和矣惇典庸禮敬敷五教如唐虞之教民者以教其民𢎞敷五典式和民則如成周之化民者以化其民則教化興行而有隆無替矣治者亂所倚也雖當治定功成之日茍或頃刻敬畏之不存則亂亡由是而至必如書之予臨兆民凛乎若朽索之馭六馬然後未亂之治可制臣願陛下心唐虞三代制治之心兢兢焉戒敕天命而無時少怠無微少忽則皇圗可保如磐石之固矣安者危所伏雖當民康物阜之時茍或毫髮幾微之不察則危殆由此而生必如周之文王民已安矣而視之猶若有傷然後未危之邦可保臣願陛下心唐虞三代保邦之心業業焉儆戒無虞而罔遊於逸罔滛於樂則宗社可保如㤗山之安矣書曰平康正直强弗友剛克爕友柔克沉潛剛克髙明柔克詩曰不剛不柔敷政優優聖人撫世酬物因時制宜之良法也陛下誠如詩書所稱寛猛相制剛柔相濟則陽以舒之隂以歛之執其兩端而用其中於民矣書曰五百里綏服三百里揆文教二百里奮武衛文以治内武以治外詩曰薄伐玁狁城彼朔方聖人安夏攘夷慎固邊疆之要道也陛下誠如詩書所載内修文德外嚴武備使頓兵以守務耕以食髙城堅壘而能却其侮於外矣君子用則進其國於昌明小人用則降其國於幽暗人才賢否之由誠不可不知也陛下屢詔中外進賢退不肖矣兹猶欲聞賢否之由臣願陛下正心以為舉錯之公賢者必進而不肖者必退如孔子所謂舉直錯諸枉則奔競之途塞九德咸事野無遺賢矣賞必施於君子而後民勸刑必加於小人而後民威刑賞緩急之間誠不可不審也陛下申敕諸司嚴爵賞刑罰矣兹猶欲聞緩急之宜臣願陛下正心以為勸懲之本有罪者必刑有德者必賞如虞書所謂黜幽而陟明則僥倖之心沮百工惟時庶績咸熈矣人事有得失而災祥不能無徵應也陛下誠省身修德敬天勤民於上羣臣咸盡忠竭力奉法修職於下則雨暘順而百穀登禍亂銷而千災殄矣時政有治忽夷狄不能無窺伺也陛下誠賤貨貴德愛民好士為之本諸侯咸攄誠宣威練兵鼓勇為之用則信義立而强梗化夷狄賔而蠻戎服矣凡此數者何莫而非本於陛下一心之運用乎夫心固為致治之本而古又為致治之法傳說所謂事不師古以克永世匪說攸聞孟子所謂為髙必因丘陵為下必因川澤為政必因先王之道是也若使徒稽諸古而不以施於事則為徒善不足以為政徒泥諸古而有不宜於今則為徒法不能以自行故必益之損之與時宜之如中庸所謂時措之宜乃可也陛下之䇿臣者臣既畧陳之矣臣於終篇竊有獻焉臣惟天地之所以能成嵗功者以其常運之不已也帝王之所以能成治功者以其常德之不衰也陛下德配天地明同日月誠又存持乆之心秉有常之德則何所往而不宜哉書曰常厥德保厥位將見四三王而六五帝叅天地而賛化育歴數衍億萬斯年之久聲名施中國蠻貊之遥皆在於此尚何負荷之艱之足慮哉臣荷䝉教育之恩来應賔興之詔學不足以博古識不足以通今誤辱九重之清問獻以一得之愚思干冐天聰不勝怖懼臣謹對奏章題為救荒事成化二十年九月初八日節該奏欽依著臣前往山西地方致祭西海等神為民祈福臣仰惟皇上之心視民惟恐有傷保民真如赤子之盛心也斯世斯民何其幸歟臣奉命惟謹於本月十九日起程二十八日到於山西布政司行仰本司委官督屬將銀兩鈔貫轉行該府州縣照依時價兩平收買品物備祭隨擇本年十月初十等日如儀沐浴齋戒躬率各該衙門官貟人等陸續致祭中鎮霍山之神西海之神河瀆之神祭畢仍行本布政司將給領收買過銀鈔品物數目徑自奏繳外臣自入山西太原府及抵蒲州盡其境界看得山西地方旱災於前霜傷於後太原一府汾州一州并所屬州縣今年秋成約有三四分熟此處人民今冬可過来春乏食平陽府迤北并潞遼沁三州所屬州縣今年秋成約有二三分熟此處人民冬初可過冬深乏食至如平陽府迤南所屬蒲解等州臨晉等縣及澤州所屬沁水等縣秋成全無即目人民已是採野菜剥樹皮度日扶老攜㓜遍於原野而流逋顛連塞於道路已嗷嗷待哺矣今冬加以寒凍所迫不知何以存活况聞山西地方連年薄收倉庫多空官司雖欲賑濟而莫知措手又兼邊事方殷饋餉惟急人民愈覺驚惶誠恐流移日衆嘯聚山林意外之虞又不能保其必無也洪惟皇上一德動天百神感格化災為祥行有日矣但此等民情皆臣目擊耳聞不敢隱黙縁奉欽依救荒祭祀事理為此具本親齎謹具題知奏為乞恩祭塟事臣原籍直𨽻常州府宜興縣人由進士除授翰林院編修天順元年恭遇皇上毓德青宮先帝命臣兼司經局校書日侍講讀天順八年恭遇皇上嗣登大寳欽陞左春坊左庶子兼翰林院侍講充經筵講官歴陞禮部左侍郎欽依照舊經筵講書成化十九年九月三年考滿欽䝉兼翰林院學士給賜誥命臣妻李氏亦䝉進封三品淑人舉家仰戴聖恩昊天罔極雖粉骨碎身不能補報於萬一也成化二十年八月臣妻李氏送男中書舎人徐元概回還原籍畢姻成化二十一年六月十四日不幸在家病故臣竊念立朝三十餘年夙夜在公未嘗得置一丘隴今妻喪於數千里之外子皆㓜弱不能經理臣備員部佐又不敢以私情陳乞歸塟伏望皇上念臣侍從多年曽効犬馬微勞賜臣妻李氏祭塟臣舉家存歿不勝感戴天恩之至為此具本親齎謹具奏聞伏候敕音奏為乞恩辭免陞用事成化二十三年十月二十九日吏部節該奉欽依某官云云欽此欽遵臣聞命戰兢捫心惶懼謹具本辭免者切惟内閣乃朝廷宥宻之地内相實國家輔弼之臣固惟贊萬事之機尤湏極一時之選伏念臣學術荒踈才能謭薄偶與計偕遂登仕籍荷先帝之眷遇叨侍從之有年史館經帷愧乏論思之益儀曹選部徒懐鰥曠之憂况當陛下聖政惟新之始勵精圗治之時方求引退之未遑豈意超遷之遽及雖遺簮舊物曲賜甄收顧駑馬疲力實難驅䇿如䝉伏望聖慈俯矜愚悃亟寢新命俾守舊官庶得安於常分以免罪愆臣不勝激切俟命之至為此具本親齎謹具奏聞伏候敕㫖奏為乞恩辭免陞職事成化二十三年十一月二十日吏部節該欽奉敕侍郎徐某陞禮部尚書兼文淵閣大學士欽此欽遵臣聞命驚惶省躬戰悚伏以學士乃論思之職而居内署者最為清近尚書實股肱之臣而得兼職者尤為寵榮茍非其人曷穪斯任竊念臣性質愚樸學術空踈本一介之寒微荷三朝之眷遇位禄既厚常懐曠職之憂年力向衰徒有報君之志兹者伏遇大明既照聖政惟新臣以菲才宜居擯列而乃首䝉簡拔俾預政機顧辭讓之靡獲奚負荷之敢當豈期曽未踰月之久復叨進秩之榮雖天地大德務極其包荒而犬馬微誠不勝其懇切如䝉伏望聖慈俯垂矜察特乞追寢新命容臣照舊供職庶竭駑鈍少答恩私臣無任激切懇訴之至為此具本親齎謹具奏聞伏候敕㫖奏為乞恩辭免加陞事近因纂修憲宗純皇帝實録成書謹已進呈伏䝉皇上以臣曽充總裁官特敕吏部加臣太子少保兼武英殿大學士聞命兢惕莫知所從竊惟臣遭遇盛世獲以科第發身歴事累朝幾四十年於此方皇上龍飛之初復被擢置内閣㕘預機務又及四年任重望輕位髙才短無補於世每愧於心况自近年精力愈耗疾病交侵特以受恩既深未忍求退因循度日食禄茍安兹者紀述成書固朝廷之盛典而奔走從事乃臣子之微勞方懼踈略不文之譏敢萌優渥踰涯之望豈期寵命俯及凡庸盖宮保為崇髙之階殿學實清要之秩欲稱斯任宜得其人如臣之愚安敢當此雖循故事難冐新恩伏望聖明察臣愚𠂻追寢前命俾居原職公議始惬私心少安顧臣衰體尚可支持更當竭犬馬之力以圗報萬一於他日也臣不勝激切懇祈之至為此具本親齎謹具奏聞伏候敕㫖題為誥敕事臣某等切惟文職誥敕乃朝廷之重典原係内閣掌行近年以来内外各衙門官貟漸多比之國初不止加倍名職條例人各不同臣等叅預機務事體繁重不暇致詳别無專官管理前後委積動至數百道每譔進呈訖類送中書舎人書寫吏部奏請關給一年僅得一次多亦不過二次各官應給誥敕者多因父母年老日夜懸望欲沾一命不能猝得或朝不保暮遺恨終身誠為未便臣等看得正統年間王直王英俱係侍郎兼學士職事在於内閣專掌誥敕今推得某官歴任年深合無量陞一職令在内閣專管誥敕庶委任專一事不稽誤未敢擅便謹題請㫖奏為乞恩休致事臣惟古者大臣以論道經邦爕理隂陽為職故凡隂陽不和雨暘愆若皆大臣不職所致載在周書誠非虗語臣本凡庸誤䝉皇上拔置内閣叅預機務自顧不堪夙夜憂愧屢欲引退自以受恩既深未能圗報萬一心竊不安兹者各處水旱相仍餓莩滿道已不忍聞况有星墜地震之異至於雨土飛蝗又所親見災變若此臣實不能修職所致當此之時更不引退豈惟負朝廷之深恩亦難免士林之清議而天意終無可回之時矣考之前代或遇災變策免大臣已有故事又豈始於今日乎且臣非但於理當去况稟受素弱兼之近年衰病日侵齒牙脫落眼目昏花又舊患腿膝濕病或時舉發則步履艱苦實難支持伏望皇上鑒臣實情非由矯飾放歸田里以盡餘年庶合周書官不必備之意然後别選賢才以居其位則臣且免妨賢病國之譏矣更望皇上側身修行如古人之弭災凡諸可行可罷之事斷自聖心率由祖訓則不獨天意可回且將轉災為祥而益隆億萬年太平之治也臣不勝惓惓懇祈之至奏為乞恩請命保守義田事伏念臣居直𨽻常州府宜興縣某里本族見在計若干房耕讀之外無他藝業生息日益貲産日分富少貧多勢莫能一其間嫁娶過時喪塟缺禮老而失養㓜而失教者往往有之是雖服有逺近皆吾祖宗一體之所分也休戚所關不唯不忍忘亦有不能己者臣先父臣某每與臣言及此輙慨然長歎盖嘗修祠堂以申合族之義廣墳山以供掃墓之需顧於周恤之道尚有未備用是欲倣宋臣范仲淹義田故事量撥本房地畝贍給宗族之人以臣有職於朝特屬臣弟臣某經營其事不幸臣父臣弟相繼淪謝前議中止今臣累䝉先帝皇上簡拔承乏今官禄賜所入實有餘裕臣上思聖恩下念先訓勉終前議以酬夙懐乃於前年令臣男某撥地八百畝為義田嵗收租稅除辦納國賦外另為掌管專一贍給前項宗族仍以仲淹舊規斟酌損益立為條約掲於祠堂期與墳山世傳不墜使徐氏子孫永永沾沐餘澤庶幾區區之志少盡萬一而往復因循倐忽三載近者某始將撥過義田數目私冊并所擬條約封寄到臣臣切以兹事之成實維皇上優渥之賜不然則臣身臣家僅能自供奚及人哉况臣才猷德學逺愧仲淹而誤承寵遇乃特過之臣雖至愚豈不知感是以不敢以私自諱謹昧死上聞臣又惟義田之置雖臣家事若條約不關於司徒數目不籍於郡邑誠恐他日子孫或視為度外則隣有所侵而不知或認為分内則族有訟而莫止分者肆强取之奸主者滋吝出之弊勢有必然所宜深慮伏望皇上鑒臣私情乞下戸部將臣後開義田數目私冊查看明白用印鈐記劄發臣本管府縣當官收架仍給一本與臣家存照永為遵守及行前項衙門若有他人侵占即與斷理其本族子孫妄欲爭分及各項違沮條約情弊即與禁治將見家法之存永賴國法而臣祖宗九原之慰子孫百世之休皆皇上今日之賜也臣不勝懇欵祈請之至題前日欽䝉發下揭帖一紙内閣欽天監致仕監正李華令臣等擬㫖着復職管事臣等㸔得李華係傳奉官禮部㕘奏行事乖繆致仕况已年老今一旦無上事忽然傳出著復職管事未免驚駭衆聽且皇上登極以来凡百除授陞遷俱是合於衙門題奏請㫖未有自内傳出者今又輙開其端誠恐奔競干請之徒因而紛然復起後来難以止塞其於治道不無有損若李華果於選擇昌國公張巒塟地與有勞力亦當待工完之日量與賞賜為宜况本監見有監正吳昊掌印一衙門而設兩正官亦為繁冗臣等叨承朝廷委任一事不敢阿從易曰君子作事謀始盖凡事謀於其始則易為力倖門一開則引例希求者無所不至矣臣等愚見如此伏乞聖明採納不勝幸甚奏為乞恩休致事臣聞古者大夫七十而致仕夫既委質而出又乞身而歸者豈勤始怠終厭勞喜佚之謂哉盖七十之時精神耗散則見事每遲筋力衰憊則承事多慢雖欲勉強自效有不可得者於此而不知止足以致於妨政廢事則求以報國而寔所以病國矣臣由景㤗五年進士歴官翰林編修春坊庶子詹事學士太常卿吏禮二部侍郎累荷英宗睿皇帝憲宗純皇帝厚恩洊擢清要三十餘年及皇帝御極之初簡致内閣㕘預機務進位尚書加太子太傅以至少傅又十餘年犬馬之齒已七十矣縁臣性質愚鈍才識踈淺力小任重本非所堪而夙夜驅䇿不遑飲食幸能粗了所事茍免過愆今年老病忽侵頭目眩暈腰膝疼痛步履艱難拜起不便較諸往時日甚一日若復貪戀寵榮不自引退非惟有妨賢路抑恐有孤重寄其為罪戾何可勝言敢瀝寸衷上干天聼伏望聖明鑒察特賜優容使得全歸故里少延殘年以歌詠太平之盛則皇上始終之恩當沒齒不忘矣臣不勝激切懇祈之至奏為乞恩罷歸以弭災異事仰惟皇上頃因星變敕諭羣臣修舉政事引咎責躬不遑寧處聖心謙冲與古之明君遇災修德者同一揆也臣竊謂今之政事皆羣臣之所奉行則今之災異亦羣臣之所感召然羣臣中如入内閣者自先朝至今俱令㕘預機務故凡政事缺失軍民困苦責望必歸其罪尤重而臣素無學術不諳政體誤䝉聖恩擢厠其列碌碌度日已踰三年上則無以輔導不能増益乎聖德下則無以建明不能安利乎生民叨享厚禄於心有愧竊欲引退已非一日特以聖恩深重勉圗報效因循至今今則臣年益老筋力衰憊加以腿膝疼痛頭目昬眩諸病交作難以支持雖無災異亦當引退况此天意示警之時尚復貪戀不去其為無恥甚矣且以災異䇿勉大臣前代已有故事亦非始於今日伏望皇上察臣愚𠂻非由矯飾特賜俞音罷歸田里俾無久妨賢路以清聖政以消天譴幸甚臣不勝惓惓懇切之至奏為乞恩休致事近該臣具本陳情再乞休致欽奉聖㫖云云欽此臣聞命之餘無以自處展轉思惟感懼愈重竊念君臣之義實同父子之親茍非甚不得已孰敢言私以違上命况如臣者仰賴寵榮久叨任使揆之於義尤當委身圗報雖有疾病其何敢辭但臣素稟薄弱又當年老元氣一虧百證俱作臣前所陳腰腹疼痛腿膝酸麻眼目昬翳盖其大者自此之外所苦尚多態狀百端不能具述此皆元氣向衰之故縱善調理僅不即死非如少壯之人偶有所感可以旬月俟其平復也是則臣之一身已成痼疾已為棄人决不能趨朝行禮决不能入閣供事徒使天下之人以為聖明過念老臣而久妨賢路夫亦何取於臣哉臣䝉皇上天地之恩至矣極矣凡臣之所能為者敢不自效臣今所請非敢以微軀自愛非敢以引逺自髙非敢以不才自避盖恩重於身若斯三者皆為得已今視無所見跬步之間難於自致則身且不能保矣而况有事於禁近之地乎此臣所謂甚不得已者也伏望皇上憐臣病勢如此察臣𠂻情如此早賜俞允容臣生還鄉里臣當仰遵聖諭善加調理茍延一日是皇上一日之恩也茍延一嵗是皇上一嵗之恩也即有不虞死且不朽矣臣無任惶恐迫切之至為此具本奏為乞恩休致事臣昨以齒及七十兼有疾病不能事事具䟽陳情懇乞休致竊伏聽命未䝉俞允乃賜勉留仍假優禮聖恩於臣可謂極厚矣顧臣之所請非謂年力至此援例一辭以應故事而已臣愚自知臣實有不得已者臣自數十年来積有痰濕之疾甚為所苦盖痰氣發則胷膈飽滿嘔吐不止濕氣發則腿足酸楚呻吟不勝一嵗之間一月之内凡有幾發發必服藥數日始得平復頃以年力未甚衰憊未至狼狽然一發之後元氣一損屢發屢損至於今兹其發愈數其損愈甚加以飲食衣服稍至失節天時六氣乗間以入新感舊患合而為一徐行安坐尚或失措豈有精神心思上贊機務臣不足恤如誤事何臣之所請實出於此不然臣雖愚敢上忘國恩茍圗自全也哉再念臣學術空踈才識寡陋誤䝉知遇簡任過分極知叨冐未敢乞辭止縁年力尚可支持庶幾圗報萬一今年衰力憊疾病侵凌雖有區區犬馬之心何以自盡徘徊偃蹇妨塞賢路此臣前所謂欲報國而反病國者也况風雨寒暑免朝之典此宜施於碩德重望之人如臣愚者不惟不敢當受抑恐寵數日隆則慊愧日深慊愧日深則疾病日益亦何補於國哉夫人臣事君進退惟義語黙以誠臣愚平生用此自誓向使臣無諸種疾病固不敢以任使弗效欲求引避若臣能少有禆益亦不敢以疾病之故便其身圗今者外觀内省進瞻退思宥宻之地有臣無臣不為輕重在臣之身一去一留實係軀命是以再瀝肝膽上瀆天聰伏望皇上以義處臣以誠體臣容臣退歸田里歌詠太平則陛下之容臣乃全臣終始臣之自全實尚賢以圗報於陛下也惟哀矜臣愚早賜俞允臣不勝感幸之至奏為乞恩休致事近該臣奏乞休致節奉聖㫖宜留心勉進藥餌用副眷懐所辭不允欽此臣伏枕聞命感懼交集雖知年當衰邁病已積成不能遽療然仰懐天地之恩未敢自弃乃益請醫檢方製藥朝夕服飲不憚瞑眩以圗幸全以答明命自聞命至今又踰一月矣腿膝之酸麻加劇腰腹之疼痛加數眼目之昬翳加重故寤寐呻吟之餘每以上負聖恩不能終報無可奈何念惟速退以尚賢能是亦圗報之道不免再陳懇乞俞㫖盖臣自入官以来荐歴清要四十五年至於供事内閣亦十餘載榮光寵數凡人臣之所難得者臣皆得之臣雖至愚豈不知委質之義而固求一退以自便適哉顧臣之事君必資耳目手足而後可以有為臣足既病於寒濕目又病於熱邪二體交病雖有才猷亦難自效况臣之愚復何所為且皇上留臣一日竊一日之禄負一日之責内慚外悚病將愈深其於皇上求舊之懐恐無以仰副萬一也臣之再陳實非得已伏望皇上鑒臣愚衷憫臣老病容令退休則臣未死之年實惟皇上之賜臣與臣之子孫隕首捐軀不足為報矣瞻望闕廷無任懇切願望之至奏為謝恩事臣昨者奏乞休致欽䝉聖㫖云云欽此臣負疾請命已及三月忽得俞㫖感激無已雖在床褥亦竊瞻望拜稽祝天穪壽顧不能進造廷陛面致一辭用是慊然實悚實懼竊念臣才質庸下學術荒踈識雖通今行多愧古而遭際明時忝厠科甲一命為編修兼校書再命為庶子兼侍講三命為少詹事四命為太常卿五命為禮部侍郎六命為吏部侍郎俱兼翰林學士居位因循無所禆益日分遲朽久甘退休伏遇皇上登極之初特拔臣於具寮俾入内閣供事臣之知遇誠有出於尋常萬萬者既而恩榮寵數日加一日十二年之間四進階勲名列師傅兩受誥命光賁祖宗兼學士歴三殿之崇領尚書躋六卿之長月賜嵗頒晨㕘晝接駢蕃隆渥不能具悉臣之榮幸又有出於尋常萬萬者臣雖至愚亦思少竭駑材以圗報穪但任既踰分力每違心老境侵尋疾病繼作臣於去嵗常以年滿七十具本求退比䝉聖恩留臣供事且有免朝之㫖臣勉彊就列循至今年有此痼疾乃敢懇請乞賜餘生得遂所圗已為萬幸復荷聖恩念臣微勞重之以倚任之褒申之以調理之諭至於再三纔得俞允不惟降敕以示優崇而又給驛以行差官以送代勞有夫助養有米且念及臣子錫之以官盖皇上篤求舊之誠惇勸忠之義以至如此顧臣之愚不足以當之也臣今老矣何以圗報於皇上哉自臣而後子子孫孫或為儒以仕或為農以耕庶幾樂育清化以繼續臣心於無窮而皇上求舊勸忠之意天下之人奮發興起以副明德者固有在矣非臣之所能報也臣感恩深切不知所云無任慙悚惶懼之至縁係謝恩事理為此具本令義男徐某抱齎謹奏聞奉命撰三清樂章奏臣等切惟天子祭天地夫天至尊無對故禮以少為貴祭不過南郊時不過孟春特不過牲牛漢祀五帝儒者非之况三清乃邪妄之說謂一天之上有三大帝乃以李聃居其一是以人鬼列於天神非禮也至於郊祀樂章皇祖舊製今所傳樂章雖載永樂大典是書博采弗精不可以黷禮臣等誦習儒書若邪說俚曲尤所不習且初設文淵閣命學士居之者實欲其謀議政事講論經史培養本源闢正闕失非欲其阿諛順㫖以取容恱也為此具本奏聞奏為視朝事伏覩陛下臨御之初講學修德敬天勤民無所不至天下之人皆以為堯舜之治可指日而俟也近年以来視朝甚遲或日髙數丈殊非美事臣等已嘗屢言不敢瀆論内閣奏事舊制每日二次若有𦂳急事情不拘時奏聞今止一次遂以為常批答之出動經累日各衙門題奏本或稽留數月或竟不發出事致壅殢不得即行且本朝列聖自洪武以至天順年時常面召儒臣咨議政事今朝㕘之外不得一望天顔所以通達下情者惟在章奏又不以時斷决其於政體實為有礙至於經筵日講所以明義理是非之端陳古今治亂之迹成就君德禆益治道惟在於此今每嵗進講不過數日去年春夏日講止得三次秋冬經筵止得一次較之初政似有不同臣等竊聞人君之心必有所繫不繫於此必繫於彼正士既踈則邪說得以乗間而入向来頗聞有以修齋設醮燒丹煉藥之說進者夫齋醮之事乃異端惑世求利之術聖王之所必禁宋徽宗崇信道流科儀符録一時最盛及金兵圍城方士郭京猶誑稱作法卒使乘輿播遷社稷失守求福未得反以召禍今内庭禁地修建不時賞賚無筭黜退道官復陞真人賜以玉帶恩寵服色過於公卿逺近傳聞無不駭異至若燒煉之事其害尤慘盖金石之藥性多酷烈一入肝腑為禍百端唐憲宗藥發致疾遂殞其身雖杖殺柳泌何救於事惟漢武帝始雖迷惑終知悔悟謂天下仙人豈有盡妖妄耳於是文成五利之徒相繼誅死故雖海内虚耗亦以壽終今龍虎山上清宮神樂觀祖師殿及内府畨經厰皆焚燬無遺神如有靈何不自保天厭其偽亦已甚明况依方而煉計日而待所成者何丹所驗者何藥如其無效則聖明所照亦可以洞悟矣若親儒臣明正道行善政自足以感召嘉祥培益聖壽永享和平之福何假於彼異端之說哉且自古奸臣佞人蠱惑君心以自肆其欲者必以太平無事為言禍患一来悔之何及唐相李絳有言憂先於事可以無憂事至而憂無益於事今承平日久溺於宴安自目前觀之似乎無事然工役繁興科𣲖重疊財穀耗竭兵馬罷敝生民困窮日甚一日愁歎之聲上干和氣熒惑失度太陽無光天鳴地震草木妖異四方奏報殆無虚月將然之患誠為可憂陛下深居九重言路之官皆畏罪隱黙臣等若復不言誰肯為陛下言者伏願陛下嚴早朝之節復奏事之期勤講學之功優接下之禮逺奸佞之人斥誣罔之說則聖德日新聖政日理億萬年太平之業可保無虞矣為此具本奏聞奏為纂修事臣等奉敕纂修書籍必湏斷自宸𠂻賜以名目有司曉然知聖意所在纂修者有所依據承行者有所遵奉為此具本奏聞奏為考選庶吉士事㨿給事中涂旦建議欲選新進士改庶吉士入翰林院讀書惟庶吉士之選自永樂二十年以来或間科一選或連科累選或數科一選或合三科同選初無定限每科選用或内閣自選或禮部選送或㑹吏部同選或限年嵗或拘地方或採譽望或就廷試巻中查取或别出題出試亦無定制自古帝王皆以文章關乎氣運而儲才於舘閣以教養之本朝所以儲養之者自及第進士之外止有庶吉士一途凡華國之文與輔世之佐咸有賴於斯然而或選或否則有才未必皆選而所選者又未必皆才若更拘於地方年嵗則是已成之才或棄而不用而所教者或未必皆有成請自今以後立為定制一次一開一次選用待新進士分撥各衙門辦事之後偶其中有志學古者各録其平日所作文字如論䇿詩賦序記之類限十五篇以上於一月之内赴禮部呈獻禮部閱試訖編號封送翰林院考訂其中詞藻文理有可取者按號行取本部仍將各人試巻記號糊名封送照例於東閣前出題考試其所試之巻與所投之文相穪即收以預選若其詞意鈎棘而詭僻者不在取例中間有年二十五以下果有過人資質雖無宿搆文字能於此一月之間有新作五篇以上亦許投試若果筆路頗通其學可進亦在備選之數每科不必多選所選不過二十人每選不必多留所留不過三五軰如此則所選者多是已成之才有所論撰便堪供事將来成就必有足賴者如是則預列者無狥私之弊不預者息造言之謗臣等皆出自此途引進後賢儲之舘閣以報國厚恩乃其職也為此具本奏聞詩題尚朴翁巻太古云已逺斯人獨返淳有書閒白日無夢落紅塵鳥跡平沙晩花香小徑春澹然保終始不愧葛天民菊莊為蔣翁題有地惟栽菊無心種百花泉香儗甘谷徑僻是陶家但得客常醉何妨酒屢賖物情與人意相對樂年華終慕為王廷瑞題椿萱凋謝久孤子獨遐思宰木烏啼夜空庭月落時尋常来夢寐彷彿見容儀無限傷心事相看淚亦隨風木巻為侍御父題賛政居蓮幕承恩進柏臺竟違三釡養徒抱百年哀古樹庭中植凉風天際来飄蕭殊未歇虚枕夢初回歸樂堂十年遊上國此日賦歸歟倦却風塵路来尋水竹居山行春載酒門掩晝翻書薄暮投林鳥相看意自如贈華陽處士孫以言句曲幽棲處分明小洞天浮生空富貴幻迹自神仙梅月閒中詠松雲醉後眠何時尋舊約重泛剡溪船桃花衆禽為林教諭題碧桃在天上緋桃巖谷中巖谷深且僻夭夭自春風乃知造化恩一一皆至公衆鳥且有託飛集左右同虞羅既無恙飲啄聊可充人生亦如斯出處當時雍苟或失其所寧不感吾𠂻朴菴為張原哲題隱居逺城市蹤迹謝紛華有室能容膝無園可種花養親惟菽水留客只茶瓜坐榻全無足欹簷欲墮牙借書尋舊友賖酒仗隣家清世真堪樂豐年亦可誇葱湯并麥飰一飽卧煙霞湖山遊樂巻為薛楹題公子南遊日湖山興最長鳯臺芳草緑鷺渚落花香銀甲来紅袖瑤琴出錦囊煙霞登碧巘風月泛滄浪對景開詩巻追歡送酒觴五雲天只尺回首思茫茫送錫山髙貢士九龍鍾秀色萬巻富才名觀國酬初志還家喜此行平蕪煙渺渺喬木鳥嚶嚶望裏雲山近吟邊野鶴迎儒流重經濟文運屬昇平再養如雲翮騫騰九萬程送石繼賢還江隂萬石推先世多才邁等倫劍光横白日文采照青春喜作橋門客仍懐梓里人綵衣雖可樂黄巻亦宜親瞻眺君山表行歌驥水濱他年拜華秩鳴佩侍楓宸送魯揮使還雲南虎拜覲龍顔匆匆又逺還寸心思補報萬里任間關嵗晏雲連塞天寒雪滿山柳營千騎簇天闕五花頒韜略心方切琴尊興未慳青年立竒績節序易闌珊送憲副張来鳯之浙憲體從来重如君更老成胸涵滄海濶心與玉壺清峻擢新承寵髙科舊擅名行行南浦恨戀戀曲江情雪路雙旌發雲霄一劍横到官吟思好臺柏對春情送王判官之廣平廣平今大郡别駕共稱賢書最銓曹裏承恩禁陛前天香凝宦節山色上離筵送酒青雲客揮毫紫閣仙春光殊冉冉别恨各懸懸拭目重来日勲階不次遷送顔性之依親南還楚楚賢關士翻然乞假歸思親驚節序飛夢繞庭幃未解通金籍先容舞綵衣騫騰終有待報答願無違寒雪孤松操春陽寸草暉停雲千里外莫遣信音稀送謝伯儀守開州賢哉三謝後分命守開州卓犖才聲重循良政績優論交當早嵗惜别已深秋五馬馳官道雙旌指驛樓由来今刺史即是古諸侯屈指三霜後榮遷拜冕旒送航上人歸宜興并感舊憶昔青蓮宇相依玉帶山禪心自消歇塵跡幸躋攀錫向峰頭卓杯浮日下還隔溪煙樹緑滿地雨花斑坐久渾忘世吟看共解顔因思京國别回首五雲間送龍克温還金陵時携姪襲百戸職金陵有佳士小阮共之京閥閱承華胄詩書擅令名論交酬夙願叙别動深情草色連天逺槐隂過雨清三秋及流火一月計歸程千里遙迎睇征鴻好寄聲送嚴宗源提督學政昭代崇儒教于焉敕憲臣斯文資振作吾道屬經綸肅政推烏府清光覲紫宸暌違當此日良晤卜初旬握手情無限同年意更親槐隂燕市上草色潞河濵去去廵南甸懸懸仰北辰明當膺峻擢人物荷陶甄送朱維吉還江隂落落澄川老青雲早乞身有懐尋水石無夢動星辰祖席燕臺下歸舲潞水濱已能酬壯節何必問通津杖履髙軒晩鶯花别墅春塵途試回首多少未歸人送張行人次韻天騎發深春官途不動塵重臨分手處俱是宦遊人芳草情何逺流鶯語更新停雲千里外幾度憶清真送唐醫官還苕溪西風来白鴈有客欲南旋吟詠真吾事勤勞獨汝賢賞花燕市酒載月米家船他日苕溪道相尋水竹邊送黎知州還任偉矣黄堂客皇都報政還年光何荏苒世事亦間關五馬雲邊道雙旌雪後山董生才望重指日簉鵷班送張用光通判建昌旴江風俗淳佐郡鷺袍新絃誦千家月桑麻到處春訟庭公牘簡齋閣賦詩頻㑹見旌賢日綸音出紫宸送鄒别駕之鳯陽雄才試名郡歴歴聞政聲北闕既拜命南風搖雙旌濠梁逺入望淮水還澄清使君入城郭竹馬爭相迎念昔龍飛地人文秀而明催科政仍拙報答攄忠誠送尹正言二親受封南歸得拜字吉甫有雲仍玉堂好風裁嚴慈及髙年褒封際昭代迎養極驩虞言旋事行邁祖席臨路岐春明擁冠盖暑雨過川原凉風吹沆瀣艤舟滄江邊尋盟白鷗外玉立諸兒孫家慶繞膝拜送僧歸杭州超然薝蔔堂瞰彼下天竺形勝良足誇髙僧瑩如玉飛錫来京華捧檄言旋速歸將率緇流丕釐昕夕祝翻經飛雨花傳燈續膏馥細和道林詩白日坐巖谷送蕭生還宜興青年事逺遊邂逅長安道東風多落花夜雨足芳草胡為遽分擕使我傷懐抱一杯臨短亭雙鴻向晴昊還家有餘師功名湏奮早課罷西疇耕遺篇細論討贈言致殷勤貞白永相保送蔣生還宜興同里君少年由来負竒氣仗劍千里行翻然動歸思炎雲作膏雨凉颷颯然至潞水一帆輕黄鵠飛天際桑梓及鄉園箕裘念家世三徑勿投間功名湏自勵送琛上人歸宜興之福源陽羨昔相見雨花吹滿臺都城復邂逅坐使塵襟開捧檄即歸去叙别仍徘徊雲中振金䇿水上浮木杯白日洒甘雨青山響法雷松枝若寄我絶勝江南梅題買臣負薪圗憶昔㑹稽守負薪行讀書穿林經莽蒼度嶺復縈紆至道心應味清貧日自劬一朝官五馬光彩溢門閭向来肉眼婦慙愧徒嗟嘘丈夫當立志富貴在斯湏子陵釣魚圗羊裘足自蔽奚以𤣥纁為富貴重五鼎輕若一釣絲假令棄名節憑誰戒澆漓客星九天表獨有太史知一片桐江石萬古無推移澹樂軒為孫都閫題至澹古所尚至樂人罕同何如貴戚里却有顔巷風一尊注𤣥酒五絃調素桐俯仰兩無愧坐覺塵慮空余懐企古澹此道嗟未充願言分所樂一笑看㝠鴻一愚巻人皆趨敏慧世路方紛紜勞形已堪惜况復斵其真百為亦徒爾一愚良足珍黙黙鄙群夸蚩蚩同衆民心君苟無累萬物皆陽春所以顔氏子陋巷能安貧予方厭機巧何年歸卜隣題胡方伯雙玉圗薇垣退食處移植猗猗竹春雨雙龍孫穿破階苔緑南薫籜自踈翠色秀可掬造化良所鍾因之比雙玉美哉諸孫子讀書志科目頭角當嶸崢雲霄湏奮逐雙玉信有徵厥德庶以續勁直君子心嵗寒宜自朂清時兩鳯凰和鳴向朝旭新淦蕭氏恒德堂蕭君妙醫術恒德克自持風雲有變態日月無停馳回視金川水浩浩常東之承羞固足恥歴久良弗隳種杏日接踵易粟頻資饑活人以萬計千載髙名垂南軒聽琴南軒地云僻遁叟心亦間游心太古上寄興絲桐間知音渺何處流水復髙山黄鶴或相和白雲自飛還蹇予無郢曲聞此徒厚顔贈隂陽訓術吳璉羲和古歴學之子紹家傳仰視日星象胸中具周天一朝膺鶚薦簮紱成蟬聨晝行耀閭里平秩歸才賢功名此發軔及時湏勉旃百牛圗我觀百牛圗天機妙無迹豐草翳長林羣然縱遊適畫史豈無意徒爾呈水墨牛於家畜中勞逸相十百尚論益物功當與坤元匹盡瘁向阡陌粒我蒸民食引重服上箱百用勞其力力盡誰復矜庖刄方俟隙骨角亦異處待之何太刻不見青史上往覽存歴歴胥忠伏屬鏤信傑就鍾室施報乃如此目之三歎息愚樂菴為傅編修乃尊題惟愚心自樂巧詐徒自勞居然山澤間逺謝世俗交鳴琴既無譜酌酒亦用匏冲襟付寥廓萬事無復淆白駒在空谷㝠鴻逸青霄再歌愚樂詩令人思有巢題郏城二蘇墓為眉山呉方伯重修賦悠悠郏城隅繚繞惟長路路旁土巍然云是兩蘇墓兩蘇生眉山崛起真寡助遙從泉翁来瑞鳯莫敢附文章壓曽王光燄追李杜才髙衆口䜛屢斥同黨錮流落天之涯氣節窮益固何况友愛情死塟亦相顧惜哉今何存宿草但零露上頽登樵牧旁穿走狐兎行人每經過感歎復悲慕到今五百年起廢良有數一朝為鳩工周垣更重戸種樹鬱青葱風雨泣昬暮依然彭城時飄泊似前度方伯今名臣好義夙所負惓惓仰止心豈為鄉黨故陽羨有田園曽枉長公步我生不及從夢寐若平素髙墳無由謁拙句聊自賦奉制文武詩百官分職重諸曹夙夜精勤可憚勞應抱丹心酬寵遇肯將辛苦負青袍其二楩楠杞梓總良材盡是先朝雨露培今日廟廊掄大用棟梁榱桷一時来其三斷金自古貴同心要識君臣氣誼深䝉古當時猶進諫也湏隨事託䂓箴其四百官俸禄總膏脂戒石