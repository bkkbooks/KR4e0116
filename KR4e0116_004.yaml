body:
  text: 謙齋文録巻四明徐溥撰碑銘故南京禮部尚書諡文僖黎公神道碑銘𢎞治辛亥南京禮部尚書黎公以疾乞致仕詔可仍賜誥命歸明年以建儲恩進階資德大夫正治上卿四月十八日竟以疾卒享年七十訃至命有司諭祭及營𦵏事諡文僖其孤民表詣闕謝恩他日奉公門人李學士賔之狀拜請神道碑銘予與公同朝且同官已乆義不得辭乃據狀而書之公諱淳字太樸號樸庵世居岳之華容本楊姓曾祖元勲出繼姑氏後從黎姓祖士禎父斌寜縣丞有德政並贈資善大夫南京禮部尚書祖妣徐氏妣元氏王氏並贈夫人公少苦問學從父宦逰與兄資深相師友天順丁丑英宗復位之嵗也舉進士第一授翰林修撰預修大明一統志癸未同考禮部㑹試成化乙酉憲宗即位充經筵講官丙戌遷左春坊左諭徳丁亥修英宗實録成進左庶子甲午考順天府鄉試丁酉修資治通鑑綱目成遷詹事府少詹事兼翰林侍讀今上正儲位日侍講讀戊戌擢禮部右侍郎丙午改南京吏部丁未滿九載遷左侍郎加正二品俸𢎞治戊申始擢南京工部尚書尋改禮部又三年以疾致仕而卒公性耿介寡合尤好直言居官屢除弊事初入翰林有言被謫者即以書抵當道請救其人當道者雖不能用然心實重之考鄉試時有試巻竒甚後塲不類疑有弊勾稽墨巻果得謄録生截巻狀按其事而取是巻為解首則名士馬中錫也人皆稱服甞見天下鄉試録多舛繆或犯國諱擿奏數十條下禮部翰林院議治考試提調官罪且申定格例行之至今及在禮部故事内批出翌日承行者必陛陳補奏䟽以防奸偽除授寖廣有諷令勿奏者執不可諷者色沮久之竟停奏在部不受私餽不行請屬尤慎形跡事渉矯託輒窮本末必暴白乃已聞人有玷行雖所甚愛必摧抑不曲為庇覆下至胥𨽻亦畏憚不敢犯素儉朴患鄉俗好侈躬自裁抑昏𦵏飲宴之禮人多視以為則重倫尚節痛違禄飬極嚴廟祀兄嫂卒其孤民獻及女皆㓜育為己子遇二季沾滄無間言甞歸省至臨清適山東按察副使董國器妻死而董使未還特使人舁其柩以歸太常卿余孟享卒家貧倡鄉宦合賻贈俾襄䘮事鄉吏鄧錄寓銀數十両後禄死藏所寓物候其子長乃還之所居黄洋渡積潦病渉捐私帑築堤四十丈民甚利焉嚴于教子不假辭色至訓諸生日亹亹不倦登科甲仕中外者相接踵下逮胥吏有嚮學者輒優給役後亦多成名云平生好著述有龍峯集若干巻及輯國家諸試録合六百四十巻藏于家配金氏贈夫人先卒子男六人民牧進士民表户部主事民衷民安國子生民俊民信女四適荆州府學生張孟瑄次適鄉生程鶚三適縣學生羅熺四㓜孫男二循紀循章女一以卒之明年某月某日𦵏于黄湖山之原金夫人祔銘曰洞庭匯澤其流洋洋公實楚産挺㧞不常昔起鄉薦世遇英皇對策大廷萬言成章乃賜及第裒然前行出入清秩翰林春坊危言正色恥和其光治朝簡任官惟俊良匪籍銓曺孰為較量冢宰之亞謂公克當秉公薦舉賢路不妨仰視孤鳳倐焉南翔人則不容在公何傷宗伯掌禮名位益揚召命将下歩履不彊乞身歸田旋以云亡二品既貴七袠亦長朝廷眷念恩被幽堂科第克紹諸子其芳集集門人青雲頡頏公其逝矣有光于䘮爰伐貞石樹之墓傍刻此銘詩永昭不忘故南京吏部尚書進階榮禄大夫致仕贈太子太保諡文肅王公神道碑銘鳴呼公𦵏有日矣追憶平生故交同鄉郡同官署而道誼相契合行業相規勵自少至老不相負者如公幾人而今不可作矣矧公之文學政事卓然為一代聞人而耆年髙爵殊恩盛典其在朝廷在天下所闗甚重是不可無所紀述以昭不朽而公之子沂以神道碑銘来請乃按福建布政使陳君朝用狀次第書之公姓王氏諱㒜字廷貴常之武進人晉太傅導之裔也元季祖諱徳甫自揚州避地于常子孫遂居之祖諱友諒國朝永樂間徴至京師授魚臺學官擢延平府同知有政恵考諱守正宣徳間為兵部武選司主事以廉慎名俱用公貴贈南京吏部尚書祖妣蔣氏妣朱氏俱贈夫人公生有異質十嵗能作詩十五攻舉子業二十為學生正統甲子領鄉薦景㤗辛未舉禮部賜進士及第第三人授翰林編脩被㫖偕修撰柯潜庻吉士吳匯等二十八人肄業東閣給酒饌及膏燭費賜御府諸書癸酉夏旱代祀東嶽甘雨隨注甲戌丁外艱䘮𦵏如禮天順丁丑仍舊任庚辰同考禮部㑹試時稱得人尋命侍東宫講讀辛巳預修大明一統志成賜金帛癸未復同考禮部遷侍講甲申憲廟踐阼以侍從恩擢左春坊左庶子仍兼舊職敇充經筵講官敷析明暢啓沃良多修英廟實録分掌禮館成化乙酉改南京翰林院學士至則迎母就飬丁亥實錄成公以舊勞預賜戊子以母喪歸辛夘服闋適南京祭酒缺朝廷特用薦起公于家公嚴督率明賞罰公差遣上奏論便宜數事又修廟宇學舎補刻書板建書庫門工悉就緒壬寅滿九載進南京吏部左侍郎時吏弊滋甚每差撥則呼爭於庭公按舊式㕘以時宜著為定規羣吏懾服丁未召為户部左侍郎乘傳赴闕甫數月今上登極遷南京户部尚書復改吏部㑹有㫖考察諸司公悉心諏訪務求至當有小過而才亦可用者别為奏請得降級補外其以例考績者必斟酌殿最不茍為文具又陳八事多見采納修治堂庫如國監而加偹焉𢎞治癸丑年七十上䟽乞致仕上優詔勉留再上亦如之甲寅以再考去任還家臥疾乙卯春復上䟽詞益懇上念公先朝舊臣進階榮禄大夫致仕命有司月給廪米二石嵗給輿𨽻四人此得報公疾以篤越二日卒于正寝實五月二十五日也距生永樂甲辰七月四日夀七十有二訃聞贈太子太保諡文肅遣官諭祭命有司治𦵏事丙辰三月十八日窆于縣西謝巷村之原公所自營夀藏也初娶夫人吳氏江西左布政使潤之女勤儉有則尤敦仁恵族里賢之先卒厝于祖隴之側至是乃合𦵏繼娶今夫人孫氏尚寳丞仲徴之孫亦有内行子二長沂舉成化乙未進士累官湖廣右布政使其志行不墜公業次洛輸粟賑饑授鎮江衛指揮使女五長卒次適鄒堂鄉進士朱㫤叚瑞又次適吾子中書舎人元概今守節于家孫五女四公性孝友言動不茍雖負才望而謙抑不自矜甞念宗族貧窶嵗給廪粟憫兄子澄之孤以三品恩移廕為國子生又修世譜輯家乘以貽子孫尤重義氣甞得楊氏别業有祖隴在欲徙之他公嘆曰彼以全産售人而不能保此三尺吾不忍也不聼徙闕其垣使四時祭掃焉公警敏精悍剸繁理劇不勞而集彭文憲公慎許可獨器重公後雖秩位隆髙而識者以為弗盡其用也其為文雅徤有體裁詩亦清粹真行皆遒勁脫俗所著有思軒稿朝天稿若干巻藏于家銘曰國有夀俊羣士之則作之累朝獲匪朝夕鄉有耆舊後生是規積數十年乃克見之公在南都為六卿長公歸南畿足範鄉黨七旬遐夀一品崇階公實稱之孰云幸哉矧惟令終䘏典優異節恵有稱賜𦵏有地論徳以世述事以文於百千年来者有聞故封奉直大夫刑部員外郎錢公神道碑銘𢎞治丙辰四月壬午奉直大夫南京刑部員外郎錢公卒其子大僕卿鉞請于朝上命有司諭祭遣進士治塋墓於是鉞泣而言曰不肖孤無似徼福天子寵及泉壤其有光矣如復得名世之筆刻諸墓道先子死且不朽其何榮如之予不得辭則為之銘按狀公諱震字東之其先出于吳之崑山髙祖諱常曽祖諱誠仕元為萬户始徙家杭州祖諱安一父諱禮生公頴異㓜學即出語驚人稍長習舉子業恒嘆曰大丈夫安能碌碌守章句乃棄去逰沅湘間致財巨萬歸盡散鄉里之孤乏者復垂槖去如是者數四不厭人有急難千百里赴之鉞官陜時自粤杖策往視徧厯闗中形勝數日挾両蒼頭徑去絲髪不以煩官既歸老於西湖之上集古竒方儲藥物彚别分貯揭所治證于上縱病者自取不問其姓名每出民必羅拜道次以謝公曰欲以捄難非求謝也娶同郡虞氏封太宜人子男六女二始公將教二子經學未知所授乃列五經于前縱其自取鑑得易鉞得春秋公嘆曰聖人之道見于經莫精於易莫大于春秋二子其得吾志矣時甬東楊文懿公以易名遣鑑師之錢塘季侍御琮以春秋名遣鉞師之鑑登戌戌進士蚤卒鉞登甲申進士授南京刑部主事厯員外郎郎中汝寕知府陜西叅政貴州按察使以右僉御史廵撫山東調河南進副都御史改太僕卿所至有聲績為時良臣人謂公之學於是有徴焉公生永樂己丑某月某日夀八十某年某月某日𦵏錢塘佛牙之塢銘曰干雲之材器維大受匠石所遺乃以自夀既夀厥躬復昌其後發為新枝久乃滋茂為榱為梁乃堂乃構遡厥本根匪夕伊晝維彼夀者終老林阜封以識之名不可朽采石李氏先塋碑銘𢎞治丙辰總督漕運都察院右副都御史李君徳馨漕事至京師詣予曰吾李氏采石之墓拱木已積抱矣而墓碑未刻無彰先徳予末小子忝承休緒而尤黯黯無圖則不孝之罪益重惟先生孔揚昭大以假寵我李氏以詔我後人予按狀李氏世為滁人國初有諱慈隆者隨髙皇帝渡和取太平遂韜跡太平東山是為徳馨之髙祖慈隆生茂林往来采石治生因家焉茂林生順補郡庠弟子員善楷書預書永樂大典典成授刑部主事上即行在為都方事營建命户部尚書宋公入蜀取大木擇􅒼屬可同事者以公從既得木木皆産深山窮谷其徙而出也多經民墟有議夷竈堙井者公曰寜迂道無震驚其民乃别取道以下民徳之餽白金者以千計公皆拒不納未幾坐事謫廣東南雄經㦄至今猶能道其遺政南雄生翔字某某别號止菴徳馨父也性濶略踈財鄉人有稱貸不責其息或貧不能存死不能𦵏男女長不能嫁娶者來告止菴未甞以匱乏辭隨逺近親踈予之多寡悉中度見德馨少慧舉止異凡兒每撫其頂曰此子必能大吾家因遣就學日夜訓誡以冀其有成已而果然李氏世有積徳其𦵏于采石盖自某始于今已三世矣雖甞一發于南雄然位不甚顯不克竟其所施未可謂食其報也今德馨貴而贈其祖若父如其官祖妣某氏妣某氏皆淑人天之所以報李氏者庶其在此乎銘曰李居滁陽亦既有年太平之支由皇祖遷既來采石乃卜其宅三世奠安善人奕奕允矣南雄實起其宗受命至再而位弗崇爰及止菴輕財好施不世其官惟徳是嗣匪深其源其流曷長匪培其根其枝曷昌惟我李氏其徳既侈不福其躬乃在孫子爾孫爾子爾祖爾思爾或忘之視此銘詩嘉議大夫都察院右副都御史唐公神道碑銘都察院右副都御史唐公諱瑜字廷羙其先晉陽人宋御史中丞子方之後髙祖諱英洪武初官松江上海烏泥涇税局子文祥因占籍上海大父諱忠不仕考諱昭以公貴初封徴仕郎南京禮科給事中繼封中議大夫賛治尹衢州知府公姿貎瓌偉有竒氣為詩文操筆立就以書中應天府鄉試登景㤗辛丑進士授南京禮科給事中蹇蹇不阿選知浙江衢州府九年擢湖廣右㕘政遷山西右布政使未行丁外艱服闋改雲南未幾擢都察院右撫都御史廵撫甘肅公之守衢也詢民間利病以次行罷衢人大悦㑹嵗久旱且疫公還自朝覲下車即宿城隍廟自為文以禱三日雷雨大作後凡值旱禱輒應吏民相與勒石于周宣靈王廟舊有孔子祭田奪于民公以俸贖還之俾世供祀事有假媒聘賺財既而懼公之威鬻其二子及妻以償公曰民窮而犯法畏法而棄妻子守之過也贖其妻子還之衢號健訟公决斷如流數辨疑獄民遂不敢欺公去衢衢人為立生祠祀焉其在湖廣京山隄襄陽河置廣儲倉嵗饑民頼以不徙正雲南土官世襲法以絶爭訟定滇粮給散之宜甘肅兵政久弛至則陳時政四兵備五罷㕘將田廣奏起才將許寜李璵勞邉軍䘏陳亡邉人竦然㑹中貴人以事諷公不從廣等從而媒孽之竟坐事去𢎞治五年詔復公故官致仕七年八月十有八日卒于家春秋七十有二公娶尹氏封恭人先卒子男六鉞國子生鏞鎧銓䕫俱授松江守禦千戸鎡邑庠生女五孫男十二人孫女十五人以某月某日𦵏其鄉周涇之陽公為政所至見紀有氷玉十詠有湖藩十政有勤民倡和集士類懸思集其卒也衢之父老及孔氏子孫拏舟千里來哭者不絶於乎公雖不能與時順隨不克究其施然其愛在民其功在邉公論在士夫是其不可泯者吾故用鉞請為文及銘俾刻諸墓道以示來世銘曰有頎而晳人中英少登甲第華簮纓入科出郡封専城浙水東下流芳馨邦人祀之死猶生楚晉大國藩垣并甘棠蔽芾多頌聲擢為憲帥提邉兵𦍑胡萬里勞經營除奸紏慝聞者驚釁機竊法來相仍一官棄去一羽輕當時物論洶不平盖棺事定信有徴况乃夀考兼康寜生而全歸没有靈九峰巉巗三泖清千秋百嵗垂儀刑後欲知之考茲銘故南京兵部尚書致仕進階榮禄大夫薛公神道碑銘薛故家廬之無為州國初有大司空相從太祖高皇帝起淮甸入臺城攻安慶下江西復廬州戰番陽攻浙江奪姑蘇下中原累著功勩凡機宻必預甞遣督軍餉上諭之曰卿功已應世爵茲行為朕蕭何可也還進大司空頗以怨言聞上怒置之獄死子靖安亦以事舉家瓊州安置永樂甲午十月生公於瓊州公諱逺字繼逺少頴脫竒秀屬句如流宣徳乙卯中廣東鄉試壬戌登進士第授户部雲南司主事勤慎精敏不避艱險景㤗中以薦遷郎中嘗以部檄覈實南直𨽻逋稅文案山積洞燭肯綮得其羡餘若干萬石歸之於公又同御史倪敬按大同邉儲搜抉遯隱邉軍足食天順改元以公使交趾還進本部右侍郎尋丁母夫人憂時河决河南詔復起公以工部侍郎往塞之至則集丁壯三萬餘分工授任决口遂塞又自揚州門鑿河四十以洩積潦蠲粟賑饑伐材為屋以居流民比還民遮道留之已而復授戸部成化元年兵討两廣蠻獠以公督餉公星馳先調兵食師至如歸仍諭其衆能破賊者即有輜貨人人奮勇師至大藤峽躬冐矢石腹背夾攻賊平陞左侍郎二品俸有白金文綺之賜三年進尚書總督京儲六年夏江南運不至命公往視至則滌泉源濬河流漕以克濟十三年上䟽乞致仕許之十五年有詔起公南京兵部尚書㕘預軍務是年冬以疾辭不允明年正月詔許致仕既而子丕以廕除中書舎人迎公就養於京𢎞治五年三月詔進榮禄大夫八年某月某日卒于京邸年八十有二夫人楊氏先卒子丕孫男一某公敏而好學於凡禮樂兵刑天文律厯無不渉其要尤熟國朝典故在户部最久凡文移奏劄悉出公手于部事例芟繁正訛體要歸一均節委積内外逺近多寡輕重莫不法式㑹較出納吏胥拱手正統己巳之變摘漕卒戍邉以民代漕江南罷焉景㤗中有言事已宜如舊便詔集議户部曰可兵部曰不可遂罷後復有言者時司徒以問公公曰兩議相持力奪之不如理諭之司徒如公言遂定每嵗中外競陳利害始一人以為可行而行又一人以為可罷而罷前後矛盾有司不知所從公以為凡若此者一切報罷則官省民安同僚有惡私囑者怒色以待公曰事可行而行不可行而止何怒為論馭吏則曰嚴刑以懲不若先事而發善革弊不如無弊可革也仕宦四十年家無長物食無兼味室無媵妾曰吾少事親恒不足今安忍有餘哉子丕將奉柩歸𦵏無為之原求文刻之隧首於乎公以孤童起海外奮身進士致位八座名顯天下其可謂豪傑者矣然公嘗謂户部事多因襲使吾釐正之國可富邉可實民可安也惜乎未及行而罷雖然公之志則亦可知矣銘曰朅朅司空興運首遭文經武略為時蕭曹山河之誓宜及而闕宿恵儲祥及公乃發遂登計相進大司馬出入勲名孰與齊者旣老而歸濡湏之丘焯徳昭終揭于道周通奉大夫工部左侍郎杜公神道碑銘𢎞治甲寅三月六日工部左侍郎致仕杜公卒有司馳奏至天子為遣官諭祭仍命工部營𦵏公之子源等卜某年某月某日𦵏公于昌黎縣某之原以予為公之同年乃以神道碑銘來請按翰林脩撰李君旻狀公諱謙字益之姓杜氏其先定州人也元始遷永平故今為昌黎人曽祖諱彥文祖諱復父諱敏前妣楊氏王氏繼妣董氏公少逰郡庠正統丁卯領順天府鄉薦㑹試不偶以國子生厯事户部時山陽金公為尚書待下方嚴獨竒公欲奏薦為屬公辭之景㤗甲戌登進士第朝廷修寰宇通志遣采事實于山東還授工部都水司主事督吕梁洪三年考最受敇進階承徳封贈父母及妻改禮部主客司庚辰署員外郎癸未陞郎中以父喪去任服除改儀制司郎中成化戊子册封晉府充副使明年詔廷臣三品以上各舉所知時姚文敏公在禮部知公才可用即以名上擢浙江布政司右㕘議乙未陞右布政丁酉轉左布政使庚子召為順天府尹壬寅工部侍郎缺即以命公方見嚮用丁未得乞致仕葢公年六十九矣既還鄉以詔恩進階資善大夫人以為公榮而公尤康强不衰凡八年以疾不起享年七十有六公居官善理事為工部主事時在徐州值嵗饑疫區畫荒政作粥食人多所全活推其餘及收養孤老男女過時而貧不能嫁娶者皆出所助吕梁之人至今思之而平生政績尤多在浙江其平易明决既能使民懷而吏畏至于賔接士人忘其勢分而禮法之際有所不可雖顯要亦不肯阿從也初各省以織造上供文綺不如法者獲重譴衆因畏避至積滯數年所織造者久而濕蒸多壞工人或破家不能償公曰利吾身以害人吾不忍也遂合數郡解運卒亦無事人始免患甞清理軍伍有訴於御史得更衛者公以為非例持其文不下御史雖怒不恕也他日定賦役等第按察使欲増損其則而盡貸無彥之家公以此輩皆㳺民而令賦役獨歸于力穡之農非重本抑末之意卒從公議嵗侵特奏免田租若干舊有起運存留之數戸部以起運者不可免而止免存留者公言若然則一省官俸軍餉俱乏矣二者必增損之乃可執奏不已朝廷亦竟從之及在工部適運河淤塞受敇修浚因以其屬從行得便宜行事公盡心水利不憚勞苦數月舟行無阻公私稱便已而兵部尚書余公子俊廵撫大同多費公帑物有誣其侵漁者時受敇偕給事中御史徃覈其實或謂公曰上怒叵測公與余有浙省同寮之舊辭之可免禍公曰吾知奉公守法而已他何足計瀕行又有以危言怵公者亦不顧卒得其實而還余之事竟白其幹濟如此者故凡被委命事竣輙受賜賚云公居家事親能盡子道父嘗病疽醫莫能療公泣禱于天躬吮之良久愈後父年九十猶就養于官以浙地善且迎其兄娣事之人稱其孝友者無間言自少無聲色之奉雖退食燕居必正襟端坐妻子不敢狎視至接人臨下更温厚可親是以人皆愛之公之祖若父俱贈通奉大夫工部左侍郎妣俱贈淑人配楊氏亦如之子男三人長即源萊州知府次濬禮部司務次漢國子生側出女一嫁山西按察司僉事楊詳孫男五人孫女一予旣知公之厚而又喜有賢子則公雖没而有不没之名垂之邦國也用以銘曰有美杜公貎偉而厚起于甲科如木初茂枝葉翳翳其隂四垂惟其本深其末不萎公少而仕為冬官屬勤敏之餘恵及孤獨藉藉聲聞藹于工曹薦牘斯削匪公克逃公在浙省以身任事事有從違惟理之是是則行之匪異乎人列郡歌訟徧于吏民公有才能施展未盡有命召之為京兆尹輦轂之下四民宴如政尚平易不煩前驅司空掌土乃擢其亞人曰宜哉公不自咤綽有政績在於河渠亦復奉命見于奏書出則未逺而日未暮如何回車以畏末路優㳺閭里歩履康强故舊笑言左右豆觴况乎有子已登貴仕禄養正豐奄其長逝故資徳大夫正治上卿太子少保禮部尚書贈太子太保諡康靖鄒公神道碑銘資徳大夫正治上卿太子少保禮部尚書鄒公以清徳重望致仕家居夀躋八十有四乃𢎞治壬子某月某日卒卒之前二月公以杭屬縣大饑心切憂憫手具奏䟽以聞上嘉公身居田里不預政事能逹民隱如此旣詔有司如所奏賑䘏即出内帑文綺賜公以旌其賢及是上聞訃悼歎諭祭營𦵏一如䘏典特贈公太子太保諡康靖恩禮優渥人皆榮之公諱幹字宗盛别號順菴姓鄒氏其先嘉興人也後徙仁和再徙餘杭故今為餘杭人曽祖福堅妣某氏祖夀之贈賢政大夫禮部尚書妣沈氏贈夫人父濟詹事府少詹事贈太子太保謚文敏妣薛氏贈一品夫人文敏公在太宗皇帝時為宫寮卒時公尚㓜適仁宗皇帝監國南京特遣充應天府學生親加諭勉賜鈔二千貫仍月給米二石以資養之公感激奮勵力學不懈正統戊午中鄉試明年遂登進士第庚申初授兵部職方司主事厯陞署武選司員外郎郎中己巳八月北宼入邉英宗皇帝北狩京師戒嚴一時所需甲杖糧餉未有能任其劇者僉以公為宜乃超遷兵部右侍郎公殫竭智力日共厥事倉猝間發廪以給兵士或不俟奏報而行一日兵士擁東城門請給馬草適鄉民萬計避㓂走城下呌號求開門守者難之公曰草不得則廐馬不過瘦死爾城以衞民若無所衞焉用城為且聞㓂距城尚逺即至近境門開無及而民皆死矣竟從公言獲濟及宼退明年改元景泰被敇奨諭辛未清軍職貼黄事竣改禮部壬申奉敇考察山西官吏癸酉河南鳯陽等䖏大水詔徃救荒民多受恵凡為奏免税粮若干萬石旣歸命督易州山厰薪炭積弊頓革因奏設主事一人綜核其事公獨總其綱而已三年衆議以公不宜久䖏比召還治部事尋陞左侍郎進階正議大夫資治尹天順丁丑英宗復位故尚書胡公方致其事去諸册立大禮並從公詳定而行時襄王來朝故事當祭禁門而入自遷都後來朝禮絶莫有知者公檢太常典故行之及上不豫復奏行皇太子御文華門代朝禮成化丙戌憲宗皇帝二年也命撫安畿内許便宜行事明年以老辭位不允未幾特拜南京禮部尚書居二年召還禮部仍令經筵侍班自是治部事者十年至加太子少保屢以老請上皆不允後復請不已特賜敇致仕令馳驛還仍令有司月給米二石嵗給僕夫四人葢家居者一紀而終公性謙謹喜揚人之善䖏事是是非非不肯詭隨忠勤奉國老而彌篤甞因灾異首以妄費濫賞及修苑囿設齋醮為言後以度僧道過多因極言其弊奏為定制至今遵行之少侍文敏公多聞典故及居官徃徃述以諭諸寮屬其言皆可書洵一代之老成人也公配王氏贈夫人先卒子男二長煜次煥國子生女三長適葛某次適鴻臚寺序班蘓和次適䖏州衛指揮使牛洪孫男三圭坤堂女五長適杭州前衛指揮王楷次適指揮陳震次許適李端其二尚㓜以卒之明年某月某日𦵏于餘杭山之原煜奉南京大理寺卿致仕夏公之狀來乞銘其神道之碑為之銘曰餘杭有鄒來自檇李山川清竒乃鍾厥羙惟文敏公廟食邑中仁皇眷念公為孤童感激不忘甲科是繼克世其家益大名位豈惟大之身實有勞郎署超遷始于兵曹都城戒嚴武事克濟暫出而還遂擢禮侍旁稽典故以賛治朝宗伯之任居而不驕帝曰汝嘉登之宫保寵命日隆屢䟽請老終焉得㫖優㳺里閭險嵗憂民日有奏書嗟兹老成世豈多有畢公去周厥徳愈懋公既逰矣賢名則留恩澤所及賁于髙丘再世易名為時令族祠墳相望過者必肅樹碑神道松隂峩峩爰勒兹銘永永不磨資善大夫南京戸部尚書致仕潘公神道碑銘公姓潘氏諱榮字尊用其先出河南之固始唐末從王審知入閩有仕于漳為龍溪縣簿者因籍焉祖諱從考諱乾皆有隠徳公生而瓌異鄉老長指之曰是必為吾鄉偉人弱冠充郡庠生正統甲子舉福建鄉貢戊辰登進士第奉命齎銀幣犒師廣東景㤗庚午拜吏科給事中彈駁有體論停起復抑奔競數事尤切多見嘉納壬申陞左給事中充荆府册封副使不受餽遺癸酉滿三載敇進階徴仕郎封父如其官母陳氏為孺人甲戌歸省賜楮幣為道里費未幾值父喪毁瘠骨立事母不離側天順己夘始以服闋復任辛巳充蜀府册封副使如使荆時壬午簡充琉球國册封使賜麒麟衣金帯以行至則奉宣徳意王以下皆竦息聴命陪臣請為中山八景記公援筆立就有用夏變夷語國人為之刻石甲申還朝陞都給事中以母喪歸如父喪時己丑復任六科諸給事無先公者庚寅陞南京太常寺少卿癸巳誥進階中憲大夫加贈父如其官母為恭人甞上䟽乞致仕不許丙申陞南京戸部右侍郎戊戌奉敇總南京糧儲尋改都察院右副都御史仍領其事己亥誥進通議大夫加贈祖父祖母陳氏及母皆為淑人辛丑召入為戸部左侍郎適尚書缺遂署部事免两浙償補鹽課人皆稱便㑹久旱漕河淤涸公奉命督治運舟畢至癸卯再乞致仕優詔慰留之甲辰陞南京戸部尚書所出政令太抵以節財䘏民為務丁未今上以登極恩誥進資善大夫復加贈祖父祖母及母皆為夫人公䟽凡三上上若曰卿効勞久兹以老疾懇辭特允所請給驛以歸其令有司月給米二石嵗給輿𨽻四人南曹諸公卿祖餞都門外賦詩為贈道路榮之𢎞治丙辰十月十八日終于正寢夀七十有八訃聞朝廷贈公為太子太保遣有司諭祭治葬丁巳某月某日窆于某山之原配林氏有賢行先公十五年卒贈夫人側室温氏生子四人長謙賜冠服次儉國子生次麟次恩皆郡庠生女二長適邑庠生陳雷次適鄉貢士蘇霄孫九人統紳綱綸經瑞慶繼紀温氏居公喪哀瘁成疾後八日而卒嗚呼公以敦樸之資抱徳履善不自表襮一命二十年而始得調及其資望俱積公卿之選自有不能釋者而累求退避卒克自遂以保身完名享有高夀多賢孫子世之所謂福殆無不偹天之厚善人其理固不爽哉儉走京師奉翰林江侍讀瀾所著狀請予銘刻諸神道以告來世予與公同朝知公之賢舊矣乃為銘銘曰有偉潘公廣䫙豐頰身居廟堂表表人傑為内臺佐為卿曹長敭厯两京國計是掌官累八命再世貤封七十而歸九載乃終皇有䘏恩贈官賜祭有墓若堂二品之制存順没寜有哀有榮豈無若人公有令名古人有言難進易退公實善䖏功名之㑹人皆不足我乃有餘其未盡者歸于太初穹碑峩峩瞻彼神道我銘公徳來者是告户部尚書李公神道碑銘公諱某字某姓李氏其先山東厯城人永樂初有諱缺者謫戍南丹後改編隆慶州民遂籍隆慶是為公之祖考考諱某皆以公貴贈户部右侍郎公自少頴悟為州學生有聲塲屋景㤗壬申登進士第授兵部主事厯陞員外郎郎中皆克舉職成化二年陞河南右㕘議檄所部課民種桑棗戸若干株因以考長吏勤惰且令月條上其他政政即善則温言慰之即不善則訶譴不少貸由是州縣之吏罔不知懲勸四年丁母夫人憂服除改四川奉敕提督松潘等䖏糧儲出見彭索河荒田彌望乃召其土人而問之曰是可耕地而不耕何也衆皆謂生蠻往徃擾耕為患公則相視要害設橋梁墩堡塹栅為防民乃耕耕遂無擾時松潘有堡曰張臘茂州有堡曰松溪皆為生蠻所攻公與㕘將某前後擒殺數百人蠻乃逺遁捷聞朝廷屢有寳鈔綵幣之賜灌縣都江堰壊嵗役夫四萬人修之吏得夤縁為姦公去其十九築不逾嵗而功告成民永頼焉七年陞河南右㕘政其居官聲實一如㕘議時十一年陞江西右布政未幾陞都察院右副都御史巡撫河南至則剗刮宿弊理寃獄黜贓吏定九等差役法時黄河水溢城浸者三版公視東南角低下乃分命守土之官日夜䟽濬始免决嚙之患十六年陞户部右侍郎尋奉敇廵視山海邉闗整飭兵偹置牀子弩一萬五千張弩可射三百餘歩又設飛石飛木可發五七十歩者各數十萬削山坡成峭壁東西數百里歸而以圖進上賜鈔四千貫二十年轉左侍郎權尚書事時河南山東北直𨽻連嵗旱榖無所出州縣當輸邉者類槖銀就糴以輸米踊貴斗至數百錢然亦實無甔石賣者而武吏催督道路旁午勢甚張皇公聞之乃請輸銀太倉而以太倉之米轉輸於邉米價遂平二十年奉敇總督三邉軍儲兼賑濟饑民時闗陜不雨三年矣公齋心黙禱所至天輒雨又引渭水為渠經行百餘里以利居民是嵗大稔民頼以全活者甚衆公還朝復具圖以進上喜又出寳鈔四千貫賜之遂有意大用公矣明年陞本部尚書總督京通兩倉内外僚吏素熟公名皆慄慄危懼惟恐有犯公者時公雖不大聲以色事固無不理也二十三年公遽有去志遂上䟽乞身以歸買田築室於隆慶城西北日與親舊觴咏其中或問以官事則不應𢎞治五年以建立皇太子恩進一品階七年某月某日卒于家年七十有四娶某氏繼娶某氏皆贈淑人男四人長曰某廕補太學生次曰某州學生次曰某女四人長適某次適某其二尚在室孫男女六人公性簡直與人不能委曲又好面折人過雖遇權貴亦不掩䕶故權貴人多怨公公將用輙為其所抑其去也亦以是云銘曰南丹之李𣲖自㦄城暨入隆慶李斯有聲李之有聲實始于公才徳並茂位秩益崇公佐三藩至有成績孰為最多西蜀赫赫蜀有土田公為耕之蜀有冦盗公為平之蜀民嘻嘻惟其所欲公為蜀民奔走僕僕公撫河南河水瀰瀰浚之導之河廼東馳不震不動公之在邉孰謂强虜而敢瞰焉公視饑民哭聲載途裹糧以哺民或歌呼嵗儲浩浩東南之輸公手出納不爽錙銖惟公之才已用于時人猶有言不究其施惟公之位已極其至人猶有言不久于事公其已矣為公慨何刻銘墓隧百世不磨故太子少保禮部尚書諡文安周公神道碑銘周之先為蜀之資陽人宋紹興中始徙叙州之長寜故今為長寜人七世祖惠仕本州知州曽祖世祥祖本原父永隆俱儒學訓導邑人稱世儒周氏以别其族至公以儒術大顯于世公諱洪謨字堯弼號箐齋又號南臯子自少頴敏好學不倦侍父官長陽䖏諸子中卓然有名正統甲子領四川鄉試第一明年復占第一甲進士授翰林編修景㤗壬申左春坊賛善丙子修寰宇統志成陞侍講天順戊寅進侍讀署南京翰林院事甲申憲宗即位召修英宗實録改翰林侍讀丁亥進學士陞南京國子祭酒丁母憂服除改北京祭酒擢禮部右侍郎由左侍郎拜本部尚書丁未進太子少保積階資政大夫正治上卿今上即位之元年為𢎞治戊申上念公甞以老請致仕令乘傳而歸陛辭之日恩禮不替又三年以疾卒于家辛亥二月二十三日也夀七十有二訃聞命有司諭祭治墳仍賜諡曰文安公少以文為業然有志政務多所建白初在翰林即勸上勤經筵以講聖學謹内治以敦正本復條十二事以進及蜀冦作與長寜隣境公稔知其出没設禦備之術甚悉遂見擒而其地宴然及為祭酒整飭規矩表率生徒且言修祀事廣倉儲禁酷刑减征稅攘虜撫夷十事上悉嘉納之又言聖朝尊崇孔子其塑像冕服既循前代之舊用天子之制而禮樂不稱封號不加殊為闕典宜下禮部議之尚書鄒公以尊崇孔子初不在此為奏然朝廷竟用公言始増籩豆舞佾之數在禮部時首言書載璿璣玉衡蔡傳不得其制乞改造以偹占候旣成有羊酒寳鈔之賜後烏思藏等䖏入貢其貢使數踰舊制一嵗中有至三四千人者賞賜靡費不可勝計自長河西諸畨皆冐以圖利公言此特無印符為驗耳宜依海外諸畨例各給與符二十道入貢備填貢使物數于上仍識以舊賜金印至闗驗以防詐偽詔從其議其費始省丁未月當食不食或以為宜賀公謂此隂盛之象其可賀耶遂止嘗奉命祭天夀山神見役夫運載相繼于道知有所營建也歸言月令云盛夏不可興土功又曰舉大事則有天殃今嵗大旱未必不由於此且時方炎蒸人易疾疫宜暫休息之不報及旣歸老蜀中惓惓不忘朝廷猶力疾䟽安中國禦四夷十事遣人馳進悉命所司議行盖公忠勤之心至於終身乃已公平生尤喜著述凡經史稍有疑輒訂正之其為文簡直不為竒險語而理致明白粲然可愛所著有疑辯録三巻南臯子集二十巻箐齋集五十巻公之祖父並累贈資政大夫禮部尚書妣趙氏韓氏並贈夫人配王氏咸寜教諭錡之女有賢行封夫人子二長汝端鄉貢進士汝靖國子生女三長適鄉貢進士李鯤次適進士劉武臣又次適任琛公為人莊重和厚喜怒不形與人交久澹如也對客談論出入經史亹亹無窮性更孝友侍母夫人居両京極其奉養待弟洪範恩義兼厚鄉黨稱之予與公舊為僚友相好且久以公卒之明年某月某日𦵏某山之原其子持禮部尚書耿公之狀泣拜請銘于神道之碑義不得辭也銘曰公昔翺翔來自西蜀甲科高躋朝士屬目詞林春坊出入仕禄惟仕既優而學則篤矻矻嵗時不忘誦讀堂堂辟雍士遭教育帝曰汝賢有命宜服舊規獨持造就何速乃登禮部自亞而卿國有大禮屢議而行夙夜在公勤勞不寜遇事即言豈畏近名奏䟽屢上攄忠獻誠朝廷更化登用老成公忽引去尚被恩榮孰知三載遂隔死生惟公著述縱横几案遺被後學有疑己辨惟公論議老而不倦載在國史後當有傳巍巍蜀山白石嶙峋有司相役築兹髙墳孰云公亡䘏典維殷乃闢神道樹之堅珉百世而下考于兹文故推誠宣力翊運武臣特進光禄大夫柱國夀寜侯贈太保昌國公諡莊肅張公神道碑銘張公諱巒字來瞻别號秀峰今皇后之父也曽祖諱希信祖諱廸䕫州知事考諱綬俱以公貴贈夀寜侯曽祖妣王氏祖妣郝氏妣裴氏俱贈寜夀侯夫人公之先河南人也自希信府君徙山西徐溝知事公再徙河間之興濟故今為興濟人世有積徳人謂其家當顯然知事公與其兄交城教諭縉仕皆未逹後有知地理者謂其地當出大貴人公時方業儒淹于塲屋亦莫知能當之者及公之配金夫人一夕夢月入懐已而生聖女果正位中宫為皇后實配今上皇帝誕今皇太子以固國本於億萬年而公乃屢受恩命至封髙爵此豈偶然也哉成化丁未憲宗皇帝在位今上為皇太子以册立妃禮成始授公鴻臚寺卿𢎞治戊申上嗣位以册立皇后禮成超拜公榮禄大夫中軍都督府都督同知庚戌再封推誠宣力武臣榮禄大夫柱國夀寧伯嵗禄千石壬子又以册立今皇太子禮成進封夀寜侯號加翊運階加特進光禄大夫禄加二百石仍賜鐵劵俾子孫世世承襲而累贈三代如制寵眷之來有加未已又五月公偶得疾方命醫療治越旬竟不起上聞訃震悼輟視朝一日皇后執喪哀疚克盡孝道於是上命禮部行䘏典祭賻加厚贈太保昌國公諡莊肅皇太子若親王及諸王皆有祭公侯大臣往弔祭者不絶而太監李公榮秦公徳奉命典喪事仍令工部等官擇吉地治墳塋恩至渥也公貎清俊性醇厚君家孝友交人待物重信義尚寛和人皆賢之本出宦族其從兄岐以進士官至都察院右僉都御史重念家世自少好學誦書綴文力欲取科第以繼志竟不遂乃膺貢入國監及為外戚感恩圖報夙夜不忘禮接士大夫謙謹愈甚未甞以富貴驕人素儉約不肯妄費至于故舊及貧乏者輒周䘏不吝論者謂公徳厚宜躋夀考不意止此生于乙丑七月十四日卒于壬子八月十一日享夀四十八以某年某月某日𦵏于都城西香山鄉翠㣲山之原夫人金氏亦出興濟名門婦道母儀賢行甚偹子二人長鶴齡聘嘉善長公主女王氏次延齡𦵏有期鶴齡等奉李學士賔之狀請銘其神道之碑惟外戚見于史書者在漢有表唐宋以來有傳如公之遭際聖明躬享其盛生榮死哀又非前代之可及可無銘以昭之銘曰天佑皇家聖神在位早正中宫流虹合瑞篤生儲副實惟元良國本既固皇圗益昌推厥自來以親外族有美張公克膺福禄惟公累世積徳有人或出或䖏同歸于仁公昔業儒恂恂好學力繼其先志向堅確壯而託迹鄉校賢闗人亦有言天道好還有兆斯開地靈夢吉中宫之生載寢之夕燕南令族孰數崔盧帝室聫姻公起鴻臚寵眷頻蕃受秩惟膴曽不踰年公在督府朱衣玉帯富貴顯榮中心抑畏畧無驕矜福禄方來尚有後命盛世遭逢國有大慶漢庭故事恩澤殊優爰從伯爵遂列通侯帯礪誓文金書鐵劵世世子孫承兹寵眷拜命兢惕公無所容匪幸而致禮宜顯崇身及中年如川方至夫何溘焉以厭斯世宸𠂻震悼䘏典惟豐哀疚致孝以慰中宫賜諡易名加封大國豈厚于公惟以報徳公雖逝矣子孫克承爵位相傳誓文可徴都城之西旣得吉卜賜𦵏於斯垂庥嗣續墓有神道樹之豐碑百世之下考之銘詩故正議大夫資治尹兵部左侍郎吕公神道碑銘國家任兵部大臣必簡選甞㦄邉閫習兵事者正佐相資先後相踵居中制外坐收昇平之効當憲廟之季逮今天子在位若吕公天章其一人也公諱雯天章其字保定安州人少為州學弟子員舉順天府鄉薦試禮部輒弗利成化初選為監察御史僅踰年㑹朝廷有事于東方從左都御史李公秉往紀功還擢南京通政司右㕘議未幾以内艱去服闋改南京光禄少卿召入為太僕寺少卿馬政修舉薦為都察院右僉都御史廵撫延綏有邊警衆議未决公曰㓂既深入宜堅壁待之彼無所獲必困而歸歸則以勁兵邀其後可以得志果如其言事聞有白金文綺之賚既乃築邉墻三百餘里㓂不得近人恃以安山陜饑榆林獨熟民流集者甚衆公慮其生變縱令出境墾荒地為田以食或謂其招㓂公曰使不出境必饑而死欲招㓂無米可恃後竟得無他所活不可勝計邉人至今能道之久之徼外益無事于是有兵部右侍郎之擢𢎞治初遷左侍郎時天下無警曹務外無以自見屢有建白皆下有司比持節封宗藩清稽武誥名籍皆其餘事也其為人樂易可親遇事不窘交朋友待鄉黨皆從厚是以人賢之公年六十有六卒于𢎞治甲寅五月九日將以乙卯某月某日𦵏于州城南西村之原上命禮部諭祭工部治𦵏皆如制公曽祖諱某世家州之集賢里因號集賢居士甞導滹沱河水以利民人稱為吕公河祖諱伯榮考諱敬俱贈正議大夫兵部右侍郎妣皆贈淑人娶陳氏累封淑人先卒子二長時正以恩為國子生次時應側出女三國子生房銘錦衣百户袁凱士人李某其婿也時正奉狀請銘于神道之左故叙而銘之銘曰公昔乘驄向東洛晚嵗提兵駐河朔山川盤紆地包絡譎謀窺覦進還却行能運籌坐方略入為貳卿兵竟握中制無論北門鑰資深地中當峻擢竟以是終䰟何邈九原茫茫不可作終始哀榮兩無怍王畿之内州有郭公歸賜𦵏猶寵渥我銘在兹石不剥後千百年光有焯右副都御史錢塘李公神道碑銘李氏之先汴人也從宋南渡來杭入元有仕為管軍萬户者以事謫居徐州其後子孫以兵亂而還故今為仁和人公諱昂字文舉生則頴悟不羣弱冠登浙江鄉試明年景㤗甲戌舉進士除工部都水司主事改兵部車駕司陞山東青州知府年始三十有一人以其少未更事為慮至則廢政悉舉郡中稱治凡八年闢田至五千七百餘頃賑饑民百二十萬而復業者五萬二千五百將滿去民狀公政績三十有四事上于廵撫大臣願留公終恵一郡俄陞福建布政司右㕘政民懷思不已刻像于表海亭列邑皆建祠或有寃不得申者輙走祠下愬公其得民如此丁内艱服除改山東尋進右布政使舊治民鼓舞而迎者載道再轉河南左布政司時值嵗歉悉力賑䘏又吏弊多端公作吏範門約禁典以戒飭之四月適江西盗起贛州聚衆刼掠㑹昌信豐諸縣殺郡縣官其勢甚熾朝議以公宜當廵撫之寄遂擢都察院右副都御史以往公奉敇即行以官吏因循多不用命痛䋲以法乃議立營堡壓賊巢穴使不能出别募勇敢士與兵民同操習已而進兵賊聞風皆披靡斬獲不勝數事聞朝廷賜敇奬諭公以今賊雖㓕當立守禦計盖㑹昌與福建接境萬山阻絶為上杭武平流賊所聚雖甞有兵守禦而寡弱不支宜即㑹昌立行都司以統諸衞乃創廵檢司於龍南要害地庶保無虞奏上皆從之公以賊平䟽乞致仕不從移總督漕運兼廵撫鳳陽等府地方以國計重務推䆒其利弊而罷行之則以在江西時以嚴致怨怨家相與騰謗而公竟去矣識者恨之公為人精勤明敏才氣沛然遇事能為若無難者性尤孝友每恨早孤語及其父輒嗚咽不已奉母夫人能盡色養事兄及二姊恭謹其賢又可稱也素好文翰所著述多有可觀有文集四巻奏議三巻藏于家曽祖某祖某父真累贈中憲大夫前母喬氏母吴氏累封太恭人公初娶盛氏監察御史某之女再娶陳氏南康知府某之女贈封並恭人子二曰世蕃世䕫俱側室張氏出公生宣德九年十月十二日卒于𢎞治五年三月二十一日以明年某月某日𦵏某山之原自公之去江西朝廷論平賊功屢遣官賜文綺寳鈔以酬其勞及卒諭祭營𦵏皆如䘏典命其子世蕃為太學生奉南京大理寺卿致仕夏公狀以神道碑銘泣請于予予與公有同年好雖不忍銘而其情尤不可已也諾而書之銘曰公生于杭起自弱冠甲科先登翺翔雲漢爰自郎署出守大州循良之政卓爾惟優乃厯三藩卓有政績峻擢都䑓畀以重責䖍民不靖山谷跳梁西望疾驅璽書煌煌屬吏驚聞相戒用命羣㓂蕩然易亂為靖公有長策惟亂可平公有時譽而謗亦興移鎮于淮才未及展歸休于杭吾席可煖以遨以逰其樂自由俄歸泉臺斯世莫留古云人亡公論始定昔者浮言曷為公病身後優䘏降兹渥恩松柏交䕃屹然墓門湖山之間往来魂氣功業未終尚戀斯世乃伐山石載此銘詞百世之下可考于斯故奉天翊運推誠宣力佐理武臣特進光禄大夫右柱國太師兼太子太師保國朱公追封宣平王諡武毅神道碑銘王薨之明日訃聞于朝皇上震悼下有司據彛章行䘏典於是禮部按諸司職掌功臣公當追封為王制可乃封宣平王禮部請定諡武襄王子暉奏諡與祖謙實同復改諡武毅翰林撰誥文工部給棺木米布上及皇太子内外親王遣官致祭者六皆如制又特命中貴人賜寳鏹二萬紙為賻而給驛送其䘮于宣府祖塋之次尤異數也王諱永字景昌姓朱氏世家河南之夏邑曽祖諱明從高皇帝起義兵祖諱貞從文皇帝靖内難累官至中都留守司指揮僉事考謙累官左都督佩鎮朔将軍印鎮守宣府以功封撫寧伯贈侯英廟北狩駐城下率王出見上眷其功王在景泰間嗣伯初立十二營命王管宣威營天順既復辟王特䝉寵宻任使慎重不洩多稱㫖命管神機三千營賜衣帶馬刀銀幣鎧甲遊幸必以從庚寅宣府警上以王習兵事可大任敇出禦至已退壬午修景陵命總三千營甲申憲宗立建裕陵命總神機營兼理三千營掌右軍都督府事定襄伯郭登鎮甘肅王疏薦其才遂與同事輿論翕然稱賢時復立十二營命王總之三千營如故成化丙戌荆湘賊劉千斤亂命王佩靖虜将軍印總兩京湖廣江西四川兵討之王擣穴擒渠斬九百餘級又戰古路山獲賊子劉聰等并械印獻俘封撫寧侯増嵗祿丁亥朔命王佩平胡将軍印總京營及諸邊兵禦敵己丑賜勲號官階為奉天翊衛推誠宣力佐理武臣特進榮禄大夫柱國撫寧侯世襲伯封三代庚寅佩平虜将軍印制諸邊兵敗延綏冦即軍封世襲侯留總制三邊辛夘戰栁樹村大捷丙申入侍經筵戊戌加太子太保官次子暟錦衣百户増嵗祿己亥進封保國公庚子冦犯延綏復命王出師加太子太傅特進光祿大夫右柱國増嵗祿給誥劵仍封三代辛丑戰海東山有功賜世襲公爵再給誥劵癸卯佩鎮朔將軍印總制大同宣府諸路兵加太子太師丁未上嗣位修茂陵庚戌修太廟夾室加太師改掌後軍都督府事自為侯值三大禮為班首有大事祭告遣行禮儀度恭謹觀者起敬軍國重務廷議王必與剴直不避忌嘗陳時政數事人謂得大臣體疾増劇遣中官賜羊酒蔬米御醫視療而疾不可為矣王素孝與其弟都指揮甚友器宇宏深言笑不茍内藴莫窺其際而蒞政行法一以嚴敭厯既久威望益隆内外皆倚為重庶幾古名将風用能樹功進爵保身完名夀考令終追封大國終膺美諡賢子孫引不替殆世所僅見者也王元配孫氏都督宏之女賢而蚤卒贈保國夫人後繼張氏太師英國公追封定興王之女亦有内行封保國夫人子七長暉錦衣衞勲衞當襲公爵才器可稱次暟累官錦衣衛指揮使管鎮撫事次暌昉旼旽皆例賜冠帯女四長適永康侯徐錡孫二王生宣徳己酉十一月某日薨于𢎞治丙辰二月某日夀六十八𦵏以某年某月某日銘曰朱有伯爵肇自撫寜惟王之才克肖克承内握戎機外總軍旅運謀奮力莫我敢侮著功効績餘四十年人曰王才帝曰汝賢由侯陟公位極五等載加公孤秩位殊夐錫之誥劵誓以山河公子公孫其永實多宣平有封武毅有諡聖恩孔彰昭于世世家有譜乘國有鼎彛神道有石銘章在兹紛紛武家如此葢寡王名不窮以俟來者故南京守偹掌南京中軍都督府事太子太傅成國公贈特進光禄大夫右柱國太師諡莊簡朱公神道碑銘公姓朱氏諱儀字炎恒世為鳳陽懐逺人髙祖諱亮元末時從太祖髙皇帝起義兵累功授燕山中護衛正千户祖諱能嗣職從太宗文皇帝靖内難以元功封國公加授太傅追封東平王諡文烈配享太廟妣封東平王夫人曽祖祖考皆封王妣皆王夫人考諱勇嗣成國公爵厯事累朝皆總大兵掌中軍都督府事以功授太保正統末從英宗睿皇帝北征死事土木追封平隂王諡武愍妣沐氏繼妣王氏皆封王夫人公王出也生而氣宇凝重具文武材景㤗壬申嗣成國公景皇帝當祀太廟偶不豫夜宣㫖遣公攝事倉卒無遺禮丙子命治周世子喪財省事集天順丁丑英宗復位見公曰平隂有後矣孝恭章皇后之合𦵏景陵恭讓皇后之改册皆命公行禮有㳺幸或召以從壬午命持節封蜀王勞錫無所受甞較射内苑連中的上喜甚賜寳鏹一箧葢自是始有意大用之癸未南京守偹官缺敕公往兼掌中軍都督府事賜白金三十両金織蟒衣一襲甲申憲宗純皇帝嗣位申命以行時南畿饑命公賑捄公議令獄囚贖米及都城商稅錢鈔皆市米諸藩給僧牒亦凖是法所活甚衆時㳺食頗盛公議京伍未實宜使此輩應募為兵得若干人鹽徒彭釗强賊李湘為江路患遣將校跡至九江獲焉儀真守偹官缺薦都指揮勝勝果以亷明官至總漕都督戊子旱奉敇㑹讞因多所矜釋又議諸郡嵗輸軍儲許臨船預放三月省耗數般直得十餘萬石貯于倉傚古常平法行之㑹有詔諸守臣符驗皆進繳公言南京根本地事有緩急非符驗不能速逹又遣官勾稽營籍公言舊制軍數不宜泄事皆寢城門守兵盡隸營伍止留老羸數人公謂宜飬銳示威始定畨代法議久不决後四年公復力爭又言營卒多病死請官置醫藥皆從之今上皇帝之正儲位也廷臣方表請公率南京諸大臣上表適至降詔優答且賜綵幣海賊劉通勢甚猖獗衆議欲招之公謂必先讋以威乃遣舟師分據要害賊勢窮歸罪械其首惡三十三人送京師脇從者皆釋弗治海道以寜乙巳星變求直言公所陳多切時弊屢上䟽辭任詔以公亷静老成不許加太子太傅視事如故憲宗既升遐公哀慟極至燕不舉樂者三年今上御極賜綵幣一襲白金二十五両公復辭任亦不許有言武官多不畏法請嚴降黜之令公言皆是祖父功所積且律有定法豈宜槩黜遂報罷辛亥皇太子生公首請正儲位受賜如前孝陵明樓壞公請修葺又言欽山十廟亦當修二役成有㫖嘉勞刻石紀功大勝龍江二闗及浦子口教塲為水所廹亟請内圖以免衝嚙暹羅夷人入貢還泊龍江市中國子女為奴婢事覺或言宜寘不治公以為事闗國體遂舉正管押通事官追給夷價各遣歸每嵗録囚公當執筆必從容訊問務求其情尤嚴祀事凡代祀南壇太廟者各四社稷山川孝陵及大江之神各三以常典祭者多不可紀皆夙戒發未甞少怠内外文武臣所與議事者前後幾四十人公處之皆寅恭協一久而彌篤甞與諸耆宿為夀俊㑹觴詠極娱在㑹者或休官或物故而公巋然獨存夀至七十當𢎞治丙辰三月六日卒于正寢公始得疾即上䟽辭上優詔勉留遣醫視疾命甫下而訃至矣上震悼輟視朝一日賜誥贈特進光禄大夫右柱國太師諡莊簡贈棺槨米布給驛歸其喪命有司治𦵏事自聞喪至𦵏賜祭者十三皇太子及内外親王祭賻亦厚南都公卿至於官士罔不走弔營衛將校多哭至失聲市民官𨽻焚楮然燭哭于巷陌者無虚日非徳之淪於人心而能是耶公踈髯豐頦靣如頳玉簡重寡言平生忠孝出於天性痛父死難誓欲雪恥沙漠既官於南不得遂每燕坐憤恨灑涕我先王安在而我享此禄乎賜第中道石寢泐或請修之曰此石先王所履吾不忍易也事母夫人極能順志孝養居䘮毀瘠去墓百餘里徒跣以行弔者雖㣲亦拜謝于門庶兄佶廕羽林前衛指揮使父没財産聴其自取及佶卒撫其子輅亦厚都督僉事郭鋐之母公女兄也甞迎養于南餽送至殷勤焉遇姻黨皆恩義好拯人急甞早朝道得遺楮追其主還之使歸至徳州見鬻子女數輩盡収買之復遣其歸不取其直家人梁敏者廣東人娶婦生子矣其父見之徘徊不忍去公憐而遣之福英者鳳陽人為盗所賣窮而歸公亷知其父止一子亦遣之有鬻子於倉官者官滿子戀母不肯行公贖歸之今襲爵千户矣父母道死舟人棄其女於江涯公命有司收養後嫁百户王隆為命婦公好讀經史工大小楷法間攻吟詠聲伎狗馬一無所好臨財不妄取而贈施皆從厚故雖爵上公嵗禄恒不給禮賢下士至忘勢分汲引人物寸長片善必加甄録武學官士躬自課試官将領登科第者相望尤識治體莅政之初喜事者或有異議公謂留務至重不宜作聰明擅威福妄有更改守之不變久則民安而信之不疑矣守偹三十餘年上下輯服軍民安堵外警不作古所謂無智名無勇功深長為國之謀明哲保身之義兼盡而無遺矣顧事渉綱紀則力爭之爭之不得則嘆惋累日恒曰事體易壞復之則難知者以為名言配胡氏少傅忠安公之女封成國夫人賢而有則子二長輔公教以忠義病革執其手以指畫將士二字示之今輔嗣公爵恭謹有父風次慧而早卒女四長適南京守備魏國徐公俌次適今知制誥李學士賓之封淑人三適宣城伯子衛瓉四適真人張𤣥慶孫二曰麟曰鳳女孫某公卒之某年十一月十一日𦵏于昌平縣北澤山賜地二頃為公墓子輔奉外舅隆平侯張狀介郭都督請銘刻于神道以垂不朽予舊與公同朝近與學士同事聞公行實為詳乃叙而銘之銘曰翼翼舊都王業根本留司巖巖秩重分閫有美成公出扵將門平隂之子東平之孫受鉞英皇保釐是畀憲廟因之有任無貳居中制外守簡馭繁心在王室餘三十年正笏垂紳不動聲色慶賞刑威遵帝之則凡百官士悉出指揮少者已老壯者已衰時平政和兵戢不用公身去留為國輕重人願公夀為鯢為鮐公身存亡為世榮哀奕代元勲累朝故舊為子為臣世守忠孝山河有誓彛鼎有銘後百千春公死猶生桓桓二王賜𦵏兹壤公靈在傍足慰俯仰刻銘立石著徳紀功太史有文公名無窮故特進光禄大夫柱國少師兼太子太師吏部尚書華蓋殿大學士致仕贈太師諡文穆劉公神道碑銘惟愽陵劉氏世為邑程委社人其先不可考在元季有諱克讓者生紹先居鄉里有厚徳人稱長者紹先生㓗國初舉人材不就混跡戎伍中當太宗靖難時干戈擾攘保全民命隂有徳扵人甚多㓗生輔倜儻好義少㳺南京娶齊氏實生公諱吉字祐之號約菴㓜即沉厚有大志動履異常為大父所愛曰異日大吾門閭者必此子也稍長讀書從江右劉御史克彥學頴敏勤勵甚見稱許正統丁卯登順天府鄉試戊辰第進士選入翰林為庶吉士尋授編修景泰庚午充經筵官預修君鑑再修寰宇通志成陞修撰天順丁丑英宗復位命祀漢文帝唐太宗諸陵己卯預修大明一統志庚辰鄭世子及涇陽王以事召至命侍講讀朝廷知公可用時憲宗為皇太子因命侍講讀于青宫癸未丁内艱未幾修英宗實録起復至以公舊宫􅒼進侍讀成化丁亥實録成陞侍讀學士仍充經筵官日侍講讀賜金帯等物人以為榮己丑擢禮部右侍郎壬辰轉左侍郎明年夏旱遣祀東嶽等神有時雨之應乙未始詔以本官兼學士入文淵閣㕘預機務丁酉拜禮部尚書仍兼學士明年加太子太保兼文淵閣大學士又三年丁外艱去位上特起復公三上章乞終制不允因降敇遣官召還視事時上以今上在青宫命儒臣修文華大訓以資講讀書成進太子太保兼武英殿大學士尚書如故尋進階光禄大夫勲柱國甲辰轉户部尚書兼謹身殿大學士丙午進少保兼太子太傅丁未憲宗登遐今上即位再進少傅兼太子太師吏部尚書大學士如故知經筵事及憲宗實録成以總裁之勞加少師兼華盖殿大學士其冬秩一品降敇奬諭勲加特進兼大學士俸賜賚甚厚公至是以老數上章求退上察懇切允之益加賜賚令有司月給米五石歳撥僕夫八人仍降敇䕶公還鄉踰年疾暴作竟不起實癸丑十一月癸未也享年六十有七公容貎魁偉舉止凝重望而知其為鉅人平生䖏事精宻詳審尤善記憶能厯道往事為文章平實不浮凡考鄉試一㑹試二廷試讀巻三號能甄别人才或朝廷大禮輒持節為使數有建白當改元之嵗所以有裨于新政者尤多皆謂公有相才既歸于鄉適遇大水憐鄉人病饑作詩傷之其心不忘世如此葢入仕四十五年居内閣者十八年富貴顯榮已極為尚書時猶及封其父如其官尤近世所罕見也三代皆贈光禄大夫柱國太子太保禮部尚書武英殿大學士妣皆贈夫人娶叚氏封夫人先卒子男四申判官先卒韋中書舎人叚夫人出凖臯邑庠生側室吉氏出女五長適錦衣衛指揮僉事王義次適府軍衛指揮同知張文淵次適朱瀾彭瓉盧瀚皆指揮使孫男女各一于是公訃至上為輟朝一日遣官諭祭及營𦵏誥贈太師諡文穆卜以卒之明年二月二十五日𦵏于程委社韋以予與公同在館閣且久持黄侍講珣之狀請銘于神道不能辭也銘曰赫赫皇明奄有九有文徳誕敷十紀之久列聖在位亦惟輔臣為上為徳左右有民世值英皇號稱極治甲科得人莫如其季偉矣劉公起于其時績學翰林人尚未知乃侍經帷乃握史筆既登禮曹益崇要秩巍巍綸閣地位深嚴先帝簡重克當具瞻大事以臨大義以决以啓以沃亦復補闕建置末嵗任心益専志得則行身危則旋有䟽乞歸恩典不替策杖懸車愽陵故第既解機務心亦安舒宜躋髙夀何病弗除天子曰吁兹惟耆老䘏典亟行達于隧道屹然貞石爰刻兹文嵗久地夷以識公墳故資德大夫南京工部尚書程公神道碑銘𢎞治己酉南京工部尚書程公致仕還家後三年十月八日以疾卒享年六十七公蘇之常熟人也于是守臣以公訃聞事下禮部謂當遣官祭𦵏如䘏典上允之乃以卒之明年某月某日𦵏于虞山之麓其子惠特求予製神道碑銘辭不獲乃按少詹事吳君狀書之公諱宗字源伊姓程氏其先有三八將仕者從宋自汴南遷家于常熟世有隐徳至公始發以宣徳丙午七月十五日生少入邑庠學業有聲登景泰辛未進士初授刑部主事階員外郎擢吉安知府公在刑部治獄詳慎綽有才名時有大臣退休者當英宗復位之初畏罪自盡怨家誣其子謀殺久不能决法司奏遣公往訊所誣遂白吉安素號難治吏書奸弊百出每以訟牒自裁獄成特使從旁書之奸弊悉去至今郡人論作郡者以公首稱丁父憂服闋改知真定以病未赴吉安之民知之相率走闕下乞公復任至則改知武昌矣踰二年擢四川布政司左㕘政進陜西右布政使再轉左布政使所至皆有政績民多頌之朝廷知公可用特擢都察院右副都御史治院事尋以陜西缺廵撫即以命公適邉境多事偕總兵官率師征洮川西缺松等族及往來慶陽榆林調度兵食邉境無虞又丁母憂赴京乞守制得賜其母𦵏祭服闋未上㑹木邦酋長罕穵法孟養思六與孟宻曩罕㺯母子累嵗相讐殺雲南守臣奏乞調兵討之朝議以為不便宜遣大臣如程某者往諭乃即其家賜以璽書而行公被敕㫖諭之折其辯説及見曩罕㺯復責其擅相攻擊之罪皆頓首服乃以具奏始設孟宻安撫司以材寨歸木邦不相統攝而西南遂無事矣朝廷嘉之轉公左副都御史加俸一級仍巡撫雲南賛理軍務久之召為刑部右侍郎尋轉左侍郎以尚書缺署掌部事能律以法部中肅然九年考滿始拜南京工部尚書加一級俸公至是雖老益勤凡工役材用計度精詳無所濫費人方望公久任則致仕而歸且卒矣公之曾祖伯髙祖士廸父景和皆不仕以公貴贈祖父都察院右副都御史妣皆贈淑人配譚氏封淑人子男五曰恩國子生惠志感俱義官􅐂邑庠生女一孫男七公居官見於前所叙述者其大畧如此若其持身之謹待人之厚人皆知之不待書也甞預同考㑹試甄别得士為多喜為詩有宦㳺撫夷集藏于家銘曰壯哉海虞為吳上縣古有名賢文學肇見厯世既逺益多聞人有美程公出為名臣少學于家遂顯科第郎署初登刑無偏詖吉惟大郡爭訟為嬉以公出守吏不敢欺自蜀而秦以公分省政譽日騰廵撫是命乃長憲秩公才實優西戎即叙士卒歌謳乃撫南蠻乃息其忿片言折之兵不血刃久勞于外帝實念公有使召入馴至司空積勞既久而病斯作奉身還家晚嵗之樂何棄斯世訃音忽来䘏典爰降誠為死哀視其後人多而蟄蟄何以致之公有隂徳海虞之野有山巍然後識其藏司空之阡故資徳大夫南京工部尚書馮公神道碑銘公諱貫字大用保定蠡吾人也曽祖守道元西臺御史祖彥章皇朝洪武中人材任富平縣主簿考吉以公貴贈大理寺卿公少起田畆年十八始知自奮於學正統己巳之變士民驚潰失業公誦讀不廢及領郷薦入國學貧無膏燭夜每挾册隨月光晦則燎薪以續明其勤如此登天順甲申進士授監察御史甞出廵邉闗按州縣搜吏弊索民隠貪亷才頑多見褒黜成化中上䟽言時事曰慎爵賞恤窮民處流移修兵政廣儲蓄禁盗賊平刑獄息邉患節冗費重憲職數事上嘉納之及掌三法司事治山西妖民及劾兵部大臣大法事聞者肅然九年進大理寺右寺丞轉左寺丞進少卿不數年遂擢都察院右副都御史又改大理寺卿法律精明而持心仁恕甞曰大理平天下獄獄之不平咎在誰執故當奏讞必反覆訊鞫無憾而後已每廷議㕘酌得宜其言多載在條例有司至今遵行之甞應詔舉所知衆稱得人𢎞治六年拜南京工部尚書九年以疾乞致仕詔可且命馳驛以歸抵家一月而卒九月二日也夀六十有四娶李氏繼王氏並封夫人子男四綺純繪纓綺純太學生女二孫男三公魁岸美髯為人詳審沉靜而有謀謨度量汪如莫窺其際在大理甞承詔㑹同三法司録囚有餼羊上尊之賜㑹勘肅府汾川王承奉及廷試為讀巻官皆有寳鏹之賜𢎞治改元上太皇太后及皇后徽號誥封二代皆三品又有白金文綺之賜及卒上遣官諭祭治其喪𦵏之亦可謂榮且哀矣以某月某日𦵏于某山之原其從孫今吏部考功主事蘭為狀致其諸子之意來乞銘予與公同官于朝頗知之詳而狀之出處治行厯履終始亦偹矣因述而復之俾鑱諸墓道以為他日過者之式焉故銘之曰蠡吾之野馮氏居焉否而㤗來生公挺然如彼茂林有木㧞起匠石見之謂為杞梓材則可用用無不宜登庸于朝惟所任之昔領鄉書膺薦而至遂取甲科揚揚其氣銓曹慎簡置于内臺庶行其志不枉其材侃侃在朝職司風憲有所獻納從所聞見乃擢大理審克惟刑累官廷尉折獄益平帝曰勞哉刑實無誤汝其少休曰有留務周建宏父是為司空掌上之職爰以畀公禄既益豐心則加畏丐歸何遄以避名位豈惟知幾命亦自知故居稅駕門有靈輀生受榮名沒膺䘏典設祭營墳出于宸眷首丘之願獲遂所圖鬱鬱佳城巍巍蠡吾伐石刻銘樹茲墓道子孫繼之百世有耀故嘉議大夫都察院右副都御史謝公神道碑銘都察院右副都御史謝公卒于家上遣官諭祭命有司營𦵏皆如制其子鄉貢進士廷柱奔喪歸自京師以予與公同舉進士奉羅編修紀狀請銘于神道之石公諱士元字仲仁謝其氏也上世居浙後徙閩今為長樂人四世矣曽祖諱鍾祖諱琬考諱磐封中憲大夫建昌府知府妣徐氏封恭人公少以詩舉鄉貢登進士授户部主事上䟽陳四弊為尚書年公富所器許事有渉中官者力抗彼不勝忿求其事竟無所得擢建昌府知府有兵盗民財夜數發兵官庇其跡法不得施公以危言恐兵官皆奪氣姦始息乃新學宫作禮器行射法購書以惠來學若公廨驛舍城櫓壇壝之類皆増新制又建祠以祀李覯表黄孝子譚節婦之門以勵鄉俗為敦化表忠勸學三圗繋以詩俾民誦習知所嚮慕尤惡邪術南城民以腐䑕蒙一石像置屋上鴉聚而啄之民陽驚取之以為神趨者蝟集公碎其石于庭乃止復有女巫憑鬼物言禍福公欲䆒之巫忽自言吾畏謝公吾去矣遂如常時有持劵訟田者公遥叱之曰此偽耳僚佐問何以知之公笑曰劵紙今式其所訟乃二紀前事也蓋訟者姑以試公至是爭相告引去嵗再饑公捐俸金為倡富民爭開廪延糴民頼以濟蔡教授劉訓導繼死婺孤不能舉公歸蔡于漳歸劉於蜀二姓至今徳之成化間南京大理寺卿夏公時正廵江西首以公名旌于朝得賜誥命封父母及妻滿九載民詣闕請留陞從三品俸仍知府事諸生立生祠公撤祠毁其碑後乃復立公以憂去服闋改知廣信永豐有銀冶久閟䖏州民常盗發動以百計公勒兵循靈山以東趨之賊陽遁留二三人為餌邏者見而射之公亟止之不及伏四起刺公傷左股公裹創出戰得其賊首俘殺甚衆塞冶穴而還改知永平復以憂不赴服闋擢四川右叅政東鄉盗藪也縣三刼有司莫敢制公捕殺數百人或議徙縣公曰盗不憚逺畏有偹耳乃檄縣吏修城隍以土兵戍之後亦無變建始有頑民挾官府為害餘五十年公亷得其魁窮治之其黨盡散公治狀益著用延薦擢右副都御史廵撫其地蕃有大小娃者相煽為亂公託行邉閲兵積餉為戰禦計賊獻羊豕來迓道左公慰遣之民代輸邉儲者多為奸弊公遣吏覈實得逋米十三萬石有竒甞大祲民流入蕃部日不絶公為廣室十餘區作糜食之藥病𦵏死給歸者以符且餼之所活不可勝計𢎞治庚戌上京師以疾乞致仕年六十有七又三年年七十而卒公居官両迎父養從父病親為甞藥族黨昏𦵏不舉者必周之建祠堂置祭田綜理家政暇則玩易賦詩至老不倦所著有約菴稿若干巻詠史近體三百首公娶陳氏三子長廷柱次廷棐次廷最縣學生棐最出側室曹氏女八孫二本寛本忠孫女三公生洪熙乙巳某月某日卒于𢎞治甲寅某月某日𦵏于乙卯某月某日某地某山之原銘曰公昔朝天初掛冠閩山粤水中盤桓憶昔按行川蜀間峽舟棧馬逺復艱内綏黔黎外戎蠻朝劬夕瘁無優閒追思列郡久且煩名雖盛得力已殫功成身退古則然歛而歸之諒匪難詩稱明哲公有焉聖恩賜𦵏輝榛菅幽光上燭髙雲端文垂金薤青瑶鐫我銘兹丘世所安故通議大夫兵部左侍郎兼都察院左僉都御史贈兵部尚書李公神道碑銘公姓李氏諱介字守貞後改字守正萊之髙宻人也宋有為西臺御史者譜失其名今世墓存焉鄉人稱為西臺李氏公祖諱遜陜西都指揮司經厯考諱傑舉鄊貢累官至太倉衛學教授有學行俱以公貴贈通議大夫兵部左侍郎公年十一能屬文從父之睢州又之太倉㳺學久見聞益富成化改元領山東鄉貢五年登張昇榜進士被選入翰林為庶吉士文學敏贍諸老先生多器重之擢四川道監察御史改河南道出按浙江鹽課力除宿弊有不便者欲伺其隙中之無所得還掌道事凡中外官考覈殿最務持公議都御史以為可大用諸道奏牘必令可否乃上每率諸御史論事或有所觸忤未甞少挫甞予告家居及秩滿以久次超擢為大理右寺丞陞右少卿今天子登極命代祀東嶽諸神還遷左少卿陞都察院左僉都御史廵撫宣府閲兵馬畜芻粟邉圉以寜未幾召還佐理院事其所論建必先大體不事苛刻而律身無玷譽望日隆㑹母栗太淑人喪歸服將闋院佐復闕朝廷留而俟之暨復任陞兵部右侍郎尋遷左侍郎夙夜勤厲屬有疾暫已即出治事比嵗宣府大同有警上特命兼左僉都御史經略之時已遣中官武臣練京兵待報而發論者謂宜用文臣往遂以督軍事付公公大病新愈即上道至則㓂已退公悉心邉務徧厯營堡策勵將士鎮兵匿役者勾稽得萬二千人又募丁壯萬五千人訓以待用大同屯田嵗給牛具銀若干兩實不為官用而邉兵償死馬常苦擄掠乃請以給之人甚便將領有弗任者易置之又念大同境外有廢墻請修復為禦侮計所上議前後不絶事未盡行而疾甚卒于宣府𢎞治十一年正月二日也守臣給驛歸其喪上聞訃悼惜贈尚書遣禮官諭祭命有司治𦵏事云公修髯美儀言動雅飭居官清慎遇事必審而後發條分縷析舉無廢墜在北邉尤詳宻雖隆寒猶夜草奏牘手為皸裂使天假之夀得䆒其所施為當必有大可觀者而竟弗夀以止命也若其事親孝敬遇諸弟甚友愛範簡皆舉于鄉與人交信厚可質拯灾䘏困亦其所樂為者故沒而人思之嗚呼賢哉公年五十有四生正統十年某月某日𦵏以卒之年某月某日配杜氏洧川縣主簿鑑之女封孺人先公五年卒後贈淑人墓在縣西陸家莊至是合窆繼姜氏鴻臚寺少卿勝之孫封淑人子一人昆舉進士厯刑禮二部主事世其家孫二早夭昆奉春坊張中允天瑞狀請予銘神道之石予雅厚公知其賢悉矣乃為銘銘曰揚翹振華北方之英兮飽山飫川南國之靈兮績學詞林其業乃成兮執法中臺益奓厥名兮内陟棘寺佐國之平兮外廵邉徼屹為干城兮兵曹巖巖尊居貳卿兮文事武偹二美是并兮台階鼎軸不日其升兮天不憗遺一疾而傾兮帝命賢勞䘏死若生兮返𦵏故原有鬱新塋兮刻石𤣥堂以慰幽冥兮垂聲著功俟彼汗青兮謙齋文録巻四
