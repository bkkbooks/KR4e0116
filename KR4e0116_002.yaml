body:
  text: 謙齊文録卷二明徐溥撰序文宣府志序宣府未有志成化初葉文莊公為僉都御史巡撫其地嘗撰次成編未行而去𢎞治丙辰巡撫副都御史馬君中錫聞而購之宣府前衛指揮李稽自言家有是稿為鎮守太監孫公振所得將鋟梓㑹移鎮大同則以授君君見其事類繁雜為妄者所增損乃於邊務之暇手釐正之以復舊規而加新聞書既成凡若干卷伻來京師請豫序按宣府乃古冀州所分幽并之地在戰國為燕趙秦為上谷郡漢唐以來皆領屬縣石晉時沒于契丹轉而為金終宋之世不入中國元纍改為順寧府我國朝混一疆宇徙其民於內郡洪武間改稱宣府宣德中設萬全都司統諸衛所而內屬於後軍都督府宿以强兵統以主將監以內外重臣遂屹然為朔方一巨鎮歷纍朝列聖百有餘年聲教所被人物日蕃文軌日盛自有山川以來所未見也夫方之有志世所不能無而志亦久廢今郡縣之官或能各志其地邊方武士鮮克舉之所以提挈綱維修明章度惟憲臣是賴而居其任者亦不過兵事之為急非學優而識逺者孰能留意於斯哉此文莊之盛心馬君之能事越數十年而後見也觀是志者考沿革則知建置之難覽形勝則思保守之重稽古跡則有所酌而為宜徵文獻則有所取而為監凡為學為仕以自附於所謂人物所謂名宦由今之世以遡於古之人志之用宜不為無補也豈徒屑屑乎地理名物之細以為虛文也哉馬君豫禮部所舉士其為政卓然有聲志蓋其一事耳姑序其簡首而歸之侍郎蕭公夀詩序南京工部侍郎蕭公元衷致仕家居明年與其配李夫人俱六十生辰在春陽之月相距十餘日冢子刑部主事璵求諸公作詩寓歸至期將大㑹賔客歌以為夀以豫相知也屬為之序公在朝三十年士大夫服公之善頌公之德者為多獨豫乎哉公自舉進士即入佐天官卿品量天下士天下士識與不識皆知公之為賢及進通政遷侍郎位益髙而心益下未嘗有驕盈之色有不慊公者搆詞陷公朝廷置不問然公遂因是致其事以去衆皆惜之而公略無顧戀之態公之心豈以進退為榮辱哉其心蓋有足樂者公家泰和城之西有田園可以供衣食有山水可事吟眺且二親俱髙年無恙每旦坐堂上白髮垂肩黃金橫帶公與夫人進候起居退而受諸子諸婦之養諸子若璵若珂若玠又各有子矣一門四世優游於太平德澤之中公之樂豈尋常可及哉人固才矣未必能見用於時榮矣未必能逮其親况致位列卿二親夀而且康乎有伉儷不能以相得有子嗣不能以皆賢者皆是也况得內助偕老相繼登科而競爽者乎之數者公無不備信公之為盛福矣夫福出於天惟有善得以迓承之然則公之獲是豈偶然哉豫故著其進退之節致福之由以見人之頌之者未止此也若夫文章政事之美他日自有為公傳者兹不著送吳艾夫之蕭山序吾義興多故家城中吳氏其一也宋時有為太卿者衣冠相望入國朝來獨以隂陽術代為其學官艾夫自幼喪其父家益貧然落落不肯隨人後教小學生數十人取其束修乘壺之微以為養猶以為日惟人田是藝乃取所謂舉子業者攻之晝夜鑽研不少休息有疑義輒就鄉先進咨叩之雖以豫之寡陋無以相益亦時有問焉諸公見其抑下而勤懇皆樂為之盡言自是學日以富譽日以起與諸生試藝於有司遂超然中其列及上春官或勸其就校職輒不應已而卒成進士噫艾夫不亦有志之士乎哉他人舉進士望為侍從為臺憲次猶願為郎署鮮有樂為州縣者艾夫今得蕭山知縣豫亦意其不樂也拜命後即求浙之人問風土之所宜政令之所施且曰窮經將以致用也吾縱不能如古人亦豈盡下於今人哉翩翩然遂欲行以水澤腹堅不果今而春陽布和舟師告泮來告别豫語之曰艾夫官不以內外為重輕斯誠賢矣然以為縣果易乎哉艾夫曰先生不聞有龜山楊夫子乎夫子嘗為是邑矣偭規矩不足為方圓夫子吾師也吾何懼豫為之悚然益信艾夫為有志之士嗟夫士不以古人自期待久矣乃今於艾夫見之蓋龜山寓吾郡十八年風聲氣烈故在也艾夫平日持尚友之志每思起古人而從之今乃適承夫子之後宜其心有定向便求至古之人不難也古人豈但足用為縣而已哉艾夫行矣豫無以稽子矣勉之哉勉之哉送湖廣憲副費君之任序湖廣天下之巨藩也其四境交於河南陜西四川貴州廣西廣東江西及抵南畿之界惟其交於諸藩故軍民夷獠淆雜逋逃竄竊者多㺯潢池之兵時或有焉近嵗告饑則荆湘之間尤甚聖天子宵旰軫念大臣仰承德意凡任藩臬大僚必妙選文武公廉者任之乃成化十年冬臬司以副使缺員聞銓司者歷舉廷臣詢諸輿議以監察御史安州費君臻往焉君字時和以甲申進士釋褐拜御史沈毅公廉多所匡濟嘗平都門之獄市肅漕渠之奸橫風采峻聳所在著稱乃按南畿乃巡邊徼有文綏武威之逺猷不徒為激揚刺舉一時之政也如是者九載績用大彰憲副之命下人咸以為賀既陛辭故舊將出祖道大鴻臚卿楊君振芳徴言贈之蓋時和之司憲素間而優為者豫何能贈然嘗聞湖廣之地既廣幨帷行部動輒千里况巨鎮峻山蠻烟濕霧仕於彼者往往憚於跋履惟安坐公府一以符檄追呼期㑹則窮涯深谷含寃茹毒不得自致其情於上者多矣嘯聚㺯兵蛇蟠豕突驅脅良善蹂踐稼穡亦其不得已而然歟噫君子一視同仁之心少狃於安逸倦於行邁卒啓釀禍之一端良可畏也孔子告子路為政以無倦則倦之一念古之大賢猶恐及之夫人未可忽視之也時和行豫敢以是致愛助意氷雪載途尚慎所往是為贈送曽以文之守建寧序户部郎中鹽山曽君以文擢知建寧府事士大夫皆喜之或曰以文舉進士為主事為郎中今二十餘年不為不久矣他同升者內佐六卿外列方嶽不為不多矣而以文才得一郡寄以文之心將不樂諸公乃為之喜耶或曰不然仕貴得行其志焉耳初不較其秩之崇卑也今六官之事大率總於卿為之二者雖有才美不能以自見列方嶽者分郡縣而理之時一按臨朝至而夕去雖有愛民之心勢不能以周遍而浹洽也豈若為郡者之專乎政事緩急先後惟我之為閭閻休戚利害惟民之從吾之才美以之而著吾之愛民亦於是而周遍浹洽也故曰仕貴得行其志他不足較也豫聞之曰斯言誠是也然豈以太守之秩果卑乎朝廷於六卿牧伯之外郡守獨注意焉蓋由以安民為急也今之為六卿為方嶽者多自郡守有政績者升安知以文異時不階此而進乎獨不知以文之去而為郡何如也建寧閩劇郡上而藩臬所責成下而列邑所視效以文得無懼乎以文侍從之久諳練之深宜知朝廷所以急民之意設施措置素有所具豫固不得而瀆告之也詩云愷悌君子民之父母又曰夙夜匪懈以事一人敢誦以為以文勉於是諸同寅以豫言可以足或者之意請書以贈豫以以文同升之無似者然不敢辭送户部郎中馬君德源之宣府序曩豫識馬君德源於吏部劉先生之座嘉其器局宏偉而措心恭慎與座客論之知其必將逺用也時德源為户部主事偶與户部尚書關西楊公侍郎莆田翁公論及所見略異同焉今年夏聞命下德源為郎中奉敕總理宣府饋餉屯種之事咸以為當其才蓋宣府實國家之北門百萬貔貅於此焉宿郡縣之挽輸屯種之收穫儲峙出納動以萬計脫以尋常之才處之豈不僨事哉是宜朝廷之所委任吏部之所銓擢必於輿論之所歸人望之所在也蓋邊閫以軍旅為重軍旅以芻粟為本是故漢之衛青霍去病所以待胸奴單于者汲汲以屯田便宜為策諸葛亮王佐才也未嘗舍耕而戰而皇明之待西北二邊又非漢比所以挽輸屯種儲峙出納皆講之至精至密為聖天子神孫世守之良規也茍非其人何所容足宜德源之必於是乎任也德源由是而往以總憲度以理軍務蓋可計日而待矣君子之道恆失之自盈而矜恆得之自欿而勉德源夙夜其勉哉惟上無負於國家而名爵有所不足計也德源行同寅與凡所厚者餞於都亭豫同年李君載道屬豫言以序之於是乎言且請質於劉先生以為何如德源名孝祖昌平世家由庚辰進士而出云播州宣慰使楊君挽詩序成化癸卯春正月五日播州宣慰使楊君卒於家其子愛序具事狀走書幣乞銘其墓於寅長宗伯周先生先生既托君世系勳勞與平生忠義大節俾刻諸石而京師縉紳大夫知君之名想慕其風裁者咸嗟悼而哀之以詩詩既成付先生復彚萃於册屬豫序簡首於乎哀死人同情也而哀有發於愛者有發於義者其為情亦各有在也夫同里閈共寮寀有交承之分親舊之誼旦暮相歡而忽焉永隔則情不能以不哀是哀之者發於愛也乃若素昧平生而其英聲偉烈聞之使人感慕興起思一覩顔色而不可作則情亦不能以不哀是哀之發於義也今諸縉紳大夫之於楊君勢逺而無交分疏而無親非有所愛於其間也而莫不欷歔嘆息寄哀音於聲詩此豈非義而哀之也耶余嘗考君之為人天性孝友器度宏博負通敏之才存謹畏之心自弱冠承世官即毅然以安民討賊為己任控制諸畨邊境以寧道路以通而不貽朝廷西顧之憂者君之力也列聖嘉其勞績纍賜璽書奬之至於文綺白金不可殫紀嘗一入覲適郊禋慶成特詔君與宴陛辭之日賜一品服皆異數也而君益感激忠愛之心始終弗渝年四十即引疾致仕以子代任然每征伐輒奉詔視事事既平即招延四方文士相與徜徉林壑酌酒賦詩臨池灑翰若不知有富貴者君之為人大率如此有足起人歆慕而愛敬者義而哀之不亦宜乎然愛情之私也義情之公也私者止於一時一人公則通於天下後世是册之作君之哀榮於是乎備矣君之勳名於是著矣君之子孫𦙍祚歷千百年而無窮者於是乎有徴矣豈直哀之云乎君名輝字廷彰别號退齊世次履歷具詳於君所編忠孝堂集并志墓之文兹故得而略云吳尚書忠節録序自古忠節之士史必有傳廟必有祀所以表其賢報其功惟恐其人泯沒於世此人心之所公也雲南有廟始祀國信使翰林待制贈學士諡文忠金華王公禕王公死後二年有湖廣行省參政前刑部尚書宜興吳公雲繼使其地而死則未有祀之者豈惟未有祀之者且未有知之者矣豫少則聞先君論公使事而心向慕之既竊祿於朝嘗自念公之忠節人當表之報之豫豈避鄉里之私而使其名不傳哉乃以書告於巡撫雲南都御史王君詔詔以為己責為奏請於朝始得與文忠並祀於廟仍䝉賜廟額曰二忠而公後且得追贈刑部尚書諡忠節於是公之名始傳於人而豫數十年向慕之心庶少慰焉公之使事自當載於國史故李太僕應禎平日有惓惓於公者又傳以表公之賢至是豫甥翰林編修吳儼復裒其事為忠節録録成告豫當序其首竊觀之使事豈直追及古人而已殆有過之者蓋當洪武初天下既定獨雲南以險逺未下髙皇帝始遣文忠往諭既被害乃再遣公因有為朕作陸賈之語夫當尉陀自王南越賈為漢使說之臣服其事固善賈之槖中裝則不少矣未免為持節之纍觀公之能死身且不顧使當時雲南遂下餽之金寧受之乎使陀不服則賈萬無死之理何也其所為身與家者重也是以公死後其子黻䝉朝廷賞延之典僅得一太學生至今諸孫僑居湖湘貧之無依視賈之五男子雖若不及然前人之清風光被多矣此所謂過乎古人者也公既廟食雲南鄉人復祀於先賢祠獨其諸孫可憫尚當治其田廬返其故居云慶行簡尹公壽序成化十一年乙未三月又六日翰林侍講學士泰和尹正言先生自禁林退食語諸同僚曰吾從父行簡公夀七十有三矣今日適當初度逺在大江之西某不能從諸子後進一觴想家君學士遙菴公必與夀筵諸弟文言甫言輩羅列堂下趨蹌左右寧不垂念於某乎僚友應聲曰此骨肉之情天倫之樂上下交慶理勢之自然也奚待言哉正言凝然遐思者久之乃遍揖僚友而進曰吾身不可往吾心獨往吾心不可見吾言可徵敢撰祝詞附一便使致誠左右尚敢假重於諸執事各惠以篇章則球琳琅玕交陳互列黃鍾大吕更倡迭奏二三老人得以憑几而聽之所以動蕩耳目流通精神則未必不為期頥之一助也僚友咸應諾翼日乃各出新詞雄作裝潢巨軸而聮書之俾豫序於首豫念與正言同年同事而尤厚者敢辭乎乃言曰小雅南山有臺之篇曰遐不睂夀德音是茂言君子之必得其夀以其德之盛也又曰遐不黃耉保艾爾後言君子之盛德豈惟必得其夀亦足以保養其子孫也今行簡公夀考而訓迪子孫俾處則克裕其家出則見用於時庶幾德有諸己可知矣諸作頌之祝之夫豈不宜然嘗考南山有臺作於周武王之世武王勝殷遏劉天下之治未久也詩人祝君子之夀而燕及其後願之也願之者必然之辭也我國家之定禍亂興太平於今百餘年矣天下之人沐浴仁聖之膏澤享其夀考長育子孫熙然自得者誠多故豫不特為尹氏賀也由是推之聖明之巨美在焉出作入息不知帝力何有行簡公其擊壤之老人乎夀固未可涯也諸作乃賀之始耳尚備百篇焉馬湖安氏族譜後序古之有功德者天子錫之土田俾立其國於以傳之子孫社稷有祀人民有主世守之而不絶其次為卿大夫亦各有采地子孫之賢者得世其官否亦得世其祿焉夫既有其國與地則皆求立未免如齊之五公子者於是明宗法嚴世系具在譜牒可以見考不啻如視諸掌然此非特王朝之上五服之內諸侯卿大夫為然也虞書曰外薄四海咸建五長所謂五長非世承之何以役屬其下且其地荒逺非世紀之則其爭端殆未可息者馬湖古僰侯國之境漢武帝通西南夷始號其地曰牂牁歷代內屬至於國朝得列為府而世守其土曰安氏按其譜自漢武帝時有諱阿都者繼陳立為牂牁太守自是以後土人非安氏不治蓋凡二十八傳當洪武五年有諱濟者入覲太祖髙皇帝嘉之賜之誥命特封朝列大夫遣還守土百餘年來又四傳曰鼇益善撫綏邊民向化顧嘗手緘族譜一編不逺數千里遣使來京既請宗伯周先生序之前復託其鄉進士李文安求豫序其後豫閲之竊歎譜牒之作有關於國家也甚大然後世往往不以為急而不之務雖中州猶然况於邊徼乎而今獨見之雖其編纂疏略不能合乎歐蘇之舊法若其嗣續綿延猶能考乎楚越之世家此豫所以與之也惟昔竇融當漢中興據有河西之地及與梁統等五太守入朝光武禮遇優異位至三公至其諸子若孫富貴已極卒以驕奢失之若安氏自漢至今雖爵位不及融而長有境土過之逺甚豈非其子孫能以驕奢為戒也乎序而藏之非特著其世系所以為百世勸者於是乎在趙氏家譜序家之有譜猶國之有史史不作則國之離合治亂人才之邪正進退政治之因革損益皆無以昭往昔而示方來譜不作則世系之所由始昭穆之所由分皆懵不可考譜之作其猶有宗法之遺意乎古者宗法行世系之相沿千載不紊自漢以來宗法始壞然官有簿狀家有譜系則猶有可考也五季以降官籍復廢其流之弊不可勝言有志於復古者可不加之意哉司禮監太監趙公忠嘗自譜其先世合為一册求豫序其首惟趙之先世家雲州元季髙祖斌興避兵來涿因家郡之北馬村坊曰積慶鄉曰禮尚斌興二子長曰原是為曽大父原有二子長曰顯是為大父顯子四其季曰鑑實生公公自幼被選入內廷受知先皇帝及今上纍被任使有飛魚金織衣之賜頃勘事南畿尤為士大夫所稱故豫於趙氏之譜不能無言焉昔周穆王封造父於趙城是為趙氏其後與韓魏並封傳六侯四王遺宗散處居天水涿郡者尤盛今斷自五世示信也支分小大宗法之遺意也先塋有圖世系有録昭所出也潛德特著婦節具書尚賢也詩文叢載侈盛也於乎豫觀近世巨家譜系散逸十室而九雖號稱士大夫亦往往有籍談之忘不然者又或有崇韜之附而趙公所作乃如是豫嘉其能不忘本而有志者也因而序㑹試録序成化十一年天地之氣化日新而文章實與之俱故閲歷百世作者言人人殊豈人人能自殊其言哉氣化為之也氣化盛則文章亦隨而盛故覘世運觀人材者恆於文章乎徵之較文取士源亦逺矣成化十一年春禮部當㑹試天下士尚書臣鄒幹侍郎臣劉吉臣俞欽以考試官請上命少詹事臣徐某侍講學士臣邱某往主校文之任同考官則編修臣李傑董鉞費誾尹龍喬維翰檢討臣傅瀚張泰右給事中臣章鎰員外郎臣劉元署員外郎臣趙珤主事臣謝恭監試則御史臣方升李芳而內外百執事皆推擇惟允時天下士領鄉薦書而至者幾四千人圍棘而三試之臣等夙夜祇慎舉其文燭照而鏡臨之銖稱而寸度之既明且審乃遵聖斷取三百人遂次第其氏名與其文之尤者勒成一巨編曰㑹試録以獻諸宸御而播之天下竊惟國朝之興適當氣化極盛之運惟盛故久原其所以盛而久者承積衰之後故也自趙宋南渡後局於偏安其間雖天地生才未嘗或息然厯數百祀欲求其朝廷雍熙人才後先奔走未有也寒甚則燠亦甚雨恆則暘必恆我國朝之興也氣化之盛極而悠久則將必有開闢以來所未有者文章得不隨之而盛乎自國初以逮於今閲百餘載炳煥於簡册鏗鍧乎事為者日昌以大追三代而上之故今所取雖風簷寸晷應試之作亦皆明於理而贍於才如此可以遙度其志行之良前占其勳業之盛矣預兹選者尚益持其志彌慎其行懋進於勳業企前烈而勇邁引後賢以丕承殆見聖德益崇民俗滋乂國祚與氣化綿億萬載而無窮矣謹用是為諸士勸㑹試録序成化十七年天下之材無乎不有顧世之求者何如耳三代之士多道德春秋戰國之士多功利兩漢以後之士多文學其人殊其材異非天之生之固然也蓋上以是求之則下以是應之有不能是者皆變遷以從之耳我國家自太祖髙皇帝設科目以求道德文章之士列聖相承百年於兹士以道德文學應之而致君堯舜措民唐虞垂名竹帛以為一代之名臣者胡可縷數哉成化十七年春復當科試之期禮部臣洪謨臣一夔以考試官請上命學士臣某臣獻往蒞其事同考則侍講臣音臣傑修撰臣瀚臣寬臣廷彥編修臣良臣戩右給事臣晟給事中臣中錫員外郎臣鼐署員外郎臣濬淵主事臣裕監試則御史臣介臣符皆遴選以充於時天下士來就試者幾四千人臣等暨內外百執事咸矢心竭誠防範加密三試畢遵制額取其文之中式者三百人爰列其名氏及表其文之尤粹者彚而成録臣濫竽主考當有序以進蓋臣少居山見山之木若雲然養以雨露之深培以嵗月之久比比皆材者而亦未始無不材者雜其間欲作室者必命匠氏於是乎掄之匠氏遍觀而諦視其材者取之其不材與夫材而未中度者則皆棄之矣間有堅其外而折其中惡其質而美其膚者則非匠氏一時目力之所能辨也必待斫削之乃始見而亦不免棄於匠氏其能幸而為棟梁榱桷者不亦罕哉今士荷國家作養之恩非一日皆以道德文學應上而起既取之於今矣其用之於後也可待由是入官必使德與文副實與華稱凡異日之所行皆不負於今日之所取則士而大夫而卿而公如前所謂致堯舜措唐虞以為一代之名臣斯偉矣不然今嵗幸取後安可保不為人所棄哉某等掄材者也斫材者欲用之為棟梁榱桷之具其亦相與謹之㑹試録序𢎞治三年皇上嗣登寶位於兹三年乃春正月當天下諸司述職於朝既悉簡别其人二月即有事於選舉皆所以遵舊制也於是士之㑹試京師者幾四千人禮部尚書臣耿裕侍郎臣倪嶽臣周經具疏以考試官請上命大學士臣徐某少詹事臣汪諧往蒞其事而同考則侍讀臣曾彥臣楊守址侍講臣王鏊臣張澯修撰臣費宏臣劉機臣楊廷和編修臣劉忠鄧焲都給事中臣張九功左給事中臣王敞員外郎臣蔣欽主事臣黃金臣黃宥監試則御史臣文貴臣唐相暨諸執事咸入院就列內外嚴密罔敢怠遑試畢而詳校之恭從聖裁取士三百人乃刻其名氏與文之優者為㑹試録録成臣某宜序其首夫天下之大必統治於一人然一人不能獨治也則求人才以供之而人才之生世未嘗乏特患上之人不能養而用之耳仰惟我太祖髙皇帝當受命之初聖政日新不遑暇食即詔天下建學養士三嵗輒一開科取而用之以為定制故嘗諭近臣曰國家於人材必養於未用之先取於既成之後譬之稼必豫耕而有獲若刈不待熟則無用矣大哉王言非聖神天縱深知治道何以及此列聖相承恪守祖訓百二十餘年以來養之者益厚取之者益精用之者益至可謂屢獲矣至於今日聖心惓惓尤加慎重而臣等欽承詔音大懼弗稱亦惟盡心思竭精力以求無負於德意耳則登名是録者獨不知此而有負乎行將用之其臧與否必加簡别而黜陟之典具在亦今日之親見者也其尚慎之他日指而稱曰此龍飛第一科名進士也則於主司亦有光焉是為序慶李母王孺人八十夀詩序中書舍人李應禎告於豫曰世母王孺人今年夀登八十九月草五日其初度之辰鄉友仕於朝者辱詩歌以為慶敢以序文纍先生豫辭不可則請誦孺人之德之槩應禎乃宣言曰孺人出長洲故家來歸吾世父思訥君為冢婦逮事吾曽祖母徐夫人夫人家法嚴甚諸女婦少當其意獨吾祖母姚與孺人孝事恭謹孺人最為所鍾愛後孺人從世父來北京且三十餘年吾祖母動輒舉以飭諸婦曰新娘子新娘子云吾曾祖母近百嵗終天年祖母沒才逾七十今孺人視七十已過之企百嵗可待矣實吾宗之慶也又曰吾家世業兼儒醫無良田厚資以為業世父在京師又無壯男子以殖生應酬之餘惟挾册吟諷而已家事一賴孺人孺人絲畜粒聚賔祭畢給世父沒三子皆卓立長廷美拜官御醫光顯矣仲若季從事廢舉家益饒裕皆孺人之廕也孺人雖老猶親縫績之勞雙瞳炯然其福祿蓋未艾也羣公祝頌之作未為過情先生能無言乎豫受簡作而言曰賢哉孺人之為德乎盛哉孺人之為福乎諸公之為頌亦既善矣豫於廷美兄弟猶有告焉古人有欲養而親不待者有貧無以為養者有有祿仕而不遑將母者有獨行踽踽無兄弟以為助者今廷美幸哉有母夀且康矣有官使之榮無移徙之勞又祿足以為奉矣兄弟森立非寡助矣噫嘻即無兄弟將諉之誰乎無資無祿不有承歡於菽水者乎不幸而病不有刲肉嘗糞抱持幾十年無倦者乎古人所樂廷美兼之古人所苦廷美無有焉其不為大幸矣乎廷美當念而母之恩難報而母之年易衰及時盡力毋使他日有不及之恨而已雖然父母之所愛者亦愛之父母之所敬者亦敬之順適其心毋違其意心神安樂則精力愈固又豈特百年而已哉豫因應禎而內交廷美兄弟者久故繼頌以規應禎謝曰吾兄弟敢忘斯言請書以為序都憲王公挽詩序成化十四年都察院右僉都御史進賢王公自治所感疾上章乞解政時朝廷方以邊事倚公不允越數月疾甚章再上允之既歸於家明年竟不起享年五十有八於是其子純詣闕以父喪告上念之遣守臣諭祭而士大夫惜公者且為挽詩授純總若干首純輯為一册奉以求序於豫嗟乎公豫之同年友也而今已矣其忍序之惟公昔以才御史擢陜西按察司副使適戎馬入冦西陲戒嚴公督糧餉不絶師出既有功特加之祿以賞其勞然公自是涉歷邊徼知備邉大要矣後再擢按察使凡三年㑹甘肅乏大臣巡撫乃有僉都之命公往蒞其任務持大體馭官吏以法懷士卒以恩既乃閲尺籍得役占數千人補五百為屯守計先時蕃漢和易守者受酋長私遺縱之若行劫然公召諭甚厲更擇吏主市俾無侵擾胥聽約束不敢違而公益持重師不妄出徼上晏然無事惟甘肅為漢張掖酒泉郡所謂胸奴右臂也其地與虜特限玉門一關以故入冦不時惟吾所以備之者何如耳其大要可禦而不可追可守而不可攻以安靜勝之而已公之在邊已得其要故數嵗以來朝廷無西顧之憂夷狄有內附之願與夫僥幸於一時之竒者相去逺甚獨公不幸奄棄斯世不終惠於一方是可惜也士大夫之作意多出此而豫復序之豈惟寓吾哀亦惟識吾感焉爾重修毗陵志後序志未易作也蓋必熟乎地理之宜通乎人物之故察乎鳥獸之文窮乎生植之理辨乎草木之名詳乎賦貢之數達乎古今之變究乎盛衰之運核乎去取之法别乎輕重之倫明乎先後之序諳乎詳略之等體乎經權之道鑒乎詩賦之差長乎品藻之識而後可以言作志數者闕一焉則有非國語瑕漢書者矣噫齊諧異域山海夷堅怪誕之志吾不復論雖周之職方視禹貢已逺不及矣而况後世猥瑣之書哉蓋大禹隨山濬川踰河蹈海於天下九州無不知故其書皆一一如目覩後之小儒占畢一室乃欲以一己之聰明盡天下之地理難矣周禮獨存乎魯韓宣子至而後知杞宋不足徴聖人猶不敢揣摩而臆度之也嗚呼制作之難如此夫豫備員史官曩者英宗皇帝嘗命修大明一統志自以少不能如司馬子長足跡天下識諳風土為之補禆獨以毗陵郡乃余父母之邦生斯長斯於其土地風俗鳥獸蟲魚人物草木蓋皆耳聞而目覩者其去取先後輕重詳略雖未敢自謂已能而亦竊有志焉嘗與同郡王廷貴先生嘆曰毗陵名郡也吾二人忝執史筆獨不能少述一言以為故鄉山水增輝耶往嵗有謝子蘭先生為之志然惜其書寡傳况我朝百年文物之盛視古逺甚顧可使為缺典也哉因欲為之重加修輯而以講讀青宫不果今天子即位意此時可畢志又以修英廟實録不果既而廷貴轉南京翰林豫清武外黃竟不果無何廷貴丁母憂讀禮之餘郡太守卓侯二守謝侯終以是請廷貴乃得大肆力於是書視昔蓋無復遺憾矣今年豫省親歸二侯出以求序嗟乎此豫與廷貴所共欲為之書何幸廷貴獨得為之而豫竟不得贊一字其內是書若有數以吝於豫者雖然廷貴豫同志也今觀其書若出豫志則是書雖廷貴獨修而與豫修固同也今又得序其後則是書又若有數以待於豫也故為之序以嘉吾廷貴删述之精二侯用心之勤焉侯於吾郡之志且用心如此於吾郡之民何如哉記奉敕撰丁未科進士題名記洪惟我朝自太祖髙皇帝即位之嵗為洪武戊申至憲宗純皇帝成化丁未適百二十年列聖相承深仁厚澤覃被四方雖僻逺之地文風洋溢與畿甸不殊是以士之游學校取科第以為國家之用者炳炳然前後相望蓋治化之隆每於人材之盛驗之其道固然也惟丁未之春士之㑹試京師者既取之如制乃三月十五日廷試越二日傳臚賜費宏等三百五十一人登進士第已而禮部循故事奏請立石題名於國子監而儒臣當為文記之㑹以事因循不果今皇上嗣統以至聖之資為守文之主凡舊章成憲罔不率由小大之臣奉行於下罔不祇若顧兹題名有記甚盛典也而至今尚缺非朝廷崇重科第之意臣某雖淺陋方承乏內閣屬當執筆之任尚可怠緩乎嘗聞之書曰成湯克用三宅三俊說者以三宅謂居位者三俊謂有其才以補三宅者何也人君之治天下其道雖多必以人才為先務然人才之用非預養而素蓄之一旦不可卒得也自設科以來所得人才已不暇論惟是科之士皆純皇帝養而蓄之以遺皇上之用所謂敷求哲人俾輔於爾後嗣者也皇上能因其才之大小而任使之皆當特以六年之間其人布列中外各盡所長以奏厥功又書所謂其在商邑用協于厥邑其在四方用丕式見德者也臣故謹記之則聖明敷德之源皇上繼志之善皆可考見於斯而凡士之預名於斯者其不益勸以助成萬年之治於無窮也哉延平府重修儒學記𢎞治壬子夏延平府重修儒學工完師生以知府餘干蘇侯之功當紀也來求豫文蓋侯豫所取士知其居官多善政而好學有文非他俗吏比乃不辭而為之書惟延平在閩為山水勝地學之初建蓋自國初知府唐侯鐸嗣是守者相繼修葺至成化間則盛侯顒改建明倫堂於文廟之東及齊舍數十楹比嵗亦就傾圯而莫有顧之者且學門與僧廬相逼儒墨混跡不便於是蘇侯以名進士由兵部屬為守於是覩而慨焉曰修學吾職也敢以勞費惜耶乃命役夫輦石伐木擇日興工初徙三門於西人以稱宜次即明倫堂故址作重屋以藏賜書於上名寶章閣既內撤文廟若堂若齊舍若庖庫皆一新之歷嵗餘煥然改觀於舊迥異凡游於是者莫不泰然以樂奮然以勤而是秋遂薦於鄉者數人復以為異噫豈其然乎蓋昔宋明道伊川兩夫子倡明斯道於孔孟絶學之後河洛之間翕然師尊之若南士往從之者惟龜山楊先生而已故龜山之歸明道送之有吾道南矣之嘆龜山之學傳之羅從彥先生從彥傳之李願中先生一時皆生於閩而李公又延平人而晦菴朱子所從學者也四先生往來講授其地實為道學淵藪雖去數百年其流風餘韻尚被於他鄉况其所生之鄉哉又况為其鄉之士哉故嘗觀李公以書初謁羅先生大槩謂後世講學者徒在句讀文義之餘治心者不若口體衣食之急所以求道者如此其至是豈為利祿計者可同日語哉鄉之士聞之必熟有不待告者吾聞蘇侯即寶章閣之下祠四先生名曰道南師友之堂其意蓋可見矣然則遊於是學由四先生之學以求孔孟之道於千載之前至於學優道明勉就選舉於以行義達道致君澤民而成儒者之效又豈非聖賢之心哉因書此為記并諗于蘇侯其亦以為然乎真定重修廟學記真定舊有廟學自國初草創規制卑狹暨府入為畿輔而學制弗稱嵗久益敝殆無以為瞻奉游習之地𢎞治某年平凉張侯琡自户部郎中來知府事有志新之積數嵗財力皆裕計其事可濟始請於前巡撫都御史史公琳巡按御史張公鳩工聚材相地營制既有端緒而都御史髙公銓御史田公􅔿繼至復申前令𢎞治乙卯之春至丁巳之秋而成凡為大成殿八楹崇若干丈深廣稱之東西二廡共七十楹外為大成門六楹櫺星門四楹門之外鑿地為泮池上為石梁三殿之後築土為臺上為尊經閣六楹又為神厨神庫各若干楹而廟之制加於昔既又按圖籍復學舍之侵地十之三合其舊而平之改建明倫堂為楹六退省堂亦如之東西四齊為楹各四號舍為楹六十餘為觀樂亭者二為學官廨宇者五為庖為廪為門為垣者各備而學之成視昔蓋倍蓰焉於是卑者崇隘者廣敝者新為師者有所據以為教為生者有所依以為學為官長者有所施以為政信畿甸間一盛舉也張侯乃以書來京師請豫記學之有廟尚矣蓋學所以求道而道非孔子之聖莫能明舍孔子之道則教非其教學非其學風俗壞而天下之治隳矣故報享之祀尊事之禮必先焉而凡訓誨肄習儲養作育之事並行而不敢廢此雖中世之制而其來亦久矣夫欲使道明於上化行於下者豈徒法制品式之具哉必有躬行實踐之功而後可以言學必有嚮往企到之誠而後可以言祀此為士者之所當然而良有司所宜倡率而興起之者也况甸服之近王化所先被天下之所視以為輕重緩急者乎張侯之政固善矣其為志亦勤矣凡經兹地覩兹制者皆將徵其賢而况於親炙之者乎若修廢補敝使常存而不壞則又後來者之責也佐是役者同知張景琦通判王汝安彭璋推官李資董治則獲鹿知縣吕澤元氏知縣常清新樂知縣劉麟臨城知縣郭賔饒陽知縣徐淮趙琮安平知縣張經真定知縣徐銘凡若干人河南府修范文正公祠墓記宋魏國范文正公葬於河南府洛陽縣錦樊里萬安山下其子許國忠宣公及侍郎以下祔焉距其西十五里熙寧間創褒賢顯忠寺以奉香火而未有修祀事者有之則元守臣郭文鼐始國朝踵而行之不廢歷年既久公之子孫在吳中者若國俊廷方從規輩間來展視輒去而忠宣公嘗置祭田八百畝多侵於人祠墓日壞過者傷之𢎞治二年知府姜昻既加修治尋被水厄而昻亦移守去矣越明年都察院右副都御史常熟徐公恪奉敕巡撫其地瞻拜祠墓慨然太息以為己責於是藩臬諸君及知府劉瓛承奉公命委知縣楊滋主簿徐尹具材召工歷數月祠宇一新遂封築其墓仍禁樵牧祭田之侵於人者悉復於寺僧覺隆等范氏之親趙俊者復其徭役俾同守視功既告訖瓛以徐公是役不可無記乃以使請夫三代以上其時盛矣孔子猶有才難之嘆况後世乎自漢而唐而宋人物之生不為不多然君子獨許諸葛孔明而以文正公配稱則公為名世之臣豈獨五百年而已是以風節著於當時言論傳於天下而凡有志於道德功業者仰而師之以為準的若都憲公平生履清持正憂世愛民固有意於公者宜其惓惓於是也故嘗以聖明用賢圖治嘉奬直言感激論事奮不顧身如文正公者宜暴白之以助清化今公父子丘隴依然而香火之奉顧託之寺僧甚非國家崇重忠賢風勵人臣之意且吳中為公故鄉而慶陽特經略之所俱有專祠况體魄之地乎是宜秩於祀典俾有司每嵗春秋祗奉之為是君子蓋有取於其說因并書之以俟他日舉行焉重建宜興縣先賢祠記宜興舊有鄉先賢祠宋西山真先生記之以為在山川最勝處實縣治之西南二里也嵗久祠廢獨其文存成化辛卯郡守江西龍侯晉二守山西謝侯廷桂按部兹邑惻然興嘆以崇化導民作郡之事也昔賢無依祀典有缺甚非所以崇重先賢勸民為善之意顧可以省財惜費之末節而不為乎乃撤縣學旁梓潼祠而改作之蓋以文昌之祠非禮之正鄉賢祀社在禮攸宜且權宜措置財不取民民不勞力輪奐一新上下胥悅謂宜有記以某鄉人為宜記者夫諸先賢或以道德或以功業或以文章或吾邑之人或非吾邑之人而死於吾邑者或生死皆非吾邑而暫寓吾邑者其顛末備載前記兹不復贅某特以為古者祀鄉先生於社非特為觀美而已也亦非但為崇祀典而已也蓋將以風勵後人焉耳是故為吾邑之人而祀之則思曰吾邑之先人如此其賢吾獨非吾邑之人乎昔也可為今也獨不可為乎非吾邑之人死而祀之者則思曰彼非吾邑人也死於吾邑而祀之耳吾邑之人反不求所以祀之乎生死皆非吾邑但寓而祀之者則思曰彼非久於吾邑也但以賢而吾邑之人重之耳吾亦賢將不為他邑所重乎是三者皆有勸焉昔者鄭立子泄之廟昔人以為知禮豫獨謂泄果當祀乎不當以厲而祀之也泄果不當祀乎不當因厲而祀之也其於崇善化民之意安在哉若龍謝二侯舉所當舉而知所本故樂而為之記書嶽鄂王廟記後宋建炎間金烏珠南侵攻陷常州羣盜四掠宜興皆為所蹂躪時嶽鄂王方提兵抗禦邑令迎王移屯其地兵出屢捷遂保無事避地者亦賴以免邑人圖象祠之學録周端朝實為之記歷嵗既久人習稱嶽廟因訛傳為東嶽之神嵗時男女雜糅祈福於是蓋廟記既亡而王出兵時手書紀功小碑後人築城復置之亂石間莫有知王之功者近嵗士大夫稍知之欲正其繆妄而小碑亦以城圯而出雖殘缺不完尚可考信蓋王之功當不可泯也於是今邑令武陵陳君重修其廟而仍刻端朝記於石陳君報功之心其即宋令戴君之心也乎刻成豫故書其事於後記云王設方略降馬臯懾林聚而史則云盜郭吉遁入湖王遣辨士馬臯林聚盡降其衆其事不同豈臯聚既降而後遣之耶俟考之漳州府知府姜侯惠政記國家以民為重所以加惠元元者其法制視前代為厚且密然其民邇乎京師即不幸有疾苦赴訴之亦易矣若夫炎海萬里外歷數月始至卒不能以其情自達徒相與盻盻然是故貪暴之吏得以濟其欲而莫之顧柔弱之民有以被其虐而莫之恤甚非朝廷不忘逺之意也此無他吏得其人雖逺於要荒如置其民於几席之上否則畿甸之近亦有不得其所矣閩為南服漳州又為閩之南郡可謂逺矣其地介乎山海之間商賈不通市鮮物貨民惟務稼穡以為生業故天時不常水利不修則無以盡力乎田畝而冦難乃作郡號難治久矣成化十四年姜侯以南京刑部郎中領守郡之命先是甲午嵗郡遭大水自是纍嵗旱且不收民被漂溺饑餓死者不可勝數乃多去而為盜其僅存田里間者皆奄奄無生意之民也姜侯適將至深憂之顧倉廪尚有粟若干石乃悉發以賑貸民始大悅稍稍自拔於盜歸而復業惟首惡陳理通哪噠剪毛五等率其餘黨行劫如故侯設方略授其下未幾皆被獲海上遂無事而民始得安屬縣有田皆旁海比嵗潮漲而岸崩田苦鹵殆為不毛之地民相率流移他處侯復憂之乃量財用召夫役往築之凡龍溪漳浦數都者一百八十六所為丈六萬八千七百有竒又龍溪八都曰南陂橫溪古有石堤亦壞復修之為丈一百五十有竒功既成田得以播種者凡數千頃而民始得食侯曰是可以施吾政矣於是益求所以利民者以曩時民饑無預備故遂立社倉一如朱文公之法其始行於龍溪凡為倉一十有九儲穀至四千石社正掌之惟謹下其法於他縣俾皆行之田賦為里胥所侵漁而飛射於南靖者四千三百餘石龍溪者八百餘石二縣之人坐此困敝侯察知之悉還其舊遂除民間五六十年之患既又披户版審其口數按其田畝列其等第者三量徭役之重輕而俾受之凡十年一更代視舊其半焉其餘可以利民者行之既無不至乃興學校俾諸生立書㑹以相講習務為明體適用之學仍時親臨課之而郡中文教始盛矣宋有北溪陳先生東溪髙先生皆郡人也二先生以道學名節卓乎當時為建廟祀以勸學者而近嵗武臣顧斌以冦難能保障其城既殁家不能葬復禮葬祭之以為勸他如里有壇以祭鄉有冢以葬學有社師俗有鄉約孤貧者有養忠節者有褒其政事不可悉著至於嚴立條約以防範乎民者其慮尤逺侯於漳民其心誠勞其惠誠厚雖古循吏何以加之是以數年來詞訟益簡户口益繁歌頌洋洋輯為巨帙可以考見也於是耆民黃友立王秉元輩具述侯之政惠來求豫文以記惟循吏之在郡縣固所樂道其事况豫兼紀載之職其可無以慰吾民哉夫孔子稱子産為惠人至孟子謂惠而不知為政者徒以乘輿濟人一事而言耳其他事之善終不可誣此孔子以為古之遺愛也觀侯之守郡後世不以遺愛稱之乎且漢循吏皆得召還往往位至三公以侯之賢而任且久將自此而升諸朝矣因書以俟侯名諒字用貞浙之嘉興人登天順八年進士第授行人司副擢郎中至今官云世安堂記皇明受天命綏萬邦威德所至隨風而靡故雖下邦巖邑世據其土者莫不稽顙請命去危即安圖永享太平之福徴諸貴州之宋氏可見矣宋氏之先真定人宋開寶初名景陽者以節度使率師攻南徼諸夷諸夷既平民畏愛之留鎮其地子孫相承蓋十九世自宋迄元貂蟬金紫輝映先後及元綱解紐所在搆難八畨順元府都元帥欽始籍其土田歸我職方天子嘉之即受懷逺將軍貴州宣慰使司宣慰使命世其職且曰與國咸休欽生誠誠生斌斌生昻率纘其緒至於今又百餘年矣聖澤涵濡之久其子姓兄弟皆文采彪炳煥然與上國同風昻之從弟冕字從周者遂搆茲堂於祖居之山麓署曰世安蓋以光昭聖恩表著先德且勉諸後人之善承之也噫冕其宋氏之賢子弟哉自夫開寶以來五百餘年中間變故多矣當其時功名富貴與宋氏等者計亦不少矣而宋氏以一縷之緒綿延至今其衣冠之蟬聮奕葉晏然享有兹土未知底止雖其世篤忠孝以為之基而所恃以芘覆者亦其欽崇天命審於逆順之幾然爾不然當國家撥亂反正與海內更始時凡四方怙其勢者皆救死扶危之不暇何宋氏獨申受休命以有今日哉然則斯堂也為基固矣所以芘覆之者至矣為之子孫者尚毋忘忠孝之大節於以恢𢎞祖武觀示後嗣者在是於效忠於時光被諸戎者亦在是矣尚毖懋之國家寶祚無疆則宋氏世享兹安也寧有窮期哉奉敕撰安平鎮治水碑記安平鎮舊為張秋實運河要地也景泰間黃河支流決鎮之沙灣壞運河朝廷命都察院右僉都御史徐有貞塞而隄之暨𢎞治六年復決於下流十里許汶水從之由東阿舊鹽河以入於海厥後霖潦大溢廣至九十餘丈運河自東昌而下率多淤涸舟楫不通今上以為憂既敕右副都御史臣劉大夏往治之又特敕內官監太監臣李興平江伯臣陳鋭總督山東兵民夫役與之共事至則合志協慮㑹財用計工力厚加撫諭俾小大趨事期於成功時夏且半漕舟已集一經決口挽力數倍稍失手輒覆溺不可救僉謂宜急先務乃於西岸稍南鑿月河長三里許引舟由之次第皆濟嵗運賴以不失及冬水向落乃為塞決計規倣古法酌以時宜築東西二臺植木為表多施大索衆掃交下兩岸漸合中流用舟雜置土石鑿而沈之壓以巨掃囊土以實其罅役夫畨代閲三晝夜不息而決始塞其外則甃石樹杙纍築而固又於其南為石壩以備宣節於上流為重隄以防奔潰至是運道復通而舊決皆為陸地矣初議以為安平之上流為黃陵岡黃陵未塞則安平之功不易保故二役並興而湍勢悍激再塞再決羣喙洶洶莫知所定迄八年之二月皆以成告上纍遣賜奬勞賜羊酒金幣諸物易鎮名曰安平又敕建神祠以祈冥佑名曰顯惠命有司春秋修祀事是役也凡用夫四萬餘薪芻以束計者八十四萬五千竹木以根計者三萬七千麻鐡以斤計者六十萬四千有竒而黃陵之役不與焉比復命於朝上喜曰河決既塞越惟爾二三臣之勞爾興賜嵗祿二十四石爾鋭加太保兼太子太傅賜嵗祿四百石爾大夏升左副都御史佐院事分董其役者山東左參政張縉擢通政司右通政仍治河防按察僉事廖中為副史都指揮僉事丁全為署都指揮同知暨文武官士進秩加俸者百數十人各有差既又敕臣某為文記功蹟嵗月以詔後世臣謹按虞書水首六府謂為財用所出也府之利出乎天而修之在乎人故平成之功必資府事一或失修則不能利民而又病之其勢然也運河之利固國計所賴而朝貢商旅皆必由之所繫甚大一壞於洪濤再壞於霖雨其為患甚劇不二載間變波濤為平地化嗟怨為歡欣昔之所難今甚易然亦獨何哉聖天子致和達順之功中外臣竭慮宣力之效天道應祥而地靈效職有不期而合者也然捍患固難保功尤難繼是以後修壞補敝之責則有司存今官有特置責有專任方汲汲為久逺計前日之功亦可以勿壞矣臣故叙事紀日俾刻金石如宋靈平掃故事用復朝命且警於有職者系之以銘銘曰河出西域亘行域中土疏水遷廣武之東虞周世邈漢患尤數歷宋至元治法益鑿我明北都㑹為漕渠再決張秋四紀之餘自西徂東赴海如注渠流中涸南北殊路帝命在廷惟內外臣來咨來營以拯艱屯乃疏其源乃塞其決羣工具興百慮咸竭斫石於山伐木於林實土於囊載積載沈至再而三功乃克就故漕復通萬艦交輳奏章北上勞使南行天子有命錫之嘉名坤靈效順河亦南徙水菑告平民乃寧止民贊且頌良臣之勳臣拜稽首天子聖神皇不自聖豫民父母匪天惠民孰我能佑隄石巖巖川流淙淙惟兹安平永鎮東邦黃陵岡水神祠記中國之水河最大其或潰溢為害則官亭民舍變為洪流及其既去則復為平陸若有神焉司之故諺謂之神水漢人亦言江河之決皆天事非由人力昔禹治水過衡山夢滄水使者授金簡玉字之書過㑹稽夢人衣𤣥纁告以石函之文其事不經難盡信然書云天乃錫禹洪範九疇易云河出圖洛出書蓋聖人之誠上通於天其動乎思慮發乎夢寐固若有陰相之者歟其亦有神為之耶歷代治河者見於史籍概可見國初河之故道在汴城北東至虞城達於濟入於海洪武二十四年河決黑洋山東南至項城入於淮自是河分為二𢎞治二年河決原武又決荆隆口齧黃陵岡泛張秋漕道幾壞於是上命都察院右副都御史華容劉大夏往治之公受命惟謹往來兖豫間相厥源委謂黃陵岡為張秋上流而營塞之孫家渡又為黃陵岡要害黃陵岡不塞張秋之漕道不可保孫家渡不疏則黃陵岡之功不可成乃檄僉河南按察司事張君鼐與參政朱君瑄發卒七千疏孫家渡時張秋復決水勢稽天上下惶惶莫知所出公方有事黃陵岡夜夢神人冠佩而跣明日語諸屬鼐曰是役其成乎水神見像其有以相我矣公曰果然當立廟以祀之已而上復命御馬監太監李公興平江伯陳公鋭往共蒞事分地而治興治張秋鋭治黃陵岡大夏治孫家渡檄鼐與都指揮僉事劉勝治荆隆口俱以八年正月十一日始事上奮下勵至二十一日諸口俱合河復故道漕運無虞上下晏然於是諸臣加祿進秩有差乃詔建昭應龍神廟於黃陵岡令有司嵗時致祭而鼐謂水神先事見像功用克成復以餘材建祠若干楹肖像以祀以答神庥以卒公志經始八年七月至九年三月落成河平之後某既承詔為文於安平鎮及是鼐等復來請記夫天人之際亦逺矣然其感應之機捷於影響故大而體信達順小而聚精㑹神此有所感彼有所應非偶然也天之生水所以利民神也者所以妙其用也神能利民民必有以報之往復酬酢亦有通融而不間者然則祈福祝釐固人情所不能免而禦灾捍患之祝亦豈獨於人焉施之哉國家以民心為心則以神禮報神民之所歸即神之所在其理相為流通而其事未始不相須也治河之役凡以為民而已河平則民安民安則國治自是民當報乎神其必永永以修祀事神亦終惠乎民其必永永以保攸居兹廟之祀宜與安平顯惠廟者相望於河上垂百世而無窮也是用記其成俾來者勿廢云劉公今為户部左侍郎鼐亦遷按察副使矣重修龍神廟記兖州府新作堽城閘閘之上古有龍神祠至是并新之以嚴祀事以厭水患粵自前元疏河渠引清濟汶泗立閘節水以通燕薊江淮舟楫萬里我太宗文皇帝改都於燕天下朝貢之往來漕運之絡繹濟寧之地為尤要焉故凡河渠壩閘之政令歷世謹之且謂河道非自然長流而濟南兖東諸泉上源以時濬導嚴立閘堰常輟朝臣以蒞之成化五年吾義興張君盛以都水主事往治其事巡行周視得舊堰二一曰堽城一曰金口金口在兖城東五里約泗水西流至濟堽城在兖城之北八十里分汶水入西南亦㑹於濟二堰與閘其創已久然金口土築不時潰溢役費嵗以萬計吏緣為奸民用滋害堽城雖石堰嵗久弗治沙土冒其上弊與金口等而水利且日縮矣張君因曰與其屢費而病曷若暫勞而久佚以金口舊堰在沂泗合流之南其地窪不可為議將徙北若干步明年遂徴工發役授規屬吏木石麻鐡灰粟之類便宜調度不以煩民甃石為閘以防衝決并疏沂河以就之惟堽城沙深河濶未易即工又屬嵗祲姑有待而張君秩滿還朝矣後僉都御史陵陽牟公巡撫山東見金口之績而嘉嘆之及見堽城堰則曰此獨不可修耶所少者張水部耳言上奏薦因得張君再至民乃欣然趨赴堽城不逾年而堰成復置閘以殺水勢前後三載而大功告成歷年勞費厲民者一旦失去朝廷河渠之利永有攸賴張君之績偉矣哉夫廟祀龍神固為堰閘而設故廟記於堰閘特詳焉後人嗣而葺之張君之澤垂之不朽而龍神之祀亦與享而無窮矣是役也協心贊成者知府錢源董其事者同知徐福分理則閘官梁洪也張君字克謙庚辰進士自主事升員外郎今官山東布政使司左參議重修漢夀亭侯關公祠記去國門三十里入西山其地曰金山口諸妃殯葬地所在其旁舊有廟以祀漢夀亭侯關公者嵗久就圯莫為修葺𢎞治五年某官某奉命治安妃之墳工既畢入奏於廷請以羡材從役事乃移某官某理之撤殿瓦易梁木朱碧交煥髹堊競彩其中則塑像繪貌聳為巨觀又越三嵗矣頃者某官某奉命舉祀事見其礱石已具而未有文具其顛末請豫記豫惟天地二氣流行無所不有故英靈所寓明則為人幽則為鬼神隨事體物有昭然不可誣者侯從昭烈帝仗義兵復漢室折衝勍敵固已雄蓋天下矣及失天時違地利非人力所能强者則其忠義之所憤激剛大之所充塞此心此氣雖死猶生宜其極六合而無間歷百世而彌光兒童婦女之所必知而道流釋徒之所依藉以為重者也侯之生曷嘗徼求而預計之哉世之稱侯之神者吉凶禍福類多符驗入其廟廷覩其像貌必為之心惕神動洋洋如在其左右蓋其所謂忠義而剛大者有以激之亦非有所强而致也彼附曹黨馬之輩如沙蟲鬼魅澌盡而無餘者亦惡足道哉孔子不語神子思所引乃贊其德之盛中古毁淫祠而季札子胥之廟尚得不廢以侯之靈隨所在而祀之豈徒然哉今天下之大未暇論都邑內外廟侯者何啻千百是役也殆所謂有其舉之莫敢廢者因録其修建之由俾後之人知是廟也有天子之命在焉其視窮鄉下社野夫賤吏之所建置亦異矣是為記宜興東關廣濟橋記始吾聞台之太平有賢令曰袁君廉平公恕綽有惠政以憂制去百姓爭泣留之嘗歎曰使吾宜興得袁君者為令縣必治矣乎後三嵗縣以闕令告而君起復居京師適政選吾縣復嘆曰袁君嘗所欲得者今幸得之縣其治矣乎君既拜命至則首革一二弊事民有不率教者更痛懲之縣中肅然已而循衆情立良法日夜切切求所以保護其民惟恐一毫傷之不數月民皆晏然而縣果治豫然後益信君之賢而向之所聞者不妄也君才具甚優凡所設施不動聲色政事之暇至工役之當興者亦力為之不辭蓋縣東關舊有橋名廣濟嵗久傾圮過者病之前令率因循嵗月不以為意君獨謂是橋人出入必由不修將益壞壞則費益多而功益難成其為民病益甚吾既有百里之寄事茍有利於民者當身任其勞不可重為後人纍也則以諭民民聞之相與欣然趨事以成化二十年某月某日興工是年某月某日工訖他日縣父老具其事來求豫為記大略謂君之利吾民者不能悉書特欲託此一事俾子孫不忘君之嘉惠耳豫素信君之賢者及聞是益為吾人喜執筆以記其成其何敢辭惟昔子産之治鄭也孔子稱其有君子之道四而孟子譏其以乘輿濟人為惠而不知為政夫子産有君子之道四可謂賢矣孟子所以譏之者是責備賢者之意也即此而觀亦可以見一徒杠輿梁之未成猶足以為賢者之纍則治民者未可以小而忽之蓋亦為政者一事也夫謂之為政者務大體而不行乎姑息懷永圖而不惜乎謗議所謂勞而不怨者也惟其不怨此其為利也久而一時之惠不足言者君既能之其知所以為政者乎然君不獨為此又嘗病民西溪之險因其南有古渠浚而通之者凡三十餘里民始得避其險其為利尤不可計此亦工役之可書而皆為政者之事故并載之君名道字德純吉水人登成化八年進士第其再為縣於此仍嵗大熟民益愛之故君得乘其時以成其事而部使與郡守尤察其無私凡欲有為輒從其請故君又得信於民以行其志更二嵗政績卓然為江南諸縣最吏部方奏請召還將有不次之擢矣新建祠堂記維我徐氏為宜興望族自唐宋以來代有顯者入元隱處田里而種德益深至國朝先祖瓊州府君始復出仕而為循吏德政所被斯民戴之先考漁隱府君以冢子承家克拓故業乃定居洑溪之上生溥兄弟四人幸藉遺休獲登甲科列職禁近夙夜兢兢惟以辱先訓不能繼先志為懼蓋先考長厚好義為鄉邦推重且天性孝謹於奉先之禮惟恐弗至嘗曰祠堂之制朱子家禮之所首載者也吾家於是顧獨未稱因即所居門外擇地以建後以其地阻於池水嵗時祀事弗便且於禮制不合也始更擇地當正寢之東爽塏深廣於祠堂為宜某歸省將上京師乃以其事託弟濟輩功未及興不幸先考見背勉襄大事因循不果所以不能繼志為懼益深比嵗節縮祿俸所入命次子元相特任其事以𢎞治三年七月十日興工木石精良不計財用是為堂三間後復為屋三間兩廡十間固以重門繚以周垣其規制乃先考之所講畫而求合於家禮者也明年十月十二日工完乃卜吉辰命長子元楷安奉四代考妣神主於中某忝以尚書秩滿仰荷聖天子錫誥加贈先祖先考並資正大夫禮部尚書兼文淵閣大學士妣並贈夫人恩光所臨堂宇增煥祀事載奉神靈安焉庶幾先志於是乎繼而私心亦是乎遂矣初欲搆祠池上謂得魚利可當祭田某慮不久逺也惟先考舊畫神安鄉小旻墟常稔田二百一十二畝以資給某者今幸祿俸且厚不敢自私凡牲醴庶品悉於是乎給或嵗入有餘兼為修治祠堂之費焉爰直叙其事刻石祠下俾後子孫世守之勿替功完明年二月二日記重修碧霞靈應宫記𢎞治八年春正月巡撫山東都察院右僉都御史熊公冲言泰山絶頂舊有碧霞靈應宫祀天仙玉女之神封為碧霞元君者燬於火宜治事下户部㑹議謂泰山泰嶽有生物功凡祠關祀典者不宜不飭且神以靈故四方走士女操金帛為祈禱者嵗所積甚夥宜令按察憲臣籍之以為工費詔可乃以屬僉事陳君寬領其籍籍既告足又有內帑錫銀若干兩謀於鎮守太監李公全巡按御史曹君鳯以屬副使廖君中司出納焉工役既集卜日治事凡為正祠五間為左右配享之祠各三為從神之祠各一為鐘鼓之樓者亦如之為亭於聖水之祠一為道院二區其為間十有七其西加二為官使之㕔九蓄牲之房加一為門之間三綽楔二其為廟之貌搏埴采繪袍笏簮佩之服皆備棟宇翬題木石瓴甓金璧丹堊之物無弗具者合為間八十九凡用銀以兩計者七千三百有竒役夫若干而成熊公乃致書京師請豫記豫聞泰山之勝稔矣顧職在朝署無使命欲一登而不可得嘗觀泰安州志備載其形勝祠宇知有所謂碧霞者故閣老劉文安公之記在焉其為辭固竒偉巉聳與兹山兹景並勝使人讀之真若望榑桑窮日觀飄颻於剛風倒景之外也若自有天地即有山川竒秀所結靈神所聚邦君之所得祀擴而求之宜亦有不可無者矧國家秩祀之所載所以萃人心而延景命於此有資焉是其興廢起敝以貽不墜抑豈非有司者之事哉熊公政令明達凡所得為無弗自盡觀於此其他可知已獨豫齒髮向暮方倦筆札不能為竒麗可喜之辭以著偉蹟昭靈貺姑識其事俾刻之祠下庶來者有考於斯云記既成系之以詩曰岱宗之巔巋一宫兮金碧絢出髙巃嵸兮承乾據坤秀氣鍾兮神明碧霞誰所封兮雲冠霧裳廟貌隆兮月星光彩氷雪容兮人世杳絶嗟難逢兮春粢秋盛祀典崇兮有其舉之義則通兮門集五驂隨兩驄兮小大執事靡弗共兮國家明昌年穀豐兮五嶽效職兹其東兮刻石紀事垂無窮兮奎章録記嘗讀周書至立政有曰常伯常任凖人綴衣虎賁竊嘆當時人君於內外之臣無不慎擇其人以用之也蓋常伯常任凖人所以掌乎外之事其職也重綴衣虎賁所以掌乎內之事其職也親夫惟內外皆得其人此成周之治所以盛也國朝之制設部院以分理天下之事若夫上所服食器用之類則設監局而以中貴人掌之然至於事之大者如禮文軍旅工役刑獄亦皆得以預焉列聖相傳用人惟慎故百二十年以來內外之事皆得其序而一人端拱於上世道之盛追及乎成周而無愧也內官監太監黃公嘗輯所受御敕十有九道題曰奎章録間以示某蓋公為人清勤忠謹練達老成故自先朝輒見委任今上益加寵眷而公愈自謙抑不敢怠遑功名富貴用能保之夫職之親者情易䙝自成周而後人君有可議者矣伏觀是編綸音所載昭然如日月赫然如雷霆非國之大事不以屬公所謂大哉王言者也然則是編豈獨見公能當乎委任之重而列聖之德亦略可以窺見矣記諭祭制文碑陰臣某不肖幼服先臣之訓繆叨科第入翰林備員史官恭惟英宗皇帝光復寶祚遂命執經以事今上皇帝於東宫黽勉供職夙夜罔懈所愧爝火不足益日月之明涓埃不足禆海嶽之大仰勞軫念恩寵疊頒蓋自編修以至庶子而膺封命榮及先臣及今先夫人之卒又䝉賁以祭禮視先臣加營葬焉於乎先臣積德纍善敷遺後人致小子獲以經術顯名朝廷朝廷不遺寸善推録本原致先臣被寵榮有增無已皇上之恩天地之恩也臣愚雖百其身何能為報謹以前後諭祭制文勒諸墓道俾子子孫孫載拜而欽誦之有以仰見朝廷假寵臣下之大恩且知先臣迓承之者有由然也其豈不思處而家居供賦役以給公上出而仕宦盡職業以事朝廷以圖報稱聖恩於萬一者乎不然既非前人所為望於後嗣人子之分顧當爾耶用敢拜手稽首識諸碑隂凡我徐氏世世子孫永永無忘哉重修福源寺記吾宜興東南四里曰清泉鄉有山曰瑞雲山麓有寺曰福源寺之建已久其額則宋景定間請於朝者也歷元至國朝蕪廢且久在景泰間先太子太傅漁隱府君愛其山水清勝作生壙於兹工既告畢念家居稍逺而兹寺相距甚邇思有以屬焉乃市材召工重修之凡殿宇門廡合數十楹煥然一新蓋自有兹寺以來二百餘年而復興延僧明琛者來主寺事因為守視塋域如近代大臣香火祠之制而焚修誦祝之事不與焉琛復募施集力續有建置以廣其宇之所未修於是寺之規制視昔為勝越四十餘年未有記其事者今年春亦念年且老思藉為不朽計特上京師以請於豫豫曰噫此先太傅之意也其何敢忘夫子孫之於祖考祠於家而墓於郊時有祀嵗有奠所以事死如生事亡如存者其常也其或有勢之不逮力之所不加茍可以假借而寄託者無所不用其極孝子慈孫蓋亦有不得已焉故僧寺道觀之於人家墳墓往往有守望呵護之力雖古之所無而近代有行之者如李贊皇之祀於甘露王金陵之祀於鍾山皆是也佛之教離家去俗若無意於親親之道然以兼愛為宗其為愛雖無差等而施則由親始其良心固在也惟其有是心則必能體人之心而為之盡其孝思此實所以兼愛者亦其教之本然而非可以强之能也惟先太傅以純厚之德清雅之操弗試於世乃徒以所藴蓄所培埴者施於家溉於鄉以蔭於子若孫鄉之人被惠而飲德者至於今皆思之不能忘况吾為子孫者哉是兆域所在體魄所寄固愛存慤著之地也又况褒封贈恤金書石刻之所載聖天子之典章恩命所在焉時祀嵗奠之外亦安可不朝夕而守護之哉顧䝉先訓幸獲承朝廷重託不及顧其私公退之餘亦惟南望興悲而已繼自今主其寺者尚體人心守視惟謹俾樵牧不侵體魄安妥歷百千年如一日則不惟少慰吾之孝思而於先太傅疇昔之意亦可以無負矣若種福田以資冥利如世俗之所託於彼者則非先太傅之心又豈豫之事吾親者哉故此為記何氏家廟記古之祭其先者庶人祭於寢士大夫祭於廟至朱子家禮首言君子將營宫室先立祠堂於正寢之東其曰祠堂者通庶人士大夫而言也然世之士大夫為宫室者比比而是至於奉先之制茍簡特甚殊非報本追逺之意又何怪乎庶人之無祿者哉故吾於何氏家廟之建深有感於中而取之也何氏為廣州順德名族世居邑之黎村西岸隱於耕稼久晦而顯是生司禮太監公公早自鄉里選入內庭忠勤恭謹受知先朝乃䝉簡拔以遺今上皇帝之用委任既專久而益篤公嘗自念今日所以被兹寵榮者皆先世積德之所致也彼豺獺猶知報本况貴為人又况貴為天子之近臣乎乃擇𢎞治四年冬十一月之吉建家廟於順德之故第為堂三間嚴以中門繚以周垣祭器所用亦無不備俾弟姪嵗時祭享如禮廟成公謂宜有記而特請於豫豫嘉公之好禮不能辭也蓋人既沒而葬則為主奉之乃神靈之所依也主之所奉必有其處則祠堂者又神主之所依也故古者不重墓祭而祭必於廟今公身居京師豈不能建家廟於此則以先世神靈不在於此而在於彼故耳且古者子孫於祭有故則使人代之公既身侍內庭不得親蒞其事然其心惓惓焉未嘗一日忘乎先世也則凡為公弟姪以代公祭者其尚竭其誠敬以將公之孝思殆見祖考來格降福穰穰何氏子孫豈不永顯於世也哉手簡覆李都憲某覆都憲李親家閣下别久無任馳情逺惟公暇體履佳勝為慰往者被召駐節京畿且有遷秩之榮區區不勝欣忭未幾改理漕運此尤見倚毗之重執事才德老成負荷匪艱然士大夫不能無厚望於執事也所以然者蓋國家財賦仰給東南數郡邇年以來年時亢旱河道淺澀軍民上下困於輸轉其勞苦不可勝言今嵗恐亦無異往昔但執事當此按臨之初凡百設施必有大過人者利敝興革有以見之區區忝在年末為榮多矣兹便輒此申意簡葉年兄都憲某再拜奉簡都憲葉年兄執事别久如企仰何昨於遞中辱寄聲已領盛意即辰淑暑逺惟撫治之暇神相多福為慰每念執事自簡命以來值此歉嵗長才逺略所以上紓吾君之憂下慰吾民之望者蓋不少矣近聞太原地方皆得雨二麥頗收秋成亦可望此殊可喜獨平陽一方之民未得少蘇凡可以寬恤賑貸之者又不能無望於執事之擘畫也軍職納粟一事已得如所請此法一行上下亦頗得濟此間五六月來連得雨人情頗安但數日暑氣甚酷與南方無異此外不能一一詳也便端專此達意草略希照察不宣再簡葉都憲某再拜都憲葉年兄大人比䝉遣祀山右得與吾兄相叙兩旬臨别後承逺餞同年之情藹如也還朝來亟欲修謝奈賤體疾作因循至今怠慢之罪無以逃矣張千户來恭審公暇體履康勝為慰但當此歉嵗公私匱乏凡百未免有勞尊神爾救荒一事自古為難以今言之尤有難者蓋國家承平日久事多緩弛况郡邑素無儲積何以賑施若非吾兄籌畫之良撫綏之善又將有不可言者矣又辱頒手教備審體况多適殊以為慰昨大同命下之日士大夫咸以朝廷簡任得人為賀傳者乃謂執事似有不豫色然者此僕所未喻也蓋西北最為重鎮國家承平日久留意邊事非得練達老成之人如執事曷克當此重寄然古之人功成則思退寵極則懷憂執事無乃有見於此乎都下凡百如昨但春夏以來雨澤少降南畿荒歉尤甚疫氣盛行北來人無不沾疾此亦時事可慨之一端也令嗣在此多慢侍間幸為道意使還草草布此尚希照察不宣簡王都憲某再拜奉簡都憲王大人執事邇喜榮膺簡命撫治一方展布長才邊徼多慶竊想事之有益於兵民者次第舉行輒有表揚忠節可為世道勸者一事專此奉聞蓋雲南為省在國朝入版圖最後百餘年來數郡之人安居樂業不識兵革是惟守臣保障之功然所以至此者其初亦甚難也故當元運既終其遺孽梁王自恃險逺尚據其地髙皇帝不欲勞兵逺征特遣翰林待制王公與刑部尚書吳公相繼招諭之既至並仗節以死王公為彼拘留頗久死後又得翰林諸賢作為文章以暴白之故其事遂傳於世正統間竟䝉朝廷贈諡近又得守臣奏請建廟秩祀忠節之名皎然不泯獨吳公之死其名特傳於鄉里而已公有子黻亦嘗䝉恩補國子生後知交趾某縣比交趾陷亦沒用是子孫微弱不能建白於朝今執事秉忠義之心持風憲之節即當請命於朝與王待制並食兹土移檄故鄉録用子孫表揚忠節激勵後人則死節之臣目可瞑而名可久矣執事謂之何如耶人便謹此馳上萬乞留心於此勿以區區之言為無補而視為虛文也惟執事其信之某日具簡閔都憲某頓首奉都憲閔大人舊契執事濶别豈勝馳系冬序始寒不審尊候動止何似竊惟執事才德兼茂久厭士論兹者榮膺簡命進秩中臺凡在有識無不慶忭而况僕忝舊契之末者乎第以巡撫之初適當雨水之患此正君子憂國之時凡百未免少勞神用然處置得宜公私俱濟則所利溥矣諒不以為煩也僕勉强碌碌無足為道畿內數郡今嵗頗稔蘇常一帶六月以後少雨皆减所收貴鄉不知何如河陜之間亦皆淺薄然民之凋瘁極矣殆未知何道可以蘇復之也可慨可慨兹便輒此布申良晤未卜惟冀順時珍攝以副倚荷不宣復李應禎兄二柬某頓首復應禎契兄先生執事承惠軸文詞翰俱美但稱許過情令人益增慚悚頃間王用清乃弟至得所惠書知令兄榮擢貴眷清寧不勝喜慰承喻欲就郡校一事吾兄豈未之思耶比年各處風俗日偷生徒之隆師好禮者少寮寀之重利輕義者多賢明提調難逢倨傲上司率是或地臨邊鄙則盜賊出沒不常而終身兢惕於干戈戰陳之下或路當衝要則往來迎送不息而終日奔走於車塵馬足之間設若遭此回視中書之清秩無異神仙文華之直廬真在天上矣雖悔何益哉吾兄識見髙明固不待僕之喋喋然平日䝉知愛之深有鄙見不敢不告也惟采納之甚幸僕自夏初抵家迄今已踰三月終日為人事勞攘殊無清思所幸者老親康健朝夕得供菽水為樂北上之期欲在來春第親年老邁難遽離膝下也克明回布此奉謝并道區區秋凉萬為斯文愛重不宣别踰一載馳仰無間特以冗懶久疏裁問非敢忘情也每從原博玉汝處敬詢動履頗得其詳且聞貴恙平復無任欣慰更望倍加調攝怡心神於老境耳冗中草草布此惟恕亮不宣與仲學弟某再拜仲學賢弟執事别後屢得賢弟書足見不忘舊好但公私叢沓不能以時作答心殊歉然令祖修墳事沈廷美曽有書報似大器已領命批仰本府照例修理及見兒輩說未得如意豈年嵗饑荒有司不能奉行耶賢弟孝心已至遭時之不偶耳付之無可奈何貞伯先生不意遽至大故親舊凋零良可傷悼臘底文宗儒書來報我始知之且云乃壻不才盡將貞伯平日所蓄書畫之類盜去賭博吾家蘇長公祥止畫二卷亦在數中已託宗儒為我取贖不知畢竟何如前嵗二舍弟乃話及吾二人早年曽議置義田以賙宗族後因兄弟分居不果區區因念今日幸做大官俸祿比前頗增乃議將先公割與區區供給田二百畝并湊得銀四百兩與舍弟商販覔得少息將來置買田地二三百畝共作義田不意舍弟物故前銀亦無下落以致此事久不能成昨三兒來另作區處委他經理冀可以終其事且寒族自來甚大如梅林唐頭屯田長岡諸宅皆出一本先祖存日俱已往來後至子孫蕃衍日漸疏逺竟莫知所從來况舊日家譜先祖攜往瓊州遺失無存今欲重加修續必得人遍請諸族訪求遺事奈諸子弟中竟無一可委者反復思之惟賢弟周詳慎密深知吾意足優為之書至煩假數日之暇幸幸與三弟置義田手帖前嵗二弟上京特為置義田一事其意既成不意彼至家遘疾竟賫志以沒今汝重念此事出於先尚書府君及諸兄之意冒暑逺來復申前議終欲成此美事足見汝孝義之行吾心甚悅其田初定八百畝已於小旻墟等處撥下五百餘畝後當再置二百餘畝以足其數汝歸且與吾三兒元相行之先取佃户舊帖俱改作義字號以免後日移動之弊其租除完官外暫將祠堂前宰牲房三二間收貯其給散族人以備荒歉之嵗者再當斟酌多寡與汝行之此事乃宋范文正公之所嘗行吾德不及古人本不敢依倣但先志不可墜而同族所當恤姑盡吾力之所能而已子孫敢有愚頑沮壞其事者當以不孝論他日必須申達官府嚴加禁約庶可行之久逺也因書此遺汝并三兒知之汝宜謹守勿誤𢎞治六年閠五月十五日簡沈豫軒親契盛價來得手書知即日已臨治屬兼審起居之詳甚慰馳企執事長才偉器揚歷中外聲望表然士論中皆謂進用之晚不獨區區親愛者然也鄖陽之擢殆為大拜階梯耳豈足以盡執事哉來書所喻若乃不能勝者謙光之德殊非常情可及起敬起敬鄖界四省之間自古所謂重鎮比之他處巡撫區畫調度其難加倍非老成練達者鮮克有濟今茲之行於執事為少屈然一方赤子受福多矣知已所託書已一一致之凡有建白施行宜必見信如某者愛助之心固其素也何勞喻及耶某近以八月九日䝉進少傅且給三代誥命恩典優渥深恐弗堪惟諸賢有以輔翼我者庶稱德意耳小兒輩九月中旬抵京數日後即南還小孫亦隨去矣顧年少未知力學方切老懷逺承垂問足感盛情因附及之冬寒千萬自愛不具簡吳二守某簡奉二守吳大人執事久不奉問如企仰何兒輩來備審經夏來體况多適且言使車每過敝邑必一至寒家兩兒均辱教愛至於牌坊一事贊助之力尤多自非篤念斯文之情曷克如斯慰感慰感都下凡百如昨但關中河東荒歉殊甚猶幸東南數郡比嵗豐稔軍國所需賴以此爾大抵從古至今嵗之豐凶固自有數然亦未必不由人為有以感召之也此後尤乞戒飭鄉人務從儉約不為暴殄侈靡之行使嵗嵗享此粒食之利何樂如之此亦執事素所留念者也兹中書小兒回家專此申謝并以為告外進士登科録一册奉資閒覽鑒納不備復彭都憲某再拜奉復都憲彭大人執事某竊於中朝士大夫間知盛名久矣不得一接髙論為歉比公差人至辱不棄惠及手教愧悚何可以言惟執事才操超卓可希古人中臺峻擢士論允愜第南畿列郡錢穀浩穰調度之勞食不遑暇方今以此奉纍而執事顧切切以民困為念敷奏之餘過䝉詢及斟酌事理委曲詳盡此仁人君子之用心也某昨從山右還始克發書甚恨遲晚於是封內二通即日轉致隨以所委白之然方事下户部之初當事者奪於羣議泥於成法已嘗沮格矣及此與之詳辨始悟南京俸米折銀官民兩便乃見施行此間食米折銀固有知其便者卒不果行也為之深慨况俸米折銀石加一錢已失執事美意但吾民困憊已甚得此且少省其餽運之勞受惠亦不可計也某叨祿南宫雖庸劣不足與朝議然如四方利弊頗嘗究心而况鄉郡之近而稔知者承垂問及之敢不奉教此外民隱尚多可言諒執事咨訪已遍行之有漸便中略此拜復不多及也未間惟冀順時保練為國家自重不宣簡趙年兄都憲某再拜都憲趙年兄大人執事久不奉問瞻仰殊深即辰秋序漸杪緬惟公暇神相多福為慰往者嵗凶民饑執事內切憂思外煩擘畫數月之間公私上下賴以周給乃今天降時雨嵗獲有秋庶幾民困得蘇而執事憂勤之心亦可以少安矣但聞轉輸一事尚未息肩不知執事何以圖之幸留意都下凡百如昨畿內諸郡頗為稔嵗但如湖湘閩廣之間既多大水而南畿數郡又復亢旱彼此有餘不足皆不得其常此固可共發一慨也便中謹此申意千萬為國自重以副眷倚不宣簡何郡守某再拜郡守何大人舊契執事别濶不勝懷戀昨王員外公差人回辱書為貺備審公暇體履甚休足慰區區老病日增不能有補於時每念執事為郡日久洛人稱譽無間近嵗亢旱民困政務叢委勞慮倍蓰於昔當道諸公交相贊揚不久當膺嚴召以致逺大之用可俟可俟畿內數郡今嵗有獲惟蘇常一帶秋來無雨不覺减收司國計者不知東南財賦所出慎重其事顧乃輕率建議差官糶賣餘糧且屬之新進後生大張威勢地方頗聞騷擾今雖已停止然恐無及矣此亦時事大可慨也便中申謝并以為告未閒千萬若時自愛不具謙齊文録卷二
